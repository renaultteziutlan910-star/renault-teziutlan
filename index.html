<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }
        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ESTILO INICIO MODIFICADO SEGÚN IMAGEN */
        .welcome-label { color: var(--gray-text); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; text-align: left; }
        .user-name-title { font-size: 2.2rem; font-weight: 900; color: var(--white); text-align: left; margin: 0 0 25px 0; letter-spacing: -1px; }
        .card-profile-dark { background: #121212; border-radius: 40px; padding: 40px 20px; text-align: center; border: 1px solid #222; margin-bottom: 25px; position: relative; overflow: hidden; }
        .car-hero { width: 100%; max-width: 280px; margin: 0 auto; display: block; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5)); }
        .tag-car-pill { display: inline-block; background: #2a2a2a; color: #d4af37; padding: 8px 25px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-top: 20px; border: 1px solid #333; }
        .btn-explorar { background: var(--gold-gradient); color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        /* FIN ESTILO INICIO */

        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .login-input:focus, .form-control:focus { outline: none; border-color: #d4af37; }
        textarea.form-control { resize: vertical; min-height: 80px; font-family: inherit; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-whatsapp-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000; text-decoration: none; }
        .btn-whatsapp-float svg { width: 30px; height: 30px; fill: currentColor; }
        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0d0d0d; display: flex; justify-content: space-around; padding: 15px 0 30px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; cursor: pointer; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; position: relative; }
        .desc-title { color: #d4af37; font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; text-transform: uppercase; }
        .desc-text { color: #444; line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px; text-align: justify; }
        .feature-tag { display: inline-block; background: #f0f0f0; padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; margin: 3px; color: #555; }
        #appointment-reminder { background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 20px; border-radius: 25px; margin-top: 20px; text-align: left; }
        .btn-cancel-modern { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        
        /* ESTILOS DE PÁGINA CITAS */
        .stepper-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px; position: relative; margin-top: 10px; }
        .step-line { position: absolute; top: 15px; left: 10%; right: 10%; height: 2px; background: #333; z-index: 1; }
        .stepper-item { text-align: center; z-index: 2; flex: 1; position: relative; }
        .step-circle { width: 32px; height: 32px; border-radius: 50%; background: #222; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #444; color: #888; font-size: 0.8rem; font-weight: bold; }
        .stepper-item.active .step-circle { background: var(--gold-gradient); border-color: #f5d17a; color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .step-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #555; }
        .stepper-item.active .step-label { color: #d4af37; }
        .premium-card-service { background: #111; border: 1px solid #222; border-radius: 25px; padding: 25px; margin-bottom: 20px; text-align: center; }
        .info-row-service { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 10px 0; font-size: 0.95rem; }
        .info-label-service { color: var(--gray-text); font-weight: 600; }
        .info-value-service { font-weight: bold; color: #fff; }
        .btn-premium-action { display: flex; align-items: center; gap: 15px; background: #161616; border: 1px solid #222; padding: 15px; border-radius: 18px; margin-bottom: 12px; text-decoration: none; color: #fff; }
        .icon-circle-service { width: 40px; height: 40px; background: rgba(212,175,55,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #d4af37; font-size: 1.2rem; }
        .action-text-service strong { display: block; font-size: 0.9rem; }
        .action-text-service small { font-size: 0.7rem; color: #777; }
    </style>
</head>
<body>

<a id="wa-bubble" href="https://wa.me/522312333467?text=Hola,%20necesito%20asesoría%20personalizada." class="btn-whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
    <label class="form-label" style="color:#888;text-align:left">Selecciona tu Renault actual:</label>
    <select id="user-unit" class="login-input">
        <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
        <option value="Duster">Duster</option><option value="Oroch">Oroch</option>
        <option value="Koleos">Koleos</option><option value="Megane E-Tech">Megane E-Tech</option>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="welcome-label">BIENVENIDO</div>
    <h1 id="greet" class="user-name-title">USUARIO</h1>
    
    <div class="card-profile-dark">
        <img id="main-car" src="" class="car-hero" alt="Tu Renault"
            onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        <div id="tag-car" class="tag-car-pill">Tu Renault</div>
    </div>

    <div id="reminder-container"></div>
    
    <button class="btn-action btn-explorar" onclick="showPage('nuevos')">
        EXPLORAR CATÁLOGO <span>→</span>
    </button>

    <div style="text-align: center; margin-top: 30px; color: #555; font-size: 0.8rem; font-weight: bold;">
        Calidad Renault, Teziutlán Premium
        <br>
        <a href="https://wa.me/522312333467" style="color: #888; text-decoration: none; display: block; margin-top: 10px;">Consultar Asesor Técnico 💬</a>
    </div>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">GESTIÓN DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:8px">UNIDADES NUEVAS</div>
    <div id="cat-container"><div style="padding:40px;text-align:center;color:#555">Cargando catálogo...</div></div>
</div>

<div id="p-seminuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">INVENTARIO SEMINUEVOS</div>
    <div id="semi-container"><div style="padding:40px;text-align:center;color:#555">Cargando...</div></div>
</div>

<div id="modal-desc" class="modal">
    <div class="modal-content">
        <button onclick="closeDesc()" style="position:absolute;right:20px;top:20px;border:none;background:none;font-size:1.5rem;">✕</button>
        <img id="desc-img" src="" style="width:100%;border-radius:20px;margin-bottom:15px;aspect-ratio:16/9;object-fit:cover;">
        <div id="desc-title" class="desc-title">MODELO</div>
        <div id="desc-text" class="desc-text"></div>
        <button class="btn-action btn-yellow" onclick="openM(currentVehicleSelected)">COTIZAR AHORA</button>
    </div>
</div>

<div id="modal-quote" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="color:#d4af37;">COTIZAR</h3>
        <label class="form-label">Nombre</label><input type="text" id="q-name" class="form-control">
        <label class="form-label">Teléfono</label><input type="tel" id="q-phone" class="form-control">
        <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()">SOLICITAR</button>
        <button onclick="closeM()" style="width:100%;background:none;border:none;color:#999;margin-top:12px;">Cerrar</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Semis</button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS0wO4YdetIsGIaK08WsGEpLc2Ad5k-Fdk5kD4lbEdlb7YLRaoxx4Gk_JwYrrgiQ/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png";

function saveData() {
    const name = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit = document.getElementById('user-unit').value;
    if (!name || !phone) { alert("Completa tus datos"); return; }
    const userData = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(userData));
    renderUser(userData);
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('greet').innerText = `${d.name.split(' ')[0].toUpperCase()}`;
    const slug = d.unit.toLowerCase().trim().replace(/\s+/g, '-');
    document.getElementById('main-car').src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
    document.getElementById('tag-car').innerText = `${d.unit.toUpperCase()}`;
}

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        renderUser(JSON.parse(raw));
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};

async function initAppData() {
    updateAppointmentUI();
    loadCat();
    loadSemi();
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) el.classList.add('active');
    if (id === 'citas') renderAppointmentPage();
}

function updateAppointmentUI() {
    const data = localStorage.getItem('renault_appointment');
    const el = document.getElementById('reminder-container');
    if (data) {
        const a = JSON.parse(data);
        el.innerHTML = `<div id="appointment-reminder">
            <div style="color:var(--gray-text); font-weight:700; font-size:0.7rem; margin-bottom:5px">PRÓXIMA CITA:</div>
            <div style="font-size:1.1rem; font-weight:900; color:#fff">${a.fecha} | ${a.hora} hrs</div>
        </div>`;
    } else { el.innerHTML = ''; }
}

// RESTO DE FUNCIONES (loadCat, loadSemi, handleBooking, etc.) permanecen igual al código original
async function loadCat() {
    const container = document.getElementById('cat-container');
    try {
        const res = await fetch(`${SCRIPT_URL}?hoja=nuevos`);
        const data = await res.json();
        container.innerHTML = data.map((c, i) => `
            <div class="car-card">
                <img src="${c.imagen || PLACEHOLDER}" onclick="openDesc(${i})">
                <h3 style="margin:15px 0 5px">${c.modelo}</h3>
                <button class="btn-action btn-yellow" onclick="openM('${c.modelo}')">COTIZAR</button>
            </div>`).join('');
    } catch(e) { container.innerHTML = '<p>Error al cargar.</p>'; }
}

async function loadSemi() { /* Igual al original */ }
function renderAppointmentPage() { 
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    if (data) {
        const a = JSON.parse(data);
        cont.innerHTML = `<div class="premium-card-service"><h3>Tu ${a.unidad}</h3><p>${a.fecha} a las ${a.hora}</p><button class="btn-cancel-modern" onclick="cancelarCita()">Cancelar</button></div>`;
    } else {
        cont.innerHTML = `<div class="card-white"><label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control"><label class="form-label">Hora</label><input type="time" id="c-time" class="form-control"><button class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR</button></div>`;
    }
}
async function handleBooking() {
    const app = { 
        nombre: JSON.parse(localStorage.getItem('renault_user')).name,
        fecha: document.getElementById('c-date').value, 
        hora: document.getElementById('c-time').value,
        unidad: JSON.parse(localStorage.getItem('renault_user')).unit
    };
    localStorage.setItem('renault_appointment', JSON.stringify(app));
    updateAppointmentUI();
    renderAppointmentPage();
}
function cancelarCita() { localStorage.removeItem('renault_appointment'); updateAppointmentUI(); renderAppointmentPage(); }
</script>
</body>
</html>
