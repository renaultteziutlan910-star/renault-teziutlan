<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOGIN PERSISTENTE --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 35px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        /* --- NAVEGACIÓN --- */
        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
        }
        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); }

        #appointment-reminder {
            margin-top: 25px; background: #1a1a1a; border: 2px solid #d4af37;
            border-radius: 25px; padding: 20px; text-align: left;
        }

        /* --- FORMULARIOS --- */
        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }
        .btn-cancel { background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); padding: 10px; font-size: 0.8rem; margin-top: 15px; border-radius: 10px; width: 100%; }

        /* --- CATÁLOGO --- */
        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; }

        /* --- NAVBAR INFERIOR --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
        <label class="form-label" style="color:#888; text-align:left;">Selecciona tu modelo actual:</label>
        <select id="user-unit" class="login-input">
            <option value="Duster">Duster</option>
            <option value="Kwid">Kwid</option>
            <option value="Kardian">Kardian</option>
            <option value="Stepway">Stepway</option>
        </select>
        <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
    </div>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA!</h1>
            <img id="main-car" src="" class="car-hero">
            <div id="tag-car" style="font-weight: 800; font-size: 1.3rem;">Tu Renault</div>
        </div>
        <div id="reminder-container"></div>
        <button class="btn-action btn-green" onclick="showPage('nuevos')">COTIZACIÓN</button>
    </div>

    <div id="p-citas" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">GESTIÓN DE SERVICIO</div>
        <div id="appointment-content"></div>
    </div>

    <div id="p-nuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">UNIDADES NUEVAS</div>
        <div id="cat-container">Cargando...</div>
    </div>

    <div id="p-seminuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">INVENTARIO SEMINUEVOS</div>
        <div id="semi-container">Cargando...</div>
    </div>

    <div id="modal-quote" class="modal">
        <div class="modal-content">
            <h3 id="m-title" style="color:#d4af37; margin-top:0;">COTIZAR</h3>
            <label class="form-label">Nombre del Cliente</label><input type="text" id="q-name" class="form-control">
            <label class="form-label">Teléfono</label><input type="tel" id="q-phone" class="form-control">
            <label class="form-label">CURP</label><input type="text" id="q-curp" class="form-control">
            <label class="form-label">RFC</label><input type="text" id="q-rfc" class="form-control">
            <label class="form-label">Enganche ($)</label><input type="number" id="q-down" class="form-control">
            <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()" style="margin-top:15px;">SOLICITAR</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#999; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
        <button class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
        <button class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
        <button class="nav-item" onclick="showPage('seminuevos', this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Seminuevos</button>
    </nav>

    <script>
        const API_BASE = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        const CARS = {
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Stepway": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/stepway-bja/stepway-card.png"
        };

        window.onload = () => {
            const user = localStorage.getItem('renault_user');
            if(user) {
                renderUser(JSON.parse(user));
                document.getElementById('login-screen').style.display = 'none';
                loadCat();
                loadSemi();
                updateAppointmentUI();
            }
        };

        function saveData() {
            const d = { name: document.getElementById('user-name').value, phone: document.getElementById('user-phone').value, unit: document.getElementById('user-unit').value };
            if(!d.name || !d.phone) return alert("Completa tus datos");
            localStorage.setItem('renault_user', JSON.stringify(d));
            renderUser(d);
            document.getElementById('login-screen').style.display = 'none';
            loadCat();
            loadSemi();
        }

        function renderUser(d) {
            document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
            document.getElementById('main-car').src = CARS[d.unit];
            document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
            document.getElementById('c-name').value = d.name;
            document.getElementById('c-phone').value = d.phone;
            document.getElementById('q-name').value = d.name;
            document.getElementById('q-phone').value = d.phone;
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
            window.scrollTo(0,0);

            if(id === 'citas') renderAppointmentPage();
        }

        /* --- LOGICA DE CITAS DINÁMICA --- */
       function renderAppointmentPage() {
            const data = localStorage.getItem('renault_appointment');
            const container = document.getElementById('appointment-content');
            
            if(data) {
                const app = JSON.parse(data);
                // Diseño mejorado para que coincida con la estética de la app
                container.innerHTML = `
                    <div class="card-white" style="text-align:center; margin-top: 20px;">
                        <div style="font-size: 3.5rem; margin-bottom: 10px;">📅</div>
                        <h3 style="margin:0; color:#000; font-weight: 900;">CITA CONFIRMADA</h3>
                        <p style="color:#666; font-size: 0.9rem; margin: 10px 0 20px 0;">Hemos recibido tu solicitud para el taller.</p>
                        
                        <div style="background:#f7f7f7; padding:20px; border-radius:20px; margin-bottom:20px; text-align:left; border: 1px solid #eee;">
                            <div style="color:#d4af37; font-size:0.7rem; font-weight:800; letter-spacing:1px; margin-bottom:5px;">DETALLES DEL SERVICIO</div>
                            <div style="font-size: 1.1rem; font-weight:bold; color:#000;">${app.fecha} a las ${app.hora} hrs</div>
                            <div style="color:#444; font-size:0.85rem; margin-top:8px; line-height:1.4;">
                                <strong>Motivo:</strong> ${app.falla || 'Revisión General'}
                            </div>
                        </div>

                        <button class="btn-action btn-yellow" style="padding:15px; font-size:1rem;" 
                            onclick="window.open('https://wa.me/522311234567?text=Hola, confirmo mi cita para el día ${app.fecha} a las ${app.hora}', '_blank')">
                            CONFIRMAR POR WHATSAPP
                        </button>
                        
                        <button class="btn-cancel" style="margin-top:20px; border:none; text-decoration:underline; font-weight:bold;" 
                            onclick="cancelAppointment()">CANCELAR ESTA CITA</button>
                    </div>
                `;
            } else {
                // Formulario original si no hay cita
                const user = JSON.parse(localStorage.getItem('renault_user') || '{}');
                container.innerHTML = `
                    <div class="card-white">
                        <label class="form-label">Nombre</label><input type="text" id="c-name" class="form-control" value="${user.name || ''}">
                        <label class="form-label">Teléfono</label><input type="tel" id="c-phone" class="form-control" value="${user.phone || ''}">
                        <label class="form-label">VIN (Número de Serie)</label><input type="text" id="c-vin" class="form-control" placeholder="17 caracteres">
                        <label class="form-label">Kilometraje Actual</label><input type="number" id="c-km" class="form-control" placeholder="Ej: 25000">
                        <label class="form-label">Detalles o fallas de la unidad</label>
                        <textarea id="c-obs" class="form-control" rows="3" placeholder="Describe aquí ruidos, fallas..."></textarea>
                        <label class="form-label">Fecha Preferida</label><input type="date" id="c-date" class="form-control">
                        <label class="form-label">Hora Preferida</label><input type="time" id="c-time" class="form-control">
                        <button id="btn-cita" class="btn-action btn-yellow" style="margin-top:15px;" onclick="handleBooking()">ENVIAR SOLICITUD</button>
                    </div>
                `;
            }
        }

        async function handleBooking() {
            const btn = document.getElementById('btn-cita');
            const appointment = {
                nombre: document.getElementById('c-name').value,
                telefono: document.getElementById('c-phone').value,
                vin: document.getElementById('c-vin').value,
                kilometraje: document.getElementById('c-km').value,
                falla: document.getElementById('c-obs').value,
                fecha: document.getElementById('c-date').value,
                hora: document.getElementById('c-time').value
            };

            if(!appointment.fecha || !appointment.hora) return alert("Selecciona fecha y hora");

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}?sheet=citas`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: [appointment]})
                });

                if (response.ok) {
                    localStorage.setItem('renault_appointment', JSON.stringify(appointment));
                    alert("¡Cita enviada con éxito!");
                    updateAppointmentUI();
                    showPage('inicio');
                }
            } catch(e) { alert("Error al enviar cita."); }
            finally {
                btn.innerText = "ENVIAR SOLICITUD";
                btn.disabled = false;
            }
        }

        function cancelAppointment() {
            if(confirm("¿Estás seguro de que deseas cancelar tu cita?")) {
                localStorage.removeItem('renault_appointment');
                renderAppointmentPage();
                updateAppointmentUI();
                alert("Cita cancelada.");
            }
        }

        function updateAppointmentUI() {
            const data = localStorage.getItem('renault_appointment');
            const container = document.getElementById('reminder-container');
            if(data) {
                const app = JSON.parse(data);
                container.innerHTML = `
                    <div id="appointment-reminder">
                        <div style="color:#d4af37; font-weight:900; font-size:0.8rem; margin-bottom:10px;">PRÓXIMA CITA</div>
                        <div style="font-size:1.2rem; font-weight:bold;">${app.fecha} | ${app.hora} hrs</div>
                        <div style="color:#888; font-size:0.85rem; margin-top:5px;">${app.falla || 'Revisión'}</div>
                        <button class="btn-cancel" style="border:1px solid var(--danger-red); margin-top:10px;" onclick="cancelAppointment()">CANCELAR CITA</button>
                    </div>`;
            } else { container.innerHTML = ''; }
        }

        /* --- CARGA DE EXCEL --- */
        async function loadCat() {
            try {
                const res = await fetch(`${API_BASE}?sheet=nuevos`);
                const data = await res.json();
                document.getElementById('cat-container').innerHTML = data.map(c => `
                    <div class="car-card">
                        <img src="${c.imagen || 'https://via.placeholder.com/300x150?text=Renault'}">
                        <h3 style="margin:15px 0 5px">${c.modelo}</h3>
                        <div style="color:#d4af37; font-weight:bold; margin-bottom:15px;">${c.precio}</div>
                        <button class="btn-action btn-yellow" onclick="openM('${c.modelo}')">COTIZAR</button>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('cat-container').innerText = "Error."; }
        }

        async function loadSemi() {
            try {
                const res = await fetch(`${API_BASE}?sheet=seminuevos`);
                const data = await res.json();
                document.getElementById('semi-container').innerHTML = data.map(s => `
                    <div class="car-card">
                        <h3 style="margin:5px 0; color:var(--renault-yellow)">${s.Versión || s.modelo}</h3>
                        <p style="margin:0; font-size:0.8rem; color:#888;">${s.Transmisión} | ${s.KM} KM</p>
                        <div style="color:#d4af37; font-weight:bold; margin:10px 0;">${s.Precio}</div>
                        <button class="btn-action btn-yellow" style="padding:10px; font-size:0.8rem;" onclick="openM('${s.Versión || s.modelo}')">ME INTERESA</button>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('semi-container').innerText = "Error."; }
        }

        async function handleQuote() {
            const btn = document.getElementById('btn-quote');
            const quote = {
                nombre: document.getElementById('q-name').value,
                telefono: document.getElementById('q-phone').value,
                modelo: document.getElementById('m-title').innerText,
                curp: document.getElementById('q-curp').value,
                rfc: document.getElementById('q-rfc').value,
                enganche: document.getElementById('q-down').value
            };
            btn.innerText = "ENVIANDO...";
            try {
                await fetch(`${API_BASE}?sheet=cotizaciones`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: [quote]})
                });
                alert("Cotización enviada.");
                closeM();
            } catch(e) { alert("Error."); }
            btn.innerText = "SOLICITAR";
        }

        function openM(t) { document.getElementById('m-title').innerText = t; document.getElementById('modal-quote').style.display = 'flex'; }
        function closeM() { document.getElementById('modal-quote').style.display = 'none'; }
    </script>
</body>
</html>
