<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán - App Premium</title>
    <style>
        /* --- 1. CSS (DISEÑO Y ESTILO) --- */
        :root {
            --accent: #FFCC00; /* Amarillo Renault */
            --accent-hover: #ffd633;
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #a1a1a6;
            --green-btn: #34c759;
            --green-hover: #30b151;
            --input-bg: #2c2c2e;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
            --transition: all 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 120px; /* Espacio para barra de navegación grande */
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Encabezado */
        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        /* Estilos Generales de Página */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; box-sizing: border-box; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tarjeta de Inicio (Dorada, idéntica a tu imagen) */
        .hero-card { 
            background: linear-gradient(180deg, #FFD700 0%, #b89400 100%); 
            border-radius: 30px; 
            padding: 30px 20px; 
            text-align: center; 
            color: #000; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            position: relative;
        }
        .hero-card h1 { font-size: 2.2rem; font-weight: 800; margin: 0 0 10px 0; text-transform: uppercase;}
        
        /* Contenedor del Auto con Animación 3D */
        .car-avatar-container { width: 100%; height: 220px; display: flex; justify-content: center; align-items: center; margin: 10px 0; perspective: 1000px; }
        .car-3d { 
            width: 280px; 
            max-width: 90%; 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4)); 
            animation: float 3.5s ease-in-out infinite; 
            transform-style: preserve-3d;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotateY(-5deg); } 50% { transform: translateY(-20px) rotateY(10deg); } }

        /* Botón COTIZACIÓN (Verde, grande, llamativo) */
        .btn-cotizacion { 
            background: linear-gradient(145deg, var(--green-btn), var(--green-hover)); 
            color: white; font-size: 1.8rem; font-weight: 900; padding: 22px; 
            border-radius: 20px; border: none; width: 100%; text-transform: uppercase; 
            margin-bottom: 15px; box-shadow: 0 8px 25px rgba(52, 199, 89, 0.3);
            transition: var(--transition); cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .btn-cotizacion:active { transform: scale(0.97); box-shadow: 0 4px 10px rgba(52, 199, 89, 0.2); }

        .btn-asesor { 
            background: transparent; color: var(--green-btn); border: 2px solid var(--green-btn); 
            padding: 15px; border-radius: 20px; width: 100%; font-weight: 700; font-size: 1.1rem;
            transition: var(--transition); cursor: pointer;
        }

        /* Sección de Nuevos (Inventario y Cuestionario) */
        h2.section-title { font-size: 1.6rem; color: var(--accent); margin: 0 0 25px 0; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;}
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .car-card { background-color: var(--card-bg); border-radius: 25px; padding: 20px; border: 1px solid #2c2c2e; transition: var(--transition); }
        .car-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .img-car { width: 100%; border-radius: 18px; margin-bottom: 15px; background-color: #000; min-height: 160px; object-fit: contain; }
        .car-card h3 { font-size: 1.4rem; margin: 0 0 8px 0; font-weight: 700; }
        .price-tag { color: var(--accent); font-weight: 800; font-size: 1.2rem; display: block; margin-bottom: 15px; }

        /* Cuestionario de Cotización (Modal Premium) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; overflow-y: auto; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); border-radius: 30px; padding: 30px; margin: 50px auto; width: 90%; max-width: 500px; position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; }

        /* Formulario Estilo Blanco (Citas) */
        .card-form { background-color: #ffffff; color: #000000; border-radius: 25px; padding: 25px; box-shadow: 0 15px 35px rgba(255,255,255,0.1); }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #333; }
        input, select, textarea { 
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; 
            background-color: #fdfdfd; color: #000; font-size: 1rem; box-sizing: border-box; transition: var(--transition);
        }
        input:focus, select:focus, textarea:focus { border-color: #888; outline: none; }
        textarea { resize: none; height: 100px; }

        /* Sistema de Horarios de Citas */
        .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 10px; }
        .time-slot { 
            background-color: #f0f0f0; border: 1px solid #ddd; padding: 12px; border-radius: 10px; 
            text-align: center; cursor: pointer; font-weight: 600; color: #333; transition: var(--transition);
        }
        .time-slot:hover { background-color: #e0e0e0; }
        .time-slot.selected { background-color: var(--accent); color: #000; border-color: #000; }
        .time-slot.occupied { background-color: #ffcccc; color: #cc0000; cursor: not-allowed; text-decoration: line-through; opacity: 0.6; }

        /* Barra de Navegación Grande (4 Iconos Premium SVG) */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 105px; 
            background: rgba(18, 18, 18, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #333; 
            display: flex; justify-content: space-around; align-items: center; 
            padding-bottom: env(safe-area-inset-bottom); z-index: 2000; box-sizing: border-box;
        }
        .nav-item { text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 700; flex: 1; -webkit-tap-highlight-color: transparent;}
        .nav-icon { width: 30px; height: 30px; fill: currentColor; display: block; margin: 0 auto 6px; }
        .nav-item.active { color: var(--accent); }

        /* Registro Inicial */
        #pantalla-registro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 40px; box-sizing: border-box; overflow-y: auto;}
    </style>
</head>
<body>

    <div id="pantalla-registro">
        <div class="logo" style="margin-bottom: 30px; text-align: center;">RENAULT | <span>TEZIUTLÁN</span></div>
        <input type="text" id="reg-nombre" placeholder="Nombre completo" style="margin-bottom:15px; background:var(--input-bg); border:none; color:#fff; padding:18px; border-radius:15px;">
        <select id="reg-modelo" style="margin-bottom:15px; background:var(--input-bg); border:none; color:#fff; padding:18px; border-radius:15px;">
            <option value="">¿Qué Renault manejas?</option>
            <option value="Kwid">Kwid</option><option value="Duster">Duster</option>
            <option value="Kardian">Kardian</option><option value="Oroch">Oroch</option>
        </select>
        <input type="text" id="reg-placa" placeholder="Placas" style="margin-bottom:25px; background:var(--input-bg); border:none; color:#fff; padding:18px; border-radius:15px;">
        <button onclick="registrar()" style="background:var(--accent); color:#000; padding:18px; border-radius:15px; font-weight:800; border:none; font-size:1.1rem; cursor:pointer;">ENTRAR A MI APP</button>
    </div>

    <header><div class="logo">RENAULT | <span>TEZIUTLÁN</span></div></header>

    <div id="inicio" class="page active">
        <div class="hero-card">
            <h1 id="usr-name">¡Hola!</h1>
            <div class="car-avatar-container" id="car-img"></div>
            <p id="usr-car" style="font-size: 1.1rem; font-weight: 700;"></p>
        </div>
        <button class="btn-cotizacion" onclick="abrirCuestionarioCotizacion()">COTIZACIÓN</button>
        <button class="btn-asesor" onclick="window.location.href='tel:2311234567'">📞 LLAMAR ASESOR</button>
    </div>

    <div id="catalogo" class="page">
        <h2 class="section-title">Nuevos Modelos 2026</h2>
        <div id="inventario-nuevos" class="inventory-grid"></div>
    </div>

    <div id="modal-cotizacion" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <h2 style="color:var(--accent); margin-top:0;">Cuestionario de Cotización</h2>
            <p style="color:var(--text-muted);">Llena estos datos para recibir tu cotización al instante.</p>
            <div class="form-group"><label style="color:#fff">Modelo de Interés</label><input type="text" id="c-modelo" style="background:var(--input-bg); color:#fff; border:none;"></div>
            <div class="form-group"><label style="color:#fff">Monto de Enganche ($)</label><input type="number" id="c-enganche" style="background:var(--input-bg); color:#fff; border:none;"></div>
            <div class="form-group"><label style="color:#fff">Plazo deseado (meses)</label><select id="c-plazo" style="background:var(--input-bg); color:#fff; border:none;"><option>24</option><option>36</option><option>48</option><option>60</option><option>72</option></select></div>
            <div class="form-group"><label style="color:#fff">Estado Crediticio</label><select id="c-buro" style="background:var(--input-bg); color:#fff; border:none;"><option>Excelente</option><option>Regular</option><option>Sin Historial</option></select></div>
            <button onclick="enviarCotizacion()" style="background:var(--green-btn); color:white; width:100%; padding:15px; border-radius:12px; border:none; font-weight:800; font-size:1.1rem;">ENVIAR DATOS</button>
        </div>
    </div>

    <div id="citas" class="page">
        <div class="card-form">
            <h2 style="color:#000; margin-top:0; text-transform:uppercase;">Agendar Cita</h2>
            <div class="form-group"><label>Fecha deseada</label><input type="date" id="f-fec" onchange="cargarHorarios()"></div>
            <div class="form-group">
                <label>Selecciona tu horario:</label>
                <div id="horarios-grid" class="time-grid"></div>
                <input type="hidden" id="f-hor-selected">
            </div>
            <div class="form-group"><label>Nombre del Cliente</label><input type="text" id="f-nom"></div>
            <div class="form-group"><label>Teléfono</label><input type="tel" id="f-tel"></div>
            <div class="form-group"><label>Placa</label><input type="text" id="f-pla"></div>
            <button onclick="enviarCita()" style="background:#000; color:#fff; width:100%; padding:18px; border-radius:15px; border:none; font-weight:800; font-size:1.1rem; text-transform:uppercase;">SOLICITAR CITA</button>
        </div>
    </div>

    <div id="seminuevos" class="page">
        <h2 class="section-title">Seminuevos Certificados</h2>
        <p style="text-align:center; color:var(--text-muted);">Inventario próximamente disponible...</p>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('inicio', 0)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>INICIO
        </div>
        <div class="nav-item" onclick="nav('catalogo', 1)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>NUEVOS
        </div>
        <div class="nav-item" onclick="nav('citas', 2)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>CITAS
        </div>
        <div class="nav-item" onclick="nav('seminuevos', 3)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2.9 2 2 2-.9 2-2 2z"/></svg>SEMINUEVOS
        </div>
    </nav>

    <script>
        const API_BASE = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        
        // Imágenes directas y estables (Renault Oficial)
        const imagenesCoche = {
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Oroch": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/oroch-hjd-ph2/oroch-card.png"
        };

        function registrar() {
            const n = document.getElementById('reg-nombre').value;
            const m = document.getElementById('reg-modelo').value;
            const p = document.getElementById('reg-placa').value;
            if(!n || !m) return alert("Completa los datos requeridos.");
            localStorage.setItem('nom', n);
            localStorage.setItem('mod', m);
            localStorage.setItem('pla', p);
            location.reload();
        }

        window.onload = () => {
            const n = localStorage.getItem('nom');
            if(n) {
                document.getElementById('pantalla-registro').style.display = 'none';
                document.getElementById('usr-name').innerText = "¡HOLA, " + n.toUpperCase() + "!";
                const mod = localStorage.getItem('mod');
                document.getElementById('usr-car').innerText = mod + " | " + localStorage.getItem('pla');
                document.getElementById('car-img').innerHTML = `<img src="${imagenesCoche[mod] || imagenesCoche['Duster']}" class="car-3d">`;
                
                // Pre-llenar Citas
                document.getElementById('f-nom').value = n;
                document.getElementById('f-pla').value = localStorage.getItem('pla');
                
                cargarCatalogo();
            }
        }

        // Cargar Catálogo (Solución al error de imágenes)
        async function cargarCatalogo() {
            try {
                const r = await fetch(API_BASE);
                const data = await r.json();
                const cont = document.getElementById('inventario-nuevos');
                cont.innerHTML = "";
                data.forEach(c => {
                    cont.innerHTML += `
                        <div class="car-card">
                            <img src="${c.imagen}" class="img-car" onerror="this.src='${imagenesCoche['Duster']}'">
                            <h3>${c.modelo}</h3>
                            <span class="price-tag">Desde ${c.precio}</span>
                            <button onclick="abrirCuestionarioCotizacion('${c.modelo}')" style="background:var(--accent); color:#000; border:none; padding:12px; border-radius:10px; width:100%; font-weight:700; cursor:pointer;">COTIZAR AHORA</button>
                        </div>
                    `;
                });
            } catch(e) { document.getElementById('inventario-nuevos').innerText = "Catálogo temporalmente no disponible."; }
        }

        // Cuestionario Cotización
        function abrirCuestionarioCotizacion(modelo = "Nueva Unidad") {
            document.getElementById('c-modelo').value = modelo;
            document.getElementById('modal-cotizacion').style.display = 'block';
        }
        function cerrarModal() { document.getElementById('modal-cotizacion').style.display = 'none'; }
        function enviarCotizacion() { alert("Datos enviados para tu cotización experta."); cerrarModal(); nav('inicio', 0); }

        // Sistema de Citas (Horarios bloqueados)
        function cargarHorarios() {
            const grid = document.getElementById('horarios-grid');
            grid.innerHTML = "";
            const horas = ["09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "04:00 PM", "05:00 PM", "06:00 PM"];
            // Simulación de horas ocupadas para la fecha seleccionada
            const ocupadas = ["10:00 AM", "04:00 PM"];

            horas.forEach(h => {
                const isOcupada = ocupadas.includes(h);
                const slot = document.createElement('div');
                slot.className = `time-slot ${isOcupada ? 'occupied' : ''}`;
                slot.innerText = h;
                if(!isOcupada) {
                    slot.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                        slot.classList.add('selected');
                        document.getElementById('f-hor-selected').value = h;
                    };
                }
                grid.appendChild(slot);
            });
        }
        function enviarCita() { alert("Cita solicitada exitosamente."); nav('inicio', 0); }

        function nav(p, i) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-item')[i].classList.add('active');
        }
    </script>
</body>
</html>
