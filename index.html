<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
            --card-dark: #121212;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--dark-bg); 
            /* Textura sutil de fondo */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--white); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        
        header { 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky; 
            top: 0; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(10px);
            z-index: 2000; 
        }

        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; }
        .v-line { width: 1px; height: 18px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.4s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NUEVA TARJETA DE INICIO ESTILO PREMIUM */
        .card-profile { 
            background: transparent;
            padding: 20px 0; 
            text-align: center; 
        }

        #greet { 
            font-size: 1.8rem; 
            letter-spacing: 2px; 
            color: #d4af37; 
            margin-bottom: 5px;
            font-weight: 900;
        }

        .user-name-subtitle {
            font-size: 1.2rem;
            color: var(--white);
            margin-bottom: 20px;
            font-weight: 300;
        }

        .car-hero-container {
            position: relative;
            background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
            padding: 20px 0;
            margin: 20px 0;
        }

        .car-hero { 
            width: 100%; 
            max-width: 320px; 
            margin: 0 auto; 
            display: block; 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); 
        }

        /* RECORDATORIO DE CITA ESTILO PREMIUM */
        #appointment-reminder { 
            background: none;
            padding: 15px; 
            margin-top: 20px; 
            text-align: center; 
            border-top: 1px solid #222;
        }

        .cita-label { color: var(--gray-text); font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 5px; }
        .cita-info { font-size: 1.1rem; font-weight: bold; color: var(--white); }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-green { background: transparent; color: var(--gray-text); border: 1px solid #333; margin-top: 30px; font-weight: 400; text-transform: none; }
        .btn-yellow { background: var(--gold-gradient); color: #000; }

        .btn-whatsapp-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000; text-decoration: none; }
        .btn-whatsapp-float svg { width: 30px; height: 30px; fill: currentColor; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(13, 13, 13, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { text-align: center; color: #444; text-decoration: none; font-size: 0.65rem; font-weight: 600; flex: 1; background: none; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 6px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        .car-card { background: #0a0a0a; border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .car-card img { width: 100%; border-radius: 15px; background: #111; }
        
        /* MODALES */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #222; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; color: #fff; }
        .form-control, .login-input { width: 100%; padding: 16px; border: 1px solid #222; border-radius: 12px; background: #0a0a0a; color: #fff; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .form-label { display: block; font-size: 0.7rem; color: #888; margin: 10px 0 5px 5px; text-transform: uppercase; }

        /* STEPPER Y PREMIUM SERVICE */
        .stepper-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px; position: relative; }
        .step-line { position: absolute; top: 15px; left: 10%; right: 10%; height: 1px; background: #222; z-index: 1; }
        .stepper-item { text-align: center; z-index: 2; flex: 1; position: relative; }
        .step-circle { width: 30px; height: 30px; border-radius: 50%; background: #000; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; color: #444; font-size: 0.7rem; }
        .stepper-item.active .step-circle { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.1); }
        .step-label { font-size: 0.6rem; text-transform: uppercase; color: #444; }
        .stepper-item.active .step-label { color: #d4af37; }

        .premium-card-service { background: #080808; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; text-align: center; }
        .info-row-service { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 12px 0; font-size: 0.85rem; }
        .info-label-service { color: #555; }
        .btn-premium-action { display: flex; align-items: center; gap: 15px; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-decoration: none; color: #fff; }
        .icon-circle-service { width: 35px; height: 35px; background: rgba(212,175,55,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #d4af37; }
        .action-text-service strong { display: block; font-size: 0.85rem; }
        .action-text-service small { font-size: 0.65rem; color: #555; }
        .btn-cancel-modern { background: none; border: none; color: #444; padding: 15px; width: 100%; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<a id="wa-bubble" href="https://wa.me/522312333467?text=Hola,%20necesito%20asesoría%20personalizada." class="btn-whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
    <label class="form-label" style="text-align:left">Selecciona tu Renault actual:</label>
    <select id="user-unit" class="login-input">
        <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
        <option value="Duster">Duster</option><option value="Stepway">Stepway</option>
        <option value="Oroch">Oroch</option><option value="Koleos">Koleos</option>
        <option value="Megane E-Tech">Megane E-Tech</option>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="card-profile">
        <div id="greet">¡BIENVENIDO!</div>
        <div id="user-display-name" class="user-name-subtitle">CARGANDO...</div>
        
        <div class="car-hero-container">
            <img id="main-car" src="" class="car-hero" alt="Tu Renault" onerror="this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        </div>
    </div>

    <div id="reminder-container"></div>

    <div style="text-align:center; margin-top:20px;">
        <span style="display:block; font-size:0.7rem; color:#444; letter-spacing:1px; margin-bottom:15px">Calidad Renault, Teziutlán Premium</span>
        <button style="background:none; border:none; color:#d4af37; text-decoration:underline; font-size:0.8rem; cursor:pointer" onclick="showPage('nuevos')">Ver Catálogo Completo →</button>
    </div>

    <a class="btn-premium-action" style="margin-top:40px; justify-content:center" href="https://wa.me/522312333467" target="_blank">
        <div class="icon-circle-service">💬</div>
        <div class="action-text-service"><strong>Consultar Asesor Técnico</strong></div>
    </a>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px;letter-spacing:1px">GESTIÓN DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <div id="cat-container"></div>
</div>

<div id="p-seminuevos" class="page">
    <div id="semi-container"></div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Vehicles</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>Dates</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Pre-Owned</button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS0wO4YdetIsGIaK08WsGEpLc2Ad5k-Fdk5kD4lbEdlb7YLRaoxx4Gk_JwYrrgiQ/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png";

function saveData() {
    const name = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit = document.getElementById('user-unit').value;
    if (!name || !phone) { alert("Completa tus datos"); return; }
    const userData = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(userData));
    renderUser(userData);
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('user-display-name').innerText = d.name.toUpperCase();
    const slug = d.unit.toLowerCase().trim().replace(/\s+/g, '-');
    document.getElementById('main-car').src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) el.classList.add('active');
    if (id === 'citas') renderAppointmentPage();
}

function updateAppointmentUI() {
    const data = localStorage.getItem('renault_appointment');
    const el = document.getElementById('reminder-container');
    if (data) {
        const a = JSON.parse(data);
        el.innerHTML = `<div id="appointment-reminder">
            <div class="cita-label">PRÓXIMA CITA</div>
            <div class="cita-info">${a.fecha} | ${a.hora} HRS</div>
        </div>`;
    } else { el.innerHTML = ''; }
}

function renderAppointmentPage() {
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    if (data) {
        const a = JSON.parse(data);
        const slug = a.unidad.toLowerCase().trim().replace(/\s+/g, '-');
        cont.innerHTML = `
            <div class="stepper-container">
                <div class="step-line"></div>
                <div class="stepper-item active"><div class="step-circle">✓</div><div class="step-label">Agendado</div></div>
                <div class="stepper-item"><div class="step-circle">2</div><div class="step-label">Confirmado</div></div>
                <div class="stepper-item"><div class="step-circle">3</div><div class="step-label">En Taller</div></div>
            </div>
            <div class="premium-card-service">
                <img src="https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png" style="width:100%; max-width:200px" onerror="this.src='${PLACEHOLDER}'">
                <div style="color:#d4af37; font-weight:900; margin:15px 0">TU ${a.unidad.toUpperCase()}</div>
                <div class="info-row-service"><span class="info-label-service">FECHA</span> <span>${a.fecha}</span></div>
                <div class="info-row-service"><span class="info-label-service">HORA</span> <span>${a.hora} HRS</span></div>
                <div class="info-row-service"><span class="info-label-service">KM</span> <span>${a.kilometraje}</span></div>
            </div>
            <button class="btn-cancel-modern" onclick="cancelarCita()">Cancelar Cita</button>
        `;
    } else {
        cont.innerHTML = `<div style="padding:20px; text-align:center; color:#555">No tienes citas agendadas.</div>`;
    }
}

async function initAppData() {
    updateAppointmentUI();
}

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        renderUser(JSON.parse(raw));
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};
</script>
</body>
</html>
