<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dental K'</title>
<style>
  :root {
    --purple-dark:#4b3267;
    --purple-mid:#7d63a8;
    --purple-light:#cdbde8;
    --purple-bg:#e9e0f7;
    --purple-bg2:#d9cdf0;
    --green:#25D366;
    --text-dark:#2d2436;
    --white:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
  body{
    font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background:#e0e0e0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:420px;
    height:100vh;
    max-height:850px;
    background:var(--purple-bg);
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
  }
  .content-area{
    flex:1;
    overflow-y:auto;
    padding:20px;
    padding-bottom:100px; /* Espacio para el nav */
  }
  .screen{ display:none; flex-direction:column; }
  .screen.active{ display:flex; }

  /* Nuevo Estilo Logotipo */
  .logo-wrap{ display:flex; flex-direction:column; align-items:center; margin:15px 0; }
  .logo-svg { width: 80px; height: 80px; fill: var(--purple-mid); }
  .logo-name{ font-size:24px; font-weight:900; color:var(--purple-dark); letter-spacing:1px; }

  /* Elementos UI */
  .card{ background:var(--white); border-radius:20px; padding:20px; margin-bottom:16px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
  h2.title{ font-size:20px; color:var(--purple-dark); margin-bottom:15px; }
  .btn{ width:100%; border:none; border-radius:12px; padding:14px; font-weight:700; cursor:pointer; margin-top:10px; }
  .btn-primary{ background:var(--purple-dark); color:var(--white); }
  
  /* Navegación Fija */
  .bottom-nav{
    position:absolute;
    bottom:0;
    width:100%;
    background:var(--white);
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid #eee;
    z-index:100;
  }
  .nav-item{ display:flex; flex-direction:column; align-items:center; border:none; background:none; color:#aaa; font-size:10px; font-weight:600; cursor:pointer; }
  .nav-item.active{ color:var(--purple-dark); }
  .nav-item svg{ width:24px; height:24px; margin-bottom:2px; }

  .whatsapp-btn{ position:fixed; bottom:90px; right:20px; background:var(--green); color:white; padding:15px; border-radius:50%; box-shadow:0 4px 10px rgba(0,0,0,0.3); z-index:99; }
</style>
</head>
<body>

<div class="app">
  <div class="content-area">
    
    <!-- INICIO -->
    <section class="screen active" id="inicio">
      <div class="logo-wrap">
        <!-- Logotipo mejorado: Diente estilizado -->
        <svg class="logo-svg" viewBox="0 0 24 24"><path d="M12 2C8.69 2 6 4.69 6 8v2c0 2.21 1.79 4 4 4h4c2.21 0 4-1.79 4-4V8c0-3.31-2.69-6-6-6zm0 16c-3.31 0-6 2.69-6 6h12c0-3.31-2.69-6-6-6z"/></svg>
        <div class="logo-name">DENTAL K'</div>
      </div>
      <div class="card">
        <h3>¡Bienvenida!</h3>
        <p>Tu próxima cita: 15 Junio, 16:00 HRS</p>
        <button class="btn btn-primary">Confirmar Asistencia</button>
      </div>
    </section>

    <!-- SERVICIOS -->
    <section class="screen" id="servicios">
      <h2 class="title">Nuestros Tratamientos</h2>
      <!-- ... contenido de servicios ... -->
    </section>

    <!-- CITAS -->
    <section class="screen" id="citas">
      <h2 class="title">Tus Citas</h2>
    </section>

    <!-- PERFIL -->
    <section class="screen" id="perfil">
      <h2 class="title">Mi Perfil</h2>
    </section>
  </div>

  <!-- NAVEGACIÓN -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navigate('inicio', this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio
    </button>
    <button class="nav-item" onclick="navigate('servicios', this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>Servicios
    </button>
    <button class="nav-item" onclick="navigate('citas', this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>Citas
    </button>
    <button class="nav-item" onclick="navigate('perfil', this)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Perfil
    </button>
  </nav>
</div>

<script>
  function navigate(id, btn){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }
</script>
</body>
</html>
