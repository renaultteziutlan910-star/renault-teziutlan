<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán - Premium App</title>
    <style>
        :root { --accent: #FFCC00; --bg: #000; --card: #1c1c1e; --text: #fff; --muted: #8e8e93; --green: #28a745; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 120px; }
        
        header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Inicio Premium */
        .hero-card { 
            background: linear-gradient(180deg, #FFD700 0%, #b89400 100%); 
            border-radius: 30px; padding: 30px 20px; text-align: center; color: #000; margin-bottom: 20px;
        }
        .car-avatar { width: 100%; height: 180px; display: flex; justify-content: center; align-items: center; margin: 15px 0; }
        .car-3d { width: 260px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .btn-cotizacion { 
            background: var(--green); color: white; font-size: 1.6rem; font-weight: 900; padding: 22px; 
            border-radius: 20px; border: none; width: 100%; text-transform: uppercase; margin-bottom: 15px;
        }

        /* Formulario Estilo Blanco */
        .card-form { background: #fff; color: #000; border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.85rem; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 12px; font-size: 1rem; box-sizing: border-box;
        }

        /* Barra de Navegación con SVG (No falla) */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 100px; 
            background: #111; border-top: 1px solid #333; 
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-item { text-align: center; color: var(--muted); text-decoration: none; font-size: 0.65rem; font-weight: 700; flex: 1; }
        .nav-icon { width: 28px; height: 28px; fill: currentColor; display: block; margin: 0 auto 5px; }
        .nav-item.active-nav { color: var(--accent); }

        /* Slot de Horas Ocupadas */
        .time-slot { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 5px; display: inline-block; cursor: pointer; }
        .time-slot.occupied { background: #ff4444; color: white; cursor: not-allowed; opacity: 0.5; }
        .time-slot.selected { background: var(--accent); color: black; border-color: black; }

        #pantalla-registro { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
            z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 30px; box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <div id="pantalla-registro">
        <div class="logo" style="margin-bottom: 30px; text-align: center;">RENAULT | <span>TEZIUTLÁN</span></div>
        <input type="text" id="reg-nombre" placeholder="Nombre completo" style="margin-bottom:10px;">
        <select id="reg-modelo" style="margin-bottom:10px;">
            <option value="">¿Qué Renault manejas?</option>
            <option value="Kwid">Kwid</option><option value="Duster">Duster</option>
            <option value="Kardian">Kardian</option><option value="Oroch">Oroch</option>
        </select>
        <input type="text" id="reg-placa" placeholder="Placas" style="margin-bottom:20px;">
        <button onclick="registrar()" style="background:var(--accent); padding:18px; border-radius:15px; font-weight:900; border:none;">ENTRAR</button>
    </div>

    <header><div class="logo">RENAULT | <span>TEZIUTLÁN</span></div></header>

    <div id="inicio" class="page active">
        <div class="hero-card">
            <h1 id="usr-name" style="margin:0;">¡Hola!</h1>
            <div class="car-avatar" id="car-img"></div>
            <p id="usr-car" style="font-weight: 800;"></p>
        </div>
        <button class="btn-cotizacion" onclick="abrirCotizador()">COTIZACIÓN</button>
        <button style="background:transparent; color:var(--green); border:2px solid var(--green); padding:15px; width:100%; border-radius:20px; font-weight:bold;" onclick="window.location.href='tel:2311234567'">📞 LLAMAR ASESOR</button>
    </div>

    <div id="catalogo" class="page">
        <div id="seccion-inventario">
            <h2>Inventario 2026</h2>
            <div id="lista-nuevos">Cargando...</div>
        </div>
        
        <div id="seccion-cotizar" style="display:none;">
            <button onclick="cerrarCotizador()" style="background:#333; color:white; border:none; padding:10px; border-radius:10px; margin-bottom:15px;">← Volver</button>
            <div class="card-form">
                <h3 id="cot-modelo-titulo">Cotizar Unidad</h3>
                <div class="form-group">
                    <label>Enganche Sugerido (Min. 20%)</label>
                    <input type="number" id="c-enganche" placeholder="$0.00">
                </div>
                <div class="form-group">
                    <label>Plazo (Meses)</label>
                    <select id="c-plazo">
                        <option value="12">12 meses</option><option value="24">24 meses</option>
                        <option value="36">36 meses</option><option value="48" selected>48 meses</option>
                        <option value="60">60 meses</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>¿Cómo está tu Buró de Crédito?</label>
                    <select id="c-buro"><option>Excelente</option><option>Regular</option><option>Sin Historial</option></select>
                </div>
                <button onclick="enviarCotizacion()" style="background:var(--green); color:white; width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold;">SOLICITAR CRÉDITO</button>
            </div>
        </div>
    </div>

    <div id="citas" class="page">
        <div class="card-form">
            <h2>Agendar Cita</h2>
            <div class="form-group"><label>Fecha</label><input type="date" id="f-fec" onchange="actualizarHorarios()"></div>
            <div class="form-group">
                <label>Selecciona un horario disponible:</label>
                <div id="horarios-grid">
                    </div>
            </div>
            <input type="hidden" id="f-hor-selected">
            <button onclick="enviarCita()" style="background:#000; color:#fff; width:100%; padding:18px; border-radius:12px; border:none; font-weight:bold;">AGENDAR AHORA</button>
        </div>
    </div>

    <div id="seminuevos" class="page">
        <h2>Seminuevos</h2>
        <div id="lista-seminuevos">Próximamente...</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active-nav" onclick="nav('inicio', 0)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>INICIO
        </div>
        <div class="nav-item" onclick="nav('catalogo', 1)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>NUEVOS
        </div>
        <div class="nav-item" onclick="nav('citas', 2)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>CITAS
        </div>
        <div class="nav-item" onclick="nav('seminuevos', 3)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2.9 2 2 2-.9 2-2 2z"/></svg>SEMINUEVOS
        </div>
    </nav>

    <script>
        const API_DB = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        const imgs = {
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Oroch": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/oroch-hjd-ph2/oroch-card.png"
        };

        function registrar() {
            const n = document.getElementById('reg-nombre').value;
            const m = document.getElementById('reg-modelo').value;
            const p = document.getElementById('reg-placa').value;
            if(!n || !m) return alert("Llena los datos");
            localStorage.setItem('u_nom', n);
            localStorage.setItem('u_mod', m);
            localStorage.setItem('u_pla', p);
            location.reload();
        }

        window.onload = () => {
            const n = localStorage.getItem('u_nom');
            if(n) {
                document.getElementById('pantalla-registro').style.display = 'none';
                document.getElementById('usr-name').innerText = "¡Hola, " + n.split(' ')[0] + "!";
                const mod = localStorage.getItem('u_mod');
                document.getElementById('usr-car').innerText = mod + " | " + localStorage.getItem('u_pla');
                document.getElementById('car-img').innerHTML = `<img src="${imgs[mod] || imgs['Duster']}" class="car-3d" onerror="this.src='https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png'">`;
                cargarInventario();
            }
        }

        async function cargarInventario() {
            try {
                const res = await fetch(API_DB);
                const data = await res.json();
                const lista = document.getElementById('lista-nuevos');
                lista.innerHTML = "";
                data.forEach(c => {
                    lista.innerHTML += `
                    <div style="background:var(--card); border-radius:20px; padding:15px; margin-bottom:20px; border:1px solid #333;">
                        <img src="${c.imagen}" style="width:100%; border-radius:15px; margin-bottom:10px;">
                        <h3 style="margin:0">${c.modelo}</h3>
                        <p style="color:var(--accent); font-weight:800; margin:5px 0;">Desde ${c.precio}</p>
                        <button onclick="abrirCotizador('${c.modelo}')" style="background:var(--accent); color:black; border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold;">COTIZAR ESTA UNIDAD</button>
                    </div>`;
                });
            } catch(e) { document.getElementById('lista-nuevos').innerText = "Error al cargar inventario."; }
        }

        function abrirCotizador(modelo = "Nueva Unidad") {
            nav('catalogo', 1);
            document.getElementById('seccion-inventario').style.display = 'none';
            document.getElementById('seccion-cotizar').style.display = 'block';
            document.getElementById('cot-modelo-titulo').innerText = "Cotizar " + modelo;
        }

        function cerrarCotizador() {
            document.getElementById('seccion-inventario').style.display = 'block';
            document.getElementById('seccion-cotizar').style.display = 'none';
        }

        function actualizarHorarios() {
            const grid = document.getElementById('horarios-grid');
            grid.innerHTML = "";
            // Ejemplo de horarios (esto debería venir de tu SheetDB en el futuro)
            const horas = ["09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "04:00 PM", "05:00 PM"];
            const ocupadas = ["10:00 AM"]; // Aquí simulas una hora ya tomada

            horas.forEach(h => {
                const isOccupied = ocupadas.includes(h);
                const div = document.createElement('div');
                div.className = `time-slot ${isOccupied ? 'occupied' : ''}`;
                div.innerText = h;
                if(!isOccupied) {
                    div.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                        div.classList.add('selected');
                        document.getElementById('f-hor-selected').value = h;
                    };
                }
                grid.appendChild(div);
            });
        }

        function nav(p, i) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-nav'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-item')[i].classList.add('active-nav');
        }

        function enviarCotizacion() {
            alert("¡Perfecto! Hemos recibido tu solicitud de cotización con el enganche deseado. Un asesor financiero te contactará para cerrar la venta.");
            cerrarCotizador();
            nav('inicio', 0);
        }

        function enviarCita() {
            if(!document.getElementById('f-hor-selected').value) return alert("Por favor selecciona una hora disponible.");
            alert("Cita agendada con éxito.");
            nav('inicio', 0);
        }
    </script>
</body>
</html>
