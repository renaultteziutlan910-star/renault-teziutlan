<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
            --card-bg: #111111;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        
        /* HEADER */
        header { padding: 25px 0; text-align: center; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 3px; font-size: 0.9rem; }
        .v-line { width: 1px; height: 18px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        /* PÁGINAS GENERAL */
        .page { display: none; padding: 10px 20px 140px 20px; animation: fadeIn 0.4s ease-out; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NUEVO DISEÑO INICIO (PROPUESTA) */
        .welcome-container { text-align: left; margin-bottom: 25px; margin-top: 10px; }
        .welcome-text { font-size: 0.8rem; color: var(--gray-text); font-weight: 700; letter-spacing: 2px; margin-bottom: 5px; }
        .user-name-title { font-size: 2.2rem; font-weight: 900; color: var(--white); margin: 0; line-height: 1; }

        .hero-card { position: relative; background: radial-gradient(circle at center, #222 0%, #000 100%); border-radius: 40px; padding: 20px; margin-bottom: 20px; overflow: hidden; border: 1px solid #222; text-align: center; }
        .car-hero { width: 100%; max-width: 320px; margin: 10px auto; display: block; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); transition: transform 0.3s ease; }
        .car-hero:active { transform: scale(1.05); }
        .car-tag-badge { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 50px; display: inline-block; font-weight: 800; font-size: 0.8rem; border: 1px solid rgba(212,175,55,0.3); color: #d4af37; margin-top: -10px; position: relative; }

        .status-card { background: var(--card-bg); border-radius: 30px; padding: 25px; border: 1px solid #222; margin-bottom: 20px; }
        .status-header { color: #d4af37; font-weight: 900; font-size: 0.75rem; letter-spacing: 1.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .status-header::before { content: ''; width: 8px; height: 8px; background: #d4af37; border-radius: 50%; box-shadow: 0 0 8px #d4af37; }
        .status-value { font-size: 1.2rem; font-weight: 800; color: var(--white); }

        .btn-catalog-modern { background: var(--gold-gradient); color: #000; border: none; border-radius: 22px; padding: 20px; width: 100%; font-weight: 900; font-size: 1rem; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(212,175,55,0.2); cursor: pointer; }

        /* ESTILOS EXISTENTES MANTENIDOS */
        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-whatsapp-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000; text-decoration: none; transition: 0.3s; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { text-align: center; color: #444; text-decoration: none; font-size: 0.65rem; font-weight: 700; flex: 1; background: none; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 6px; display: block; margin: 0 auto; opacity: 0.6; }
        .nav-item.active { color: #d4af37; }
        .nav-item.active svg { opacity: 1; }
        
        .car-card { background: #111; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #222; }
        .car-card img { width: 100%; border-radius: 20px; aspect-ratio: 16/9; object-fit: cover; background: #1a1a1a; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 35px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; position: relative; }
        
        /* ESTILOS DE CITAS MANTENIDOS */
        .stepper-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px; position: relative; margin-top: 10px; }
        .step-line { position: absolute; top: 15px; left: 10%; right: 10%; height: 2px; background: #333; z-index: 1; }
        .stepper-item { text-align: center; z-index: 2; flex: 1; position: relative; }
        .step-circle { width: 32px; height: 32px; border-radius: 50%; background: #222; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #444; color: #888; font-size: 0.8rem; font-weight: bold; }
        .stepper-item.active .step-circle { background: var(--gold-gradient); border-color: #f5d17a; color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .step-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #555; }
        .stepper-item.active .step-label { color: #d4af37; }
        .premium-card-service { background: #111; border: 1px solid #222; border-radius: 25px; padding: 25px; margin-bottom: 20px; text-align: center; }
        .info-row-service { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 12px 0; font-size: 0.9rem; }
        .info-label-service { color: var(--gray-text); font-weight: 600; }
        .btn-premium-action { display: flex; align-items: center; gap: 15px; background: #111; border: 1px solid #222; padding: 15px; border-radius: 18px; margin-bottom: 12px; text-decoration: none; color: #fff; }
        .icon-circle-service { width: 40px; height: 40px; background: rgba(212,175,55,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #d4af37; }
    </style>
</head>
<body>

<a id="wa-bubble" href="https://wa.me/522312333467" class="btn-whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
    <label class="form-label" style="color:#888;text-align:left">Selecciona tu Renault actual:</label>
    <select id="user-unit" class="login-input">
        <optgroup label="Modelos Actuales">
            <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
            <option value="Duster">Duster</option><option value="Stepway">Stepway</option>
            <option value="Oroch">Oroch</option><option value="Koleos">Koleos</option>
            <option value="Master">Master</option><option value="Kangoo">Kangoo</option>
            <option value="Megane E-Tech">Megane E-Tech</option>
        </optgroup>
        <optgroup label="Modelos Anteriores">
            <option value="Clio">Clio</option><option value="Sandero">Sandero</option>
            <option value="Logan">Logan</option><option value="Captur">Captur</option>
            <option value="Fluence">Fluence</option><option value="Safrane">Safrane</option>
            <option value="Scala">Scala</option><option value="Megane">Megane (Gasolina)</option>
            <option value="Scenic">Scenic</option>
        </optgroup>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="welcome-container">
        <div class="welcome-text">BIENVENIDO</div>
        <h1 id="greet" class="user-name-title">USUARIO</h1>
    </div>

    <div class="hero-card">
        <img id="main-car" src="" class="car-hero" alt="Tu Renault"
            onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        <div id="tag-car" class="car-tag-badge">TU RENAULT</div>
    </div>

    <div id="reminder-container"></div>

    <button class="btn-catalog-modern" onclick="showPage('nuevos')">
        EXPLORAR CATÁLOGO 
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
    </button>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">GESTIÓN DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:8px">UNIDADES NUEVAS</div>
    <div id="cat-container"><div style="padding:40px;text-align:center;color:#555">Cargando catálogo premium...</div></div>
</div>

<div id="p-seminuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">INVENTARIO SEMINUEVOS</div>
    <div id="semi-container"><div style="padding:40px;text-align:center;color:#555">Cargando inventario...</div></div>
</div>

<div id="modal-desc" class="modal">
    <div class="modal-content">
        <button onclick="closeDesc()" style="position:absolute;right:20px;top:20px;border:none;background:none;font-size:1.5rem;z-index:10;cursor:pointer">✕</button>
        <img id="desc-img" src="" style="width:100%;border-radius:20px;margin-bottom:15px;aspect-ratio:16/9;object-fit:cover;background:#eee"
            onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        <div id="desc-title" class="desc-title">MODELO</div>
        <div id="desc-text" class="desc-text"></div>
        <button class="btn-action btn-yellow" id="btn-desc-quote" onclick="openM(currentVehicleSelected)">COTIZAR AHORA</button>
    </div>
</div>

<div id="modal-quote" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="color:#d4af37;margin-top:0">COTIZAR</h3>
        <label class="form-label">Nombre del Cliente</label><input type="text" id="q-name" class="form-control">
        <label class="form-label">Teléfono</label><input type="tel" id="q-phone" class="form-control">
        <label class="form-label">Código Postal</label><input type="number" id="q-cp" class="form-control">
        <label class="form-label">Método de Pago</label>
        <select id="q-metodo" class="form-control" onchange="toggleFinanzas()">
            <option value="Contado">A Contado</option><option value="Financiado">Financiado</option>
        </select>
        <div id="campo-finanzas" style="display:none">
            <label class="form-label">Enganche ($)</label><input type="number" id="q-down" class="form-control">
            <label class="form-label">Plazo (Meses)</label>
            <select id="q-meses" class="form-control">
                <option value="12">12 Meses</option><option value="24">24 Meses</option><option value="48">48 Meses</option>
            </select>
        </div>
        <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()" style="margin-top:15px">SOLICITAR</button>
        <button onclick="closeM()" style="width:100%;background:none;border:none;color:#999;margin-top:12px;font-weight:bold;cursor:pointer">Cerrar</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Semis</button>
</nav>

<script>
// TODA TU LÓGICA SE MANTIENE EXACTAMENTE IGUAL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS0wO4YdetIsGIaK08WsGEpLc2Ad5k-Fdk5kD4lbEdlb7YLRaoxx4Gk_JwYrrgiQ/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png";

let currentVehicleSelected = "";

function saveData() {
    const name  = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit  = document.getElementById('user-unit').value;
    if (!name || !phone) { alert("Por favor completa tus datos"); return; }
    const userData = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(userData));
    renderUser(userData);
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('greet').innerText = d.name.split(' ')[0].toUpperCase();
    const slug = d.unit.toLowerCase().trim().replace(/\s+/g, '-');
    const mainCar = document.getElementById('main-car');
    mainCar.src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
    mainCar.onerror = function() {
        if (slug === 'megane-e-tech') this.src = 'https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/megane%20e-tech.png';
        else this.src = PLACEHOLDER;
        this.onerror = null; 
    };
    document.getElementById('tag-car').innerText = d.unit.toUpperCase();
    document.getElementById('q-name').value = d.name;
    document.getElementById('q-phone').value = d.phone;
}

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        renderUser(JSON.parse(raw));
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};

async function initAppData() {
    updateAppointmentUI();
    loadCat();
    loadSemi();
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) el.classList.add('active');
    window.scrollTo(0, 0);
    if (id === 'citas') renderAppointmentPage();
}

// FUNCIONES DE CARGA MANTENIDAS
async function loadCat() {
    const container = document.getElementById('cat-container');
    try {
        const res  = await fetch(`${SCRIPT_URL}?hoja=nuevos`);
        const data = await res.json();
        window._catalogoNuevos = data;
        container.innerHTML = data.map((c, i) => `
            <div class="car-card">
                <img src="${c.imagen || PLACEHOLDER}" onclick="openDesc(${i})" onerror="this.src='${PLACEHOLDER}'">
                <h3 style="margin:15px 0 5px">${c.modelo || '—'}</h3>
                <button class="btn-action btn-yellow" onclick="openM('${c.modelo}')">COTIZAR</button>
            </div>`).join('');
    } catch(e) { container.innerHTML = '<p>Error al cargar.</p>'; }
}

async function loadSemi() {
    const container = document.getElementById('semi-container');
    try {
        const res  = await fetch(`${SCRIPT_URL}?hoja=seminuevos`);
        const data = await res.json();
        container.innerHTML = data.map(s => `
            <div class="car-card">
                <h3>${s.modelo || s.nombre}</h3>
                <button class="btn-action btn-yellow" onclick="openM('${s.modelo || s.nombre}')">ME INTERESA</button>
            </div>`).join('');
    } catch(e) { container.innerHTML = '<p>Error al cargar.</p>'; }
}

function openDesc(index) {
    const c = window._catalogoNuevos[index];
    currentVehicleSelected = c.modelo;
    document.getElementById('desc-img').src = c.imagen || PLACEHOLDER;
    document.getElementById('desc-title').innerText = c.modelo;
    document.getElementById('desc-text').innerText = "Unidad disponible en Renault Teziutlán Premium.";
    document.getElementById('modal-desc').style.display = 'flex';
}
function closeDesc() { document.getElementById('modal-desc').style.display = 'none'; }
function openM(nombre) { closeDesc(); document.getElementById('m-title').innerText = nombre; document.getElementById('modal-quote').style.display = 'flex'; }
function closeM() { document.getElementById('modal-quote').style.display = 'none'; }
function toggleFinanzas() { document.getElementById('campo-finanzas').style.display = document.getElementById('q-metodo').value === 'Financiado' ? 'block' : 'none'; }

async function handleQuote() {
    const data = {
        hoja: "cotizaciones",
        nombre: document.getElementById('q-name').value,
        telefono: document.getElementById('q-phone').value,
        cp: document.getElementById('q-cp').value,
        modelo: document.getElementById('m-title').innerText,
        metodo: document.getElementById('q-metodo').value,
        fecha: new Date().toLocaleString()
    };
    try {
        await fetch(`${SCRIPT_URL}?${new URLSearchParams(data)}`, { method: 'POST', mode: 'no-cors' });
        alert("Cotización enviada."); closeM();
    } catch(e) { alert("Error."); }
}

function updateAppointmentUI() {
    const data = localStorage.getItem('renault_appointment');
    const el = document.getElementById('reminder-container');
    if (data) {
        const a = JSON.parse(data);
        el.innerHTML = `
        <div class="status-card">
            <div class="status-header">PRÓXIMA CITA</div>
            <div class="status-value">${a.fecha} | ${a.hora} HRS</div>
        </div>`;
    } else { el.innerHTML = ''; }
}

function renderAppointmentPage() {
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    const u = JSON.parse(localStorage.getItem('renault_user') || '{}');
    if (data) {
        const a = JSON.parse(data);
        cont.innerHTML = `
            <div class="stepper-container">
                <div class="step-line"></div>
                <div class="stepper-item active"><div class="step-circle">✓</div><div class="step-label">Agendado</div></div>
                <div class="stepper-item"><div class="step-circle">2</div><div class="step-label">Confirmado</div></div>
            </div>
            <div class="premium-card-service">
                <div style="color:#d4af37; font-weight:900; font-size:1.2rem">${a.unidad}</div>
                <div class="info-row-service"><span class="info-label-service">FECHA</span> <span>${a.fecha}</span></div>
                <div class="info-row-service"><span class="info-label-service">HORA</span> <span>${a.hora}</span></div>
            </div>
            <button class="btn-action" style="border:1px solid #ff4444; color:#ff4444; background:none" onclick="cancelarCita()">CANCELAR CITA</button>
        `;
    } else {
        cont.innerHTML = `<div class="card-white">
            <label class="form-label">Unidad</label><input type="text" id="c-unit" class="form-control" value="${u.unit||''}">
            <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
            <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
            <button id="btn-cita" class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR</button>
        </div>`;
    }
}

async function handleBooking() {
    const app = {
        hoja: "citas",
        nombre: document.getElementById('user-name').value,
        telefono: document.getElementById('user-phone').value,
        unidad: document.getElementById('c-unit').value,
        fecha: document.getElementById('c-date').value,
        hora: document.getElementById('c-time').value
    };
    try {
        await fetch(`${SCRIPT_URL}?${new URLSearchParams(app)}`, { method: 'POST', mode: 'no-cors' });
        localStorage.setItem('renault_appointment', JSON.stringify(app));
        updateAppointmentUI(); renderAppointmentPage();
    } catch(e) { alert("Error."); }
}

async function cancelarCita() {
    if(!confirm("¿Cancelar?")) return;
    const app = JSON.parse(localStorage.getItem('renault_appointment'));
    await fetch(`${SCRIPT_URL}?${new URLSearchParams({...app, hoja:'cancelada'})}`, { method: 'POST', mode: 'no-cors' });
    localStorage.removeItem('renault_appointment');
    updateAppointmentUI(); renderAppointmentPage();
}
</script>
</body>
</html>
