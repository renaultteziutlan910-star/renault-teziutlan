<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --dark-bg: #000000;
            --card-bg: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 30px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        /* --- NAVEGACIÓN INSTANTÁNEA --- */
        .page { display: none; padding: 20px 20px 140px 20px; }
        .page.active { display: block; }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 35px 20px;
            text-align: center; color: #000;
        }
        .car-img-main { width: 100%; max-width: 260px; margin: 15px 0; }

        /* --- FORMULARIOS --- */
        .card-white { background: var(--white); color: #000; border-radius: 25px; padding: 20px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 8px 0 4px 5px; text-transform: uppercase; }
        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }
        .login-input { background: #222; border: 1px solid #444; color: #fff; }

        .btn-action {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer;
        }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 20px; }

        /* --- CATÁLOGO --- */
        .car-card { background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 15px; height: auto; display: block; }

        /* --- NAVBAR --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(13, 13, 13, 0.98);
            display: flex; justify-content: space-around; padding: 15px 0 35px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; flex: 1; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 6000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: #fff; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; color: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;">
            <span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span>
        </div>
        <input type="text" id="user-name" class="login-input" placeholder="Tu nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Tu número de teléfono">
        
        <label class="form-label" style="color:#aaa; text-align:left;">¿Qué Renault tienes?</label>
        <select id="user-unit-select" class="login-input">
            <option value="Duster">Duster</option>
            <option value="Kwid">Kwid</option>
            <option value="Kardian">Kardian</option>
            <option value="Stepway">Stepway</option>
            <option value="Koleos">Koleos</option>
        </select>
        <button class="btn-action btn-yellow" onclick="saveLogin()">ENTRAR</button>
    </div>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greeting">¡HOLA!</h1>
            <img id="main-car-view" src="" class="car-img-main">
            <div id="unit-tag" style="font-weight: 700; font-size: 1.2rem;">Tu Renault</div>
        </div>
        <button class="btn-action btn-green" onclick="showPage('nuevos')">CATÁLOGO NUEVOS</button>
    </div>

    <div id="p-citas" class="page">
        <div class="card-white">
            <h3 style="margin-top:0">SERVICIO TÉCNICO</h3>
            <label class="form-label">VIN</label>
            <input type="text" id="c-vin" class="form-control" placeholder="17 dígitos">
            <label class="form-label">Kilometraje Actual</label>
            <input type="number" id="c-km" class="form-control" placeholder="Ej: 15000">
            <label class="form-label">¿Qué detalle tiene tu unidad?</label>
            <textarea id="c-detail" class="form-control" rows="3"></textarea>
            <button class="btn-action btn-yellow">AGENDAR</button>
        </div>
    </div>

    <div id="p-nuevos" class="page">
        <div id="catalog-container"></div>
    </div>

    <div id="modal-quote" class="modal">
        <div class="modal-content">
            <h3 id="modal-car-title">COTIZAR</h3>
            <label class="form-label">CURP</label><input type="text" id="q-curp" class="form-control">
            <label class="form-label">RFC</label><input type="text" id="q-rfc" class="form-control">
            <label class="form-label">Enganche ($)</label><input type="number" id="q-down" class="form-control">
            <button class="btn-action btn-yellow" onclick="closeModal()">ENVIAR SOLICITUD</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Servicio</a>
    </nav>

    <script>
        const API = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        
        const CAR_IMAGES = {
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Stepway": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/stepway-bja/stepway-card.png",
            "Koleos": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/koleos-hzg-ph2/koleos-card.png"
        };

        window.onload = () => {
            const saved = localStorage.getItem('renault_user');
            if(saved) {
                const data = JSON.parse(saved);
                applyData(data);
                document.getElementById('login-screen').style.display = 'none';
                loadCatalog();
            }
        };

        function saveLogin() {
            const data = {
                name: document.getElementById('user-name').value,
                phone: document.getElementById('user-phone').value,
                unit: document.getElementById('user-unit-select').value
            };
            if(!data.name || !data.phone) return alert("Llena tus datos");
            localStorage.setItem('renault_user', JSON.stringify(data));
            applyData(data);
            document.getElementById('login-screen').style.display = 'none';
            loadCatalog();
        }

        function applyData(data) {
            document.getElementById('greeting').innerText = `¡HOLA, ${data.name.split(' ')[0].toUpperCase()}!`;
            document.getElementById('unit-tag').innerText = `Tu ${data.unit}`;
            document.getElementById('main-car-view').src = CAR_IMAGES[data.unit] || CAR_IMAGES['Duster'];
        }

        async function loadCatalog() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const container = document.getElementById('catalog-container');
                container.innerHTML = data.map(car => `
                    <div class="car-card">
                        <img src="${car.imagen}" alt="${car.modelo}">
                        <h3 style="margin:10px 0 5px">${car.modelo}</h3>
                        <div style="color:var(--d4af37); font-weight:bold; margin-bottom:10px;">${car.precio}</div>
                        <button class="btn-action btn-yellow" onclick="openModal('${car.modelo}')">COTIZAR</button>
                    </div>
                `).join('');
            } catch(e) { console.error("Error API"); }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
            window.scrollTo(0,0);
        }

        function openModal(t) { document.getElementById('modal-car-title').innerText = t; document.getElementById('modal-quote').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-quote').style.display = 'none'; }
    </script>
</body>
</html>
