<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --dark-bg: #000000;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 35px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; }
        .active { display: block !important; }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
        }
        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; border-radius: 15px; }

        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #333; border-radius: 12px;
            background: #1a1a1a; color: #fff; margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 900; cursor: pointer; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }

        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { background: none; border: none; color: #555; font-size: 0.7rem; font-weight: 700; flex: 1; }
        .nav-item.active { color: #d4af37; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; display: block; margin: 0 auto 4px; }

        .btn-whatsapp-float {
            position: fixed; bottom: 100px; right: 20px;
            background: #25d366; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
        <select id="user-unit" class="login-input">
            <option value="Kwid">Kwid</option>
            <option value="Kardian">Kardian</option>
            <option value="Duster">Duster</option>
            <option value="Stepway">Stepway</option>
            <option value="Oroch">Oroch</option>
            <option value="Koleos">Koleos</option>
        </select>
        <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
    </div>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA!</h1>
            <img id="main-car" src="" class="car-hero">
            <div id="tag-car" style="font-weight: 800; font-size: 1.3rem;">Tu Renault</div>
        </div>
        <button class="btn-action btn-yellow" style="margin-top: 20px" onclick="showPage('nuevos')">CATÁLOGO</button>
    </div>

    <div id="p-nuevos" class="page">
        <div id="cat-container" style="text-align: center;">Cargando catálogo...</div>
    </div>

    <div id="p-citas" class="page">
        <div id="appointment-content"></div>
    </div>

    <div id="p-seminuevos" class="page">
        <div id="semi-container" style="text-align: center;">Cargando seminuevos...</div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
        <button class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
        <button class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Servicio</button>
    </nav>

    <script>
        const API_BASE = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        
        const CARS = {
            "Kwid": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/kwid.jpeg",
            "Kardian": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/kardian.jpeg",
            "Duster": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/duster.jpeg",
            "Koleos": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/koleos.jpeg",
            "Oroch": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/oroch.jpeg"
        };

        window.onload = () => {
            const user = localStorage.getItem('renault_user');
            if(user) {
                renderUser(JSON.parse(user));
                document.getElementById('login-screen').style.display = 'none';
                loadData();
            }
        };

        function saveData() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const unit = document.getElementById('user-unit').value;
            if(!name || !phone) return alert("Por favor llena los datos");
            const userData = { name, phone, unit };
            localStorage.setItem('renault_user', JSON.stringify(userData));
            renderUser(userData);
            document.getElementById('login-screen').style.display = 'none';
            loadData();
        }

        function renderUser(d) {
            document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
            document.getElementById('main-car').src = CARS[d.unit] || "";
            document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'citas') renderCitas();
        }

        async function loadData() {
            try {
                const resN = await fetch(`${API_BASE}?sheet=nuevos`);
                const dataN = await resN.json();
                document.getElementById('cat-container').innerHTML = dataN.map(c => `
                    <div class="car-card">
                        <img src="${c.imagen}">
                        <h3>${c.modelo}</h3>
                        <p style="color:#d4af37">${c.precio}</p>
                    </div>`).join('');

                const resS = await fetch(`${API_BASE}?sheet=seminuevos`);
                const dataS = await resS.json();
                document.getElementById('semi-container').innerHTML = dataS.map(s => `
                    <div class="car-card">
                        <h3>${s.modelo || s.Versión}</h3>
                        <p>${s.Precio}</p>
                    </div>`).join('');
            } catch(e) {
                console.error("Error cargando datos");
            }
        }

        function renderCitas() {
            const user = JSON.parse(localStorage.getItem('renault_user'));
            document.getElementById('appointment-content').innerHTML = `
                <div style="background:#fff; color:#000; padding:20px; border-radius:20px;">
                    <h3>Agendar Servicio</h3>
                    <label>Fecha</label><input type="date" id="c-date" class="form-control" style="background:#f0f0f0; color:#000">
                    <button class="btn-action btn-yellow" onclick="alert('Cita enviada')">AGENDAR</button>
                </div>`;
        }
    </script>
</body>
</html>
