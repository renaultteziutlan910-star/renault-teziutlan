<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--dark-bg); 
            color: var(--white); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- LOGIN SCREEN --- */
        #login-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--dark-bg); 
            z-index: 5000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 35px; 
            text-align: center; 
        }

        header { 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 1px solid #222; 
            position: sticky; 
            top: 0; 
            background: var(--dark-bg); 
            z-index: 2000; 
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-weight: bold; 
            letter-spacing: 2px; 
        }

        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.4s ease-out; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INICIO ESTILO PREMIUM (Basado en imagen) --- */
        .card-profile { 
            background: var(--gold-gradient); 
            border-radius: 35px; 
            padding: 45px 20px; 
            text-align: center; 
            color: #000; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 10px 20px rgba(212,175,55,0.2); 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: visible; /* Permite que el auto sobresalga */
            margin-top: 10px;
        }

        .card-profile::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.4) 0%, transparent 70%);
            border-radius: 35px;
            pointer-events: none;
        }

        .greet-text { 
            font-weight: 500; font-size: 0.8rem; color: rgba(0,0,0,0.5); 
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px;
        }

        #greet { 
            font-weight: 900; font-size: 2.8rem; margin-bottom: 20px; 
            letter-spacing: -1.5px; line-height: 0.8;
        }

        .car-hero { 
            width: 120%; 
            max-width: 380px; 
            margin: 10px 0 20px 0; 
            filter: drop-shadow(0 25px 30px rgba(0,0,0,0.4)); 
            transform: scale(1.1);
            transition: transform 0.5s ease;
            z-index: 10;
        }

        .tag-car-label {
            background: rgba(0,0,0,0.06); 
            padding: 8px 22px; 
            border-radius: 30px;
            font-weight: 800; 
            font-size: 0.9rem; 
            border: 1px solid rgba(0,0,0,0.1); 
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* --- BOTONES --- */
        .btn-action { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; 
        }
        
        .btn-yellow { background: var(--renault-yellow); color: #000; box-shadow: 0 10px 20px rgba(255,204,0,0.2); }
        
        .btn-premium-dark {
            background: #111; color: #fff; border-radius: 22px;
            margin-top: 35px; display: flex; justify-content: center; align-items: center; gap: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 1px solid #222;
        }

        /* --- NAV BAR --- */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.95); 
            backdrop-filter: blur(15px); display: flex; justify-content: space-around; 
            padding: 15px 0 35px 0; border-top: 1px solid #1a1a1a; z-index: 1000; 
        }

        .nav-item { 
            text-align: center; color: #444; background: none; border: none; 
            font-size: 0.7rem; font-weight: 700; flex: 1; transition: 0.3s;
        }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 5px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        /* --- ELEMENTOS ADICIONALES --- */
        .car-card { background: #111; border-radius: 28px; padding: 20px; margin-bottom: 25px; border: 1px solid #222; }
        .form-control, .login-input { 
            width: 100%; padding: 18px; border: 1px solid #333; border-radius: 16px; 
            background: #151515; color: #fff; box-sizing: border-box; font-size: 1rem; margin-bottom: 12px; 
        }
        .btn-whatsapp-float { 
            position: fixed; bottom: 120px; right: 20px; background: #25d366; 
            color: white; width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; z-index: 3000; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<a id="wa-bubble" href="https://wa.me/522312333467" class="btn-whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Tu Nombre">
    <input type="tel" id="user-phone" class="login-input" placeholder="WhatsApp">
    <select id="user-unit" class="login-input">
        <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
        <option value="Duster">Duster</option><option value="Stepway">Stepway</option>
        <option value="Oroch">Oroch</option><option value="Koleos">Koleos</option>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR AL CLUB</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="card-profile">
        <div class="greet-text">Bienvenido de nuevo</div>
        <div id="greet">CLIENTE</div>
        
        <img id="main-car" src="" class="car-hero" alt="Tu Renault"
            onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        
        <div class="tag-car-label" id="tag-car">Tu Renault</div>
    </div>

    <div id="reminder-container"></div>

    <button class="btn-action btn-premium-dark" onclick="showPage('nuevos', document.querySelectorAll('.nav-item')[1])">
        VER CATÁLOGO 2026 
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
</div>

<div id="p-nuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">CATÁLOGO PREMIUM</div>
    <div id="cat-container"></div>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">CITAS DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-seminuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">SELECCIÓN SEMINUEVOS</div>
    <div id="semi-container"></div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Semis</button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS0wO4YdetIsGIaK08WsGEpLc2Ad5k-Fdk5kD4lbEdlb7YLRaoxx4Gk_JwYrrgiQ/exec";

function saveData() {
    const name = document.getElementById('user-name').value;
    const phone = document.getElementById('user-phone').value;
    const unit = document.getElementById('user-unit').value;
    if(!name || !phone) return alert("Por favor, ingresa tus datos.");
    const user = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(user));
    renderUser(user);
    document.getElementById('login-screen').style.display = 'none';
}

function renderUser(d) {
    document.getElementById('greet').innerText = d.name.split(' ')[0].toUpperCase();
    const slug = d.unit.toLowerCase().replace(/\s+/g, '-');
    const mainCar = document.getElementById('main-car');
    mainCar.src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
    document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if(el) el.classList.add('active');
    window.scrollTo(0,0);
}

window.onload = () => {
    const user = localStorage.getItem('renault_user');
    if(user) {
        renderUser(JSON.parse(user));
        document.getElementById('login-screen').style.display = 'none';
    }
};
</script>
</body>
</html>
