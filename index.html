<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán App</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-yellow: #FFCC00;
            --renault-gray: #121212;
            --white: #FFFFFF;
            --black: #000000;
            --green-success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Barra de Estado del Teléfono (Realismo) --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 600;
            background: var(--black);
        }

        /* --- Encabezado General --- */
        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .line-v { width: 1px; height: 20px; background: var(--gold); }
        .agency-name { color: var(--gold); }
        .page-title {
            color: var(--gold);
            font-size: 1.1rem;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .container { padding: 20px; padding-bottom: 120px; }

        /* --- PÁGINA 1: AGENDAR SERVICIO (FONDO BLANCO) --- */
        .card-white {
            background-color: var(--white);
            color: var(--black);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-yellow {
            background-color: var(--bright-yellow);
            color: var(--black);
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- PÁGINA 2: INICIO / PERFIL (DEGRADADO DORADO) --- */
        .card-profile {
            background: linear-gradient(135deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            color: var(--black);
            position: relative;
            overflow: hidden;
        }
        .card-profile h2 { font-size: 2.2rem; margin: 0; font-weight: 800; }
        .car-floating {
            width: 100%;
            max-width: 280px;
            margin: 20px auto;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .car-id { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; opacity: 0.9; }

        .btn-green {
            background-color: var(--green-success);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- MENÚ NAVEGACIÓN INFERIOR --- */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 25px 0;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: #666;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            flex: 1;
        }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 5px; }
        .nav-item.active { color: var(--gold); }
        .active-bg {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 15px;
            padding: 5px;
        }

        /* Control de páginas */
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>9:26</div>
        <div>🔋 85%</div>
    </div>

    <header>
        <div class="logo-container">
            <span>RENAULT</span>
            <div class="line-v"></div>
            <span class="agency-name">TEZIUTLÁN</span>
        </div>
    </header>

    <div id="page-citas" class="page active-page">
        <header><div class="page-title">Agendar Servicio</div></header>
        <div class="container">
            <div class="card-white">
                <div class="form-group">
                    <label>Nombre del Cliente</label>
                    <input type="text" placeholder="Alejandro Ramírez">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="222-123-4567">
                </div>
                <div class="form-group">
                    <label>Unidad</label>
                    <select><option>Duster</option><option>Kwid</option><option>Kardian</option></select>
                </div>
                <div class="form-group">
                    <label>Placa</label>
                    <select><option>UFX-1234</option></select>
                </div>
                <div class="form-group">
                    <label>Kilometraje Actual</label>
                    <input type="text" placeholder="28,500 km">
                </div>
                <div class="form-group">
                    <label>Fecha Preferida</label>
                    <input type="date" value="2026-05-01">
                </div>
                <div class="form-group">
                    <label>Hora Flexible</label>
                    <input type="time" value="10:30">
                </div>
                <div class="form-group">
                    <label>Motivo del Servicio</label>
                    <input type="text" placeholder="Mantenimiento Preventivo (10K)">
                </div>
                <button class="btn-yellow">ENVIAR SOLICITUD</button>
            </div>
        </div>
    </div>

    <div id="page-inicio" class="page">
        <div class="container">
            <div class="card-profile">
                <h2>¡Hola, Alejandro!</h2>
                <img src="https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png" alt="Renault Duster" class="car-floating">
                <div class="car-id">Tu Duster | UFX-1234</div>
            </div>
            <button class="btn-green">COTIZACIÓN</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="#" class="nav-item" onclick="showPage('inicio', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <div>Inicio</div>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>
            <div>Nuevos</div>
        </a>
        <a href="#" class="nav-item active" onclick="showPage('citas', this)">
            <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            <div>Citas</div>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2.9 2 2 2-.9 2-2 2z"/></svg>
            <div>SEMINUEVOS</div>
        </a>
    </nav>

    <script>
        function showPage(pageId, element) {
            // Ocultar todas las páginas
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            // Quitar clase active de nav
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Mostrar seleccionada
            document.getElementById('page-' + pageId).classList.add('active-page');
            element.classList.add('active');
        }
    </script>
</body>
</html>
