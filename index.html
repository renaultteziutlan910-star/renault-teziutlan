<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; padding: 0; }
        
        /* Pantalla de Carga/Login */
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        
        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tarjetas */
        .card-profile { background: var(--gold-gradient); border-radius: 35px; padding: 30px 20px; text-align: center; color: #000; box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
        .car-hero { width: 100%; max-width: 280px; margin: 15px auto; display: block; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); }
        .card-white { background: var(--white); color: #000; border-radius: 25px; padding: 20px; margin-top: 15px; }
        
        /* Formularios */
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 10px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; color: #000; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 20px; }

        /* Inventario */
        .car-card { background: #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 15px; margin-bottom: 10px; }

        /* Navegación */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0d0d0d; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #222; }
        .nav-item { text-align: center; color: #555; background: none; border: none; font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: #d4af37; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; display: block; margin: 0 auto 4px; }

        /* Modales */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 25px; width: 100%; max-width: 350px; color: #000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Teléfono">
    <select id="user-unit" class="login-input">
        <option value="Kwid">Kwid</option><option value="Duster">Duster</option>
        <option value="Koleos">Koleos</option><option value="Oroch">Oroch</option>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">ENTRAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="card-profile">
        <h2 id="greet">BIENVENIDO</h2>
        <img id="main-car" src="" class="car-hero">
        <div id="tag-car" style="font-weight:bold">Tu Renault</div>
    </div>
    <div id="reminder-container"></div>
    <button class="btn-action btn-green" onclick="showPage('nuevos')">VER NUEVOS MODELOS</button>
</div>

<div id="p-citas" class="page">
    <h3 style="text-align:center;color:var(--renault-yellow)">AGENDAR SERVICIO</h3>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <h3 style="text-align:center;color:var(--renault-yellow)">NUEVOS</h3>
    <div id="cat-container"></div>
</div>

<div id="p-seminuevos" class="page">
    <h3 style="text-align:center;color:var(--renault-yellow)">SEMINUEVOS</h3>
    <div id="semi-container"></div>
</div>

<div id="modal-quote" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="margin-top:0">COTIZAR</h3>
        <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()">ENVIAR SOLICITUD</button>
        <button onclick="closeM()" style="width:100%;background:none;border:none;margin-top:10px">Cerrar</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Semis</button>
</nav>

<script>
const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT"; 

// Función para encontrar datos sin importar el nombre de la columna
function findVal(obj, options) {
    const key = Object.keys(obj).find(k => options.includes(k.toLowerCase().trim()));
    return key ? obj[key] : "";
}

function saveData() {
    const name = document.getElementById('user-name').value;
    const phone = document.getElementById('user-phone').value;
    const unit = document.getElementById('user-unit').value;
    if(!name || !phone) return alert("Llena los campos");
    localStorage.setItem('renault_user', JSON.stringify({name, phone, unit}));
    location.reload();
}

async function loadData(hoja, containerId) {
    const cont = document.getElementById(containerId);
    cont.innerHTML = "<p style='text-align:center'>Cargando...</p>";
    try {
        const res = await fetch(`${SCRIPT_URL}?hoja=${hoja}`);
        const data = await res.json();
        if(!data || data.length === 0) throw new Error();
        
        cont.innerHTML = data.map(item => {
            const nombre = findVal(item, ['modelo', 'nombre', 'unidad', 'unidad a revisar']);
            const img = findVal(item, ['imagen', 'foto', 'url']);
            const precio = findVal(item, ['precio', 'costo']);
            
            return `
            <div class="car-card">
                ${img ? `<img src="${img}">` : ''}
                <h3 style="margin:5px 0">${nombre}</h3>
                ${precio ? `<p style="color:var(--renault-yellow)">${precio}</p>` : ''}
                <button class="btn-action btn-yellow" onclick="openM('${nombre}')">COTIZAR</button>
            </div>`;
        }).join('');
    } catch(e) {
        cont.innerHTML = "<p style='text-align:center; color:#666'>No hay datos disponibles.</p>";
    }
}

function openM(title) {
    document.getElementById('m-title').innerText = title;
    document.getElementById('modal-quote').style.display = 'flex';
}

function closeM() { document.getElementById('modal-quote').style.display = 'none'; }

async function handleQuote() {
    const u = JSON.parse(localStorage.getItem('renault_user'));
    const params = new URLSearchParams({
        hoja: "cotizaciones",
        nombre: u.name,
        telefono: u.phone,
        "unidad a revisar": document.getElementById('m-title').innerText
    });
    await fetch(`${SCRIPT_URL}?${params}`, { method: 'POST', mode: 'no-cors' });
    alert("Enviado");
    closeM();
}

function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    if(btn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }
    if(id === 'nuevos') loadData('nuevos', 'cat-container');
    if(id === 'seminuevos') loadData('seminuevos', 'semi-container');
    if(id === 'citas') renderCitas();
}

function renderCitas() {
    const u = JSON.parse(localStorage.getItem('renault_user'));
    const app = JSON.parse(localStorage.getItem('renault_app') || 'null');
    const cont = document.getElementById('appointment-content');
    
    if(app) {
        cont.innerHTML = `<div class="card-white" style="text-align:center">
            <h4>Cita Confirmada</h4>
            <p>${app.fecha} a las ${app.hora}</p>
            <button class="btn-action" style="color:red" onclick="borrarCita()">Cancelar</button>
        </div>`;
    } else {
        cont.innerHTML = `
        <div class="card-white">
            <label class="form-label">Unidad</label>
            <input id="c-unit" class="form-control" value="${u.unit}" readonly>
            <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
            <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
            <button class="btn-action btn-yellow" onclick="agendar()">AGENDAR</button>
        </div>`;
    }
}

async function agendar() {
    const u = JSON.parse(localStorage.getItem('renault_user'));
    const fecha = document.getElementById('c-date').value;
    const hora = document.getElementById('c-time').value;
    const app = { hoja: "citas", nombre: u.name, telefono: u.phone, "unidad a revisar": u.unit, fecha, hora };
    
    await fetch(`${SCRIPT_URL}?${new URLSearchParams(app)}`, { method: 'POST', mode: 'no-cors' });
    localStorage.setItem('renault_app', JSON.stringify(app));
    renderCitas();
}

function borrarCita() {
    localStorage.removeItem('renault_app');
    renderCitas();
}

window.onload = () => {
    const user = localStorage.getItem('renault_user');
    if(user) {
        const u = JSON.parse(user);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('greet').innerText = `HOLA, ${u.name.split(' ')[0].toUpperCase()}`;
        document.getElementById('main-car').src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${u.unit.toLowerCase()}.png`;
    }
};
</script>
</body>
</html>
