<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán - App Oficial</title>
    <style>
        :root { --accent: #FFCC00; --accent-dark: #b89400; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --muted: #a1a1a6; --green: #25D366; --green-dark: #1da851; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 120px; -webkit-font-smoothing: antialiased; }
        
        header { background: #000; padding: 25px 20px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .logo span { color: var(--accent); }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease-out; box-sizing: border-box; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid #2c2c2e; box-sizing: border-box; }
        .hero-card { background: linear-gradient(145deg, var(--accent), var(--accent-dark)); color: black; border: none; text-align: center; position: relative; }
        
        /* Contenedor del Auto 3D en Inicio */
        .car-avatar { width: 100%; height: 210px; display: flex; justify-content: center; align-items: center; margin: 10px 0; perspective: 1000px; }
        .car-3d { width: 280px; max-width: 90%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3)); animation: float 3.5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotateY(-5deg); } 50% { transform: translateY(-20px) rotateY(15deg); } }

        h2 { font-size: 1.5rem; color: var(--accent); margin: 0 0 20px 0; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        
        /* Estilos de Formulario */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--muted); padding-left: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 18px; border: 1px solid #333; border-radius: 16px; background: #121212; color: white; font-size: 16px; box-sizing: border-box; transition: 0.2s; -webkit-appearance: none; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: #1a1a1a; }
        textarea { resize: none; height: 120px; }

        /* Botones */
        button { border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 1.1rem; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.97); }
        .btn-accent { background: var(--accent); color: black; }
        .btn-accent:hover { background: #ffe066; }
        .btn-green { background: linear-gradient(145deg, var(--green), var(--green-dark)); color: white; margin-top: 10px; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2); text-transform: uppercase;}

        /* Barra de Navegación Grande (4 Iconos Modernos) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 105px; background: rgba(18, 18, 18, 0.96); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; }
        .nav-item { text-align: center; font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; text-decoration: none; flex: 1; -webkit-tap-highlight-color: transparent; transition: 0.2s; padding: 10px 0; display: flex; flex-direction: column; align-items: center;}
        
        /* Iconos SVG (idénticos a la imagen) */
        .nav-icon { width: 32px; height: 32px; margin-bottom: 8px; fill: var(--muted); transition: 0.2s; }
        .nav-item.active-nav { color: var(--accent); }
        .nav-item.active-nav .nav-icon { fill: var(--accent); }
        
        .img-car { width: 100%; border-radius: 18px; margin-bottom: 15px; background: #000; min-height: 160px; object-fit: contain; }
        .price-tag { color: var(--accent); font-weight: 800; font-size: 1.3rem; display: block; margin-bottom: 15px; }

        /* Pantalla de Registro */
        #pantalla-registro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; justify-content: center; padding: 40px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="pantalla-registro">
        <div class="logo" style="margin-bottom: 30px; text-align: center;">RENAULT | <span>TEZIUTLÁN</span></div>
        <div class="form-group">
            <input type="text" id="reg-nombre" placeholder="Nombre completo">
        </div>
        <div class="form-group">
            <input type="tel" id="reg-tel" placeholder="Teléfono de contacto">
        </div>
        <div class="form-group">
            <select id="reg-modelo-u">
                <option value="">¿Qué Renault manejas?</option>
                <option value="Kwid">Kwid</option><option value="Duster">Duster</option>
                <option value="Kardian">Kardian</option><option value="Stepway">Stepway</option>
                <option value="Oroch">Oroch</option><option value="Boreal">Boreal</option>
            </select>
        </div>
        <div class="form-group">
            <input type="text" id="reg-placa" placeholder="Número de Placa">
        </div>
        <div class="form-group">
            <input type="text" id="reg-vin" placeholder="VIN (Niv - 17 dígitos)">
        </div>
        <button class="btn-accent" onclick="guardarUsuario()" style="margin-top: 20px;">ENTRAR A LA APP</button>
    </div>

    <header><div class="logo">RENAULT | <span>TEZIUTLÁN</span></div></header>

    <div id="inicio" class="page active">
        <div class="card hero-card">
            <h2 id="txt-bienvenida" style="color: black; margin: 0; font-size: 1.8rem;">¡Hola!</h2>
            <div class="car-avatar" id="car-container"></div>
            <p id="txt-info-auto" style="font-weight: bold; margin-top: 5px; font-size: 1rem;"></p>
        </div>
        <div class="card" style="padding: 15px;">
            <button class="btn-green" onclick="solicitarCotizacion()">📄 COTIZACIÓN</button>
            <button onclick="window.location.href='tel:2311234567'" style="background: #333; color: white; margin-top: 10px;">Llamar Asesor</button>
        </div>
    </div>

    <div id="catalogo" class="page">
        <h2>Catálogo de Nuevos</h2>
        <div id="contenedor-catalogo">
            </div>
    </div>

    <div id="citas" class="page">
        <h2>Agendar Servicio</h2>
        <div class="card">
            <div class="form-group"><label>Nombre del Cliente</label><input type="text" id="cita-nombre"></div>
            <div class="form-group"><label>Teléfono</label><input type="tel" id="cita-tel"></div>
            <div class="form-group"><label>Unidad y Modelo</label><input type="text" id="cita-unidad"></div>
            <div class="form-group"><label>Placa</label><input type="text" id="cita-placa"></div>
            <div class="form-group"><label>VIN (Niv)</label><input type="text" id="cita-vin"></div>
            <div class="form-group"><label>Kilometraje Actual</label><input type="number" id="cita-km"></div>
            <div class="form-group"><label>Fecha del Servicio</label><input type="date" id="cita-fecha"></div>
            <div class="form-group"><label>Hora Preferida</label><input type="time" id="cita-hora" min="09:00" max="19:00"></div>
            <div class="form-group"><label>Motivo</label><textarea id="cita-fallas" placeholder="Escribe el servicio..."></textarea></div>
            <button class="btn-accent" onclick="enviarCita()">CONFIRMAR CITA</button>
        </div>
    </div>

    <div id="seminuevos" class="page">
        <h2>Seminuevos Garantizados</h2>
        <div class="card">
            <h3>Inventario Próximamente</h3>
            <button onclick="localStorage.clear(); location.reload();" style="background:#333; color:white; margin-top: 20px;">Cerrar Sesión</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active-nav" onclick="nav('inicio', 0)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Inicio
        </a>
        <a href="#" class="nav-item" onclick="nav('catalogo', 1)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
            Nuevos
        </a>
        <a href="#" class="nav-item" onclick="nav('citas', 2)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            Citas
        </a>
        <a href="#" class="nav-item" onclick="nav('seminuevos', 3)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2.9 2 2 2-.9 2-2 2z"/></svg>
            Seminuevos
        </a>
    </nav>

    <script>
        const API_BASE = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";

        const modelos3D = {
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Oroch": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/oroch-hjd-ph2/oroch-card.png",
            "Boreal": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/boreal-card.png"
        };

        window.onload = function() {
            cargarCatalogo();
            if (localStorage.getItem('u_nombre')) {
                mostrarApp();
            }
        };

        async function cargarCatalogo() {
            const cont = document.getElementById('contenedor-catalogo');
            cont.innerHTML = "<p style='color:var(--muted); text-align:center;'>Cargando inventario...</p>";
            try {
                const res = await fetch(API_BASE);
                const data = await res.json();
                cont.innerHTML = "";
                data.forEach(item => {
                    cont.innerHTML += `
                        <div class="card">
                            <img src="${item.imagen}" class="img-car" onerror="this.src='${modelos3D['Duster']}';">
                            <h3>${item.modelo}</h3>
                            <span class="price-tag">Desde ${item.precio}</span>
                            <button class="btn-accent" onclick="nav('citas', 2)">COTIZAR UNIDAD</button>
                        </div>`;
                });
            } catch(e) { cont.innerHTML = "<p style='color:red; text-align:center;'>Error de conexión. Verifica tu SheetDB.</p>"; }
        }

        function guardarUsuario() {
            const campos = ['reg-nombre', 'reg-tel', 'reg-modelo-u', 'reg-placa', 'reg-vin'];
            for(let id of campos) {
                if(!document.getElementById(id).value) { alert("Por favor llena todos los campos."); return; }
                localStorage.setItem(id.replace('reg-', 'u_'), document.getElementById(id).value);
            }
            mostrarApp();
        }

        function mostrarApp() {
            document.getElementById('pantalla-registro').style.display = 'none';
            const m = localStorage.getItem('u_modelo');
            const n = localStorage.getItem('u_nombre');
            document.getElementById('txt-bienvenida').innerText = "¡Hola, " + n.split(' ')[0] + "!";
            document.getElementById('txt-info-auto').innerText = `${m} | ${localStorage.getItem('u_placa')}`;
            
            // Llenar Citas
            document.getElementById('cita-nombre').value = n;
            document.getElementById('cita-tel').value = localStorage.getItem('u_tel');
            document.getElementById('cita-unidad').value = m;
            document.getElementById('cita-placa').value = localStorage.getItem('u_placa');
            document.getElementById('cita-vin').value = localStorage.getItem('u_vin');

            // Cargar Auto 3D
            const img = modelos3D[m] || modelos3D["Duster"];
            document.getElementById('car-container').innerHTML = `<img src="${img}" class="car-3d">`;
        }

        function nav(p, i) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active-nav'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-item')[i].classList.add('active-nav');
            window.scrollTo(0,0);
        }

        function solicitarCotizacion() {
            alert("Has solicitado una cotización. Un asesor de Renault Teziutlán te contactará para ver el tema de tu renovación.");
        }
    </script>
</body>
</html>
