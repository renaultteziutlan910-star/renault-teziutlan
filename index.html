<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--dark-bg); 
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--white); 
            margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        
        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; }
        .v-line { width: 1px; height: 18px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.4s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Inicio Premium */
        .card-profile { background: transparent; padding: 20px 0; text-align: center; }
        #greet { font-size: 1.8rem; letter-spacing: 2px; color: #d4af37; margin-bottom: 5px; font-weight: 900; }
        .user-name-subtitle { font-size: 1.2rem; color: var(--white); margin-bottom: 20px; font-weight: 300; }
        .car-hero-container { position: relative; background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%); padding: 20px 0; margin: 20px 0; }
        .car-hero { width: 100%; max-width: 320px; margin: 0 auto; display: block; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }

        /* Form Controls */
        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; text-align: left; }
        .form-control, .login-input { width: 100%; padding: 16px; border: 1px solid #222; border-radius: 12px; background: #0a0a0a; color: #fff; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .form-control { background: #f9f9f9; color: #000; border: 1px solid #ddd; }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-yellow { background: var(--gold-gradient); color: #000; }
        
        .btn-whatsapp-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000; text-decoration: none; }
        .btn-whatsapp-float svg { width: 30px; height: 30px; fill: currentColor; }

        /* Navegación */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(13, 13, 13, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { text-align: center; color: #444; text-decoration: none; font-size: 0.65rem; font-weight: 600; flex: 1; background: none; border: none; cursor: pointer; text-transform: uppercase; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin: 0 auto 6px; display: block; }
        .nav-item.active { color: #d4af37; }

        .car-card { background: #0a0a0a; border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .car-card img { width: 100%; border-radius: 15px; background: #111; aspect-ratio: 16/9; object-fit: cover; }

        /* Modales */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; position: relative; }
        .tab-container { display: flex; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: 800; font-size: 0.7rem; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }

        /* Citas Premium Card */
        .premium-card-service { background: #080808; border: 1px solid #1a1a1a; border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .info-row-service { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 12px 0; font-size: 0.9rem; }
        .info-label-service { color: var(--gray-text); font-weight: 600; }
        .btn-premium-action { display: flex; align-items: center; gap: 15px; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 18px; margin-bottom: 12px; text-decoration: none; color: #fff; text-align: left;}
        .icon-circle-service { width: 40px; height: 40px; background: rgba(212,175,55,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #d4af37; }
    </style>
</head>
<body>

<a id="wa-bubble" href="https://wa.me/522312333467" class="btn-whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
    <label class="form-label" style="color:#888">Selecciona tu Renault actual:</label>
    <select id="user-unit" class="login-input">
        <optgroup label="Modelos Actuales">
            <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
            <option value="Duster">Duster</option><option value="Stepway">Stepway</option>
            <option value="Oroch">Oroch</option><option value="Koleos">Koleos</option>
            <option value="Master">Master</option><option value="Kangoo">Kangoo</option>
            <option value="Megane E-Tech">Megane E-Tech</option>
        </optgroup>
        <optgroup label="Modelos Anteriores">
            <option value="Clio">Clio</option><option value="Sandero">Sandero</option>
            <option value="Logan">Logan</option><option value="Captur">Captur</option>
            <option value="Fluence">Fluence</option><option value="Scala">Scala</option>
        </optgroup>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="card-profile">
        <div id="greet">¡BIENVENIDO!</div>
        <div id="user-display-name" class="user-name-subtitle">CARGANDO...</div>
        <div class="car-hero-container">
            <img id="main-car" src="" class="car-hero" alt="Tu Renault" onerror="this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        </div>
    </div>
    <div id="reminder-container"></div>
    <div style="text-align:center; margin-top:20px;">
        <span style="display:block; font-size:0.7rem; color:#444; letter-spacing:1px; margin-bottom:15px">Calidad Renault, Teziutlán Premium</span>
        <button style="background:none; border:none; color:#d4af37; text-decoration:underline; font-size:0.8rem; cursor:pointer" onclick="showPage('nuevos')">Ver Catálogo Completo →</button>
    </div>
    <a class="btn-premium-action" style="margin-top:40px; justify-content:center" href="https://wa.me/522312333467" target="_blank">
        <div class="icon-circle-service">💬</div>
        <div class="action-text-service"><strong>Consultar Asesor Técnico</strong></div>
    </a>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px;letter-spacing:1px">GESTIÓN DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">CATÁLOGO NUEVOS</div>
    <div id="cat-container"></div>
</div>

<div id="p-seminuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">INVENTARIO SEMINUEVOS</div>
    <div id="semi-container"></div>
</div>

<div id="modal-desc" class="modal">
    <div class="modal-content">
        <button onclick="closeDesc()" style="position:absolute;right:20px;top:20px;border:none;background:none;font-size:1.5rem;cursor:pointer">✕</button>
        <img id="desc-img" src="" style="width:100%;border-radius:20px;margin-bottom:15px;aspect-ratio:16/9;object-fit:cover;background:#eee">
        <div id="desc-title" style="color:#d4af37;font-weight:900;font-size:1.5rem;text-transform:uppercase">MODELO</div>
        <div class="tab-container">
            <button id="btn-tab-info" class="tab-btn active" onclick="switchTab('info')">Info</button>
            <button id="btn-tab-seguridad" class="tab-btn" onclick="switchTab('seguridad')">Seguridad</button>
        </div>
        <div id="desc-text" style="color:#444;line-height:1.6;font-size:0.95rem;margin-bottom:20px;text-align:justify"></div>
        <button class="btn-action btn-yellow" id="btn-desc-quote" onclick="openM(currentVehicleSelected)">COTIZAR AHORA</button>
    </div>
</div>

<div id="modal-quote" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="color:#d4af37;margin-top:0">COTIZAR</h3>
        <label class="form-label">Nombre del Cliente</label><input type="text" id="q-name" class="form-control">
        <label class="form-label">Teléfono</label><input type="tel" id="q-phone" class="form-control">
        <label class="form-label">Método de Pago</label>
        <select id="q-metodo" class="form-control" onchange="toggleFinanzas()">
            <option value="Contado">A Contado</option><option value="Financiado">Financiado</option>
        </select>
        <div id="campo-finanzas" style="display:none">
            <label class="form-label">Enganche ($)</label><input type="number" id="q-down" class="form-control">
            <label class="form-label">Plazo (Meses)</label>
            <select id="q-meses" class="form-control">
                <option value="12">12 Meses</option><option value="48">48 Meses</option><option value="60">60 Meses</option>
            </select>
        </div>
        <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()" style="margin-top:15px">SOLICITAR</button>
        <button onclick="closeM()" style="width:100%;background:none;border:none;color:#999;margin-top:12px;cursor:pointer">Cerrar</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Vehicles</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>Dates</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Pre-Owned</button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS0wO4YdetIsGIaK08WsGEpLc2Ad5k-Fdk5kD4lbEdlb7YLRaoxx4Gk_JwYrrgiQ/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png";

function formatPrice(price) {
    if (!price) return "Consultar";
    let num = price.toString().replace(/[^0-9]/g, '');
    return num ? "$" + num.replace(/\B(?=(\d{3})+(?!\d))/g, ",") : price;
}

function saveData() {
    const name = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit = document.getElementById('user-unit').value;
    if (!name || !phone) { alert("Completa tus datos"); return; }
    localStorage.setItem('renault_user', JSON.stringify({ name, phone, unit }));
    renderUser({ name, phone, unit });
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('user-display-name').innerText = d.name.toUpperCase();
    const slug = d.unit.toLowerCase().trim().replace(/\s+/g, '-');
    document.getElementById('main-car').src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
    document.getElementById('q-name').value = d.name;
    document.getElementById('q-phone').value = d.phone;
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) el.classList.add('active');
    if (id === 'citas') renderAppointmentPage();
}

async function loadCat() {
    const container = document.getElementById('cat-container');
    try {
        const res = await fetch(`${SCRIPT_URL}?hoja=nuevos`);
        const data = await res.json();
        window._catalogoNuevos = data;
        container.innerHTML = data.map((c, i) => `
            <div class="car-card">
                <img src="${c.imagen || PLACEHOLDER}" onclick="openDesc(${i})" onerror="this.src='${PLACEHOLDER}'">
                <h3 style="margin:15px 0 5px">${c.modelo}</h3>
                <div style="color:#d4af37;font-weight:bold;margin-bottom:15px">${formatPrice(c.precio)}</div>
                <button class="btn-action btn-yellow" onclick="openM('${c.modelo}')">COTIZAR</button>
            </div>
        `).join('');
    } catch(e) { container.innerHTML = '<p>Error al cargar.</p>'; }
}

async function loadSemi() {
    const container = document.getElementById('semi-container');
    try {
        const res = await fetch(`${SCRIPT_URL}?hoja=seminuevos`);
        const data = await res.json();
        container.innerHTML = data.map(s => `
            <div class="car-card">
                <h3 style="color:var(--renault-yellow)">${s.modelo || s.unidad}</h3>
                <div style="color:#d4af37;font-weight:bold;margin:10px 0">${formatPrice(s.precio)}</div>
                <button class="btn-action btn-yellow" onclick="openM('${s.modelo || s.unidad}')">ME INTERESA</button>
            </div>
        `).join('');
    } catch(e) { }
}

let currentVehicleSelected = "";
function openDesc(index) {
    const c = window._catalogoNuevos[index];
    currentVehicleSelected = c.modelo;
    document.getElementById('desc-img').src = c.imagen || PLACEHOLDER;
    document.getElementById('desc-title').innerText = c.modelo;
    document.getElementById('desc-text').innerText = c.info || "Contacta a un asesor para más detalles.";
    document.getElementById('modal-desc').style.display = 'flex';
}

function closeDesc() { document.getElementById('modal-desc').style.display = 'none'; }
function openM(m) { closeDesc(); document.getElementById('m-title').innerText = m; document.getElementById('modal-quote').style.display = 'flex'; }
function closeM() { document.getElementById('modal-quote').style.display = 'none'; }
function toggleFinanzas() { document.getElementById('campo-finanzas').style.display = document.getElementById('q-metodo').value === 'Financiado' ? 'block' : 'none'; }

async function handleQuote() {
    const btn = document.getElementById('btn-quote');
    const data = {
        hoja: "cotizaciones",
        nombre: document.getElementById('q-name').value,
        telefono: document.getElementById('q-phone').value,
        modelo: document.getElementById('m-title').innerText,
        metodo: document.getElementById('q-metodo').value,
        enganche: document.getElementById('q-down').value || 'N/A',
        plazo: document.getElementById('q-meses').value || 'N/A',
        fecha: new Date().toLocaleString()
    };
    btn.innerText = "ENVIANDO..."; btn.disabled = true;
    try {
        await fetch(`${SCRIPT_URL}?${new URLSearchParams(data)}`, { mode: 'no-cors' });
        alert("Enviado con éxito."); closeM();
    } catch(e) { alert("Error."); }
    btn.innerText = "SOLICITAR"; btn.disabled = false;
}

function updateAppointmentUI() {
    const data = localStorage.getItem('renault_appointment');
    const el = document.getElementById('reminder-container');
    if (data) {
        const a = JSON.parse(data);
        el.innerHTML = `<div id="appointment-reminder"><div class="cita-label">PRÓXIMA CITA</div><div class="cita-info">${a.fecha} | ${a.hora} HRS</div></div>`;
    } else { el.innerHTML = ''; }
}

function renderAppointmentPage() {
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    const u = JSON.parse(localStorage.getItem('renault_user') || '{}');
    if (data) {
        const a = JSON.parse(data);
        const slug = a.unidad.toLowerCase().trim().replace(/\s+/g, '-');
        cont.innerHTML = `
            <div class="premium-card-service">
                <img src="https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png" style="width:100%; max-width:200px" onerror="this.src='${PLACEHOLDER}'">
                <div style="color:#d4af37; font-weight:900; margin:15px 0">TU ${a.unidad.toUpperCase()}</div>
                <div class="info-row-service"><span class="info-label-service">CLIENTE</span> <span>${a.nombre}</span></div>
                <div class="info-row-service"><span class="info-label-service">FECHA</span> <span>${a.fecha}</span></div>
                <div class="info-row-service"><span class="info-label-service">HORA</span> <span>${a.hora} HRS</span></div>
            </div>
            <button class="btn-action" style="background:#111; color:#ff4444; border:1px solid #ff4444" onclick="cancelarCita()">Cancelar Cita</button>`;
    } else {
        cont.innerHTML = `<div class="card-white">
            <label class="form-label">Kilometraje</label><input type="text" id="c-km" class="form-control" placeholder="Ej: 10,000">
            <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
            <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
            <button id="btn-cita" class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR CITA</button>
        </div>`;
    }
}

async function handleBooking() {
    const u = JSON.parse(localStorage.getItem('renault_user'));
    const app = {
        hoja: "citas", nombre: u.name, telefono: u.phone, unidad: u.unit,
        kilometraje: document.getElementById('c-km').value,
        fecha: document.getElementById('c-date').value,
        hora: document.getElementById('c-time').value
    };
    if(!app.fecha || !app.hora) return alert("Faltan datos");
    try {
        await fetch(`${SCRIPT_URL}?${new URLSearchParams(app)}`, { mode: 'no-cors' });
        localStorage.setItem('renault_appointment', JSON.stringify(app));
        updateAppointmentUI(); renderAppointmentPage();
    } catch(e) { }
}

function cancelarCita() { if(confirm("¿Cancelar?")) { localStorage.removeItem('renault_appointment'); updateAppointmentUI(); renderAppointmentPage(); } }

function initAppData() { updateAppointmentUI(); loadCat(); loadSemi(); }

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        renderUser(JSON.parse(raw));
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};
</script>
</body>
</html>
