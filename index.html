<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
        }
        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; }

        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }

        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }

        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; margin-bottom: 10px; }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; border: none; background: none; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        #appointment-reminder {
            background: #1a1a1a; border: 1px solid #d4af37; border-radius: 20px;
            padding: 15px; margin-top: 20px; text-align: left;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA, ALEJANDRO!</h1>
            <img src="https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png" class="car-hero">
            <div style="font-weight: 800; font-size: 1.2rem;">Tu Duster | UFX-1234</div>
        </div>
        <div id="reminder-area"></div>
        <button class="btn-action btn-green" onclick="showPage('nuevos')">COTIZACIÓN</button>
    </div>

    <div id="p-nuevos" class="page">
        <h2 style="text-align: center; color: #d4af37;">CATÁLOGO NUEVOS</h2>
        <div id="container-nuevos">Cargando unidades...</div>
    </div>

    <div id="p-citas" class="page">
        <h2 style="text-align: center; color: #d4af37;">AGENDAR SERVICIO</h2>
        <div class="card-white">
            <label class="form-label">Nombre del Cliente</label>
            <input type="text" id="c-nombre" class="form-control" value="Alejandro Ramirez">
            <label class="form-label">Teléfono</label>
            <input type="tel" id="c-telefono" class="form-control" value="222-123-4567">
            <label class="form-label">VIN (Niv)</label>
            <input type="text" id="c-vin" class="form-control" placeholder="8REB5759909X...">
            <label class="form-label">Kilometraje Actual</label>
            <input type="number" id="c-km" class="form-control" placeholder="28500">
            <label class="form-label">Fecha Preferida</label>
            <input type="date" id="c-fecha" class="form-control">
            <label class="form-label">Motivo del Servicio</label>
            <textarea id="c-falla" class="form-control" rows="2" placeholder="Mantenimiento Preventivo (10k)"></textarea>
            <button class="btn-action btn-yellow" onclick="enviarCita()">ENVIAR SOLICITUD</button>
        </div>
    </div>

    <div id="p-seminuevos" class="page">
        <h2 style="text-align: center; color: #d4af37;">INVENTARIO SEMINUEVOS</h2>
        <div id="container-seminuevos">Cargando seminuevos...</div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
        <button class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
        <button class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
        <button class="nav-item" onclick="showPage('seminuevos', this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Seminuevos</button>
    </nav>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
            window.scrollTo(0,0);
            if(id === 'nuevos') loadData('nuevos', 'container-nuevos');
            if(id === 'seminuevos') loadData('seminuevos', 'container-seminuevos');
        }

        async function loadData(sheet, containerId) {
            const container = document.getElementById(containerId);
            try {
                const res = await fetch(`${API_URL}?sheet=${sheet}`);
                const data = await res.json();
                container.innerHTML = data.map(item => `
                    <div class="car-card">
                        <h3 style="margin:0; color:var(--renault-yellow)">${item.modelo || item.Versión} ${item.Modelo || ''}</h3>
                        <p style="margin:5px 0; font-size:0.9rem;">${item.Transmisión || ''} | ${item.KM || '0'} KM</p>
                        <div style="font-weight:bold; font-size:1.2rem; color:#d4af37;">${item.precio || item.Precio}</div>
                        <button class="btn-action btn-yellow" style="padding:10px; margin-top:10px; font-size:0.8rem;" onclick="showPage('citas')">ME INTERESA</button>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Error al cargar datos."; }
        }

        async function enviarCita() {
            const btn = event.target;
            const data = {
                nombre: document.getElementById('c-nombre').value,
                telefono: document.getElementById('c-telefono').value,
                vin: document.getElementById('c-vin').value,
                kilometraje: document.getElementById('c-km').value,
                falla: document.getElementById('c-falla').value,
                fecha: document.getElementById('c-fecha').value,
                hora: "10:30 AM"
            };

            if(!data.vin || !data.fecha) return alert("Por favor llena el VIN y la fecha.");
            
            btn.innerText = "ENVIANDO...";
            try {
                await fetch(`${API_URL}?sheet=citas`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: [data]})
                });
                alert("¡Cita agendada con éxito!");
                localStorage.setItem('ultima_cita', JSON.stringify(data));
                btn.innerText = "ENVIAR SOLICITUD";
                location.reload();
            } catch (e) { alert("Error al conectar con la base de datos."); }
        }

        window.onload = () => {
            const cita = localStorage.getItem('ultima_cita');
            if(cita) {
                const c = JSON.parse(cita);
                document.getElementById('reminder-area').innerHTML = `
                    <div id="appointment-reminder">
                        <strong style="color:#d4af37">PRÓXIMA CITA:</strong><br>
                        ${c.fecha} a las ${c.hora}<br>
                        <small>Motivo: ${c.falla}</small>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
