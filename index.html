<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Premium</title>
    <style>
        :root {
            --accent: #FFCC00;
            --bg: #000000;
            --card: #1C1C1E;
            --text-gray: #8E8E93;
            --ios-blue: #007AFF;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding-bottom: 110px;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ESTILO EXACTO DE TUS IMÁGENES --- */
        .header-minimal {
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 3px;
            font-weight: 300;
            border-bottom: 0.5px solid #333;
        }

        .container { padding: 20px; }

        /* Tarjeta Dorada de tu Imagen */
        .hero-gold {
            background: linear-gradient(180deg, #FAD961 0%, #F76B1C 100%);
            border-radius: 35px;
            padding: 40px 20px;
            text-align: center;
            color: black;
            position: relative;
            box-shadow: 0 10px 20px rgba(247, 107, 28, 0.2);
        }

        .hero-gold h1 { font-size: 2.5rem; margin: 0; font-weight: 800; }
        .hero-gold p { font-size: 1.1rem; margin: 5px 0; font-weight: 500; opacity: 0.8; }

        .car-display {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin: 20px 0;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        /* Botón Verde Cotizar */
        .btn-main {
            background: #28CD41;
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(40, 205, 65, 0.3);
        }

        /* Sección de Info (Oculta por defecto) */
        .info-panel {
            background: var(--card);
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        /* GRID DE INVENTARIO */
        .car-item {
            background: var(--card);
            border-radius: 28px;
            padding: 15px;
            margin-bottom: 20px;
            border: 0.5px solid #333;
        }

        .car-item img { width: 100%; border-radius: 20px; }
        .car-item h3 { margin: 10px 0 5px 0; font-size: 1.2rem; }
        .car-item .price { color: var(--accent); font-weight: bold; }

        /* CITAS ESTILO BLANCO LIMPIO */
        .white-card {
            background: white;
            color: black;
            border-radius: 35px;
            padding: 30px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 5px; font-weight: 600; }
        .input-group input, .input-group select {
            width: 100%; padding: 15px; border: 1px solid #E5E5E5; border-radius: 15px; background: #F9F9F9; font-size: 1rem; box-sizing: border-box;
        }

        /* SISTEMA DE HORAS BLOQUEADAS */
        .hours-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .hour-btn {
            padding: 12px;
            background: #F2F2F7;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .hour-btn.booked { background: #FF3B30; color: white; opacity: 0.4; pointer-events: none; }
        .hour-btn.selected { background: black; color: white; }

        /* NAVBAR IDÉNTICA A TU IMAGEN */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 0.5px solid #333;
            z-index: 1000;
        }

        .tab-item { text-align: center; color: var(--text-gray); font-size: 0.7rem; font-weight: 500; }
        .tab-item.active { color: var(--accent); }
        .tab-item svg { width: 26px; height: 26px; display: block; margin: 0 auto 5px; fill: currentColor; }

        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="header-minimal">RENAULT | TEZIUTLÁN</div>

    <div id="p-inicio" class="page active-page container">
        <div class="hero-gold">
            <h1 id="usr-name">HOLA</h1>
            <p id="usr-car-txt">Kwid | Mtz05</p>
            <img id="main-car-img" src="https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png" class="car-display">
        </div>
        
        <button class="btn-main" onclick="nav('nuevos')">COTIZACIÓN</button>
        
        <div class="info-panel" id="unit-info">
            <h4 style="margin:0">Información de la Unidad</h4>
            <p style="font-size: 0.8rem; color: var(--text-gray)">Motor: 1.0L | Rendimiento: 20km/L | Frenos ABS</p>
        </div>
    </div>

    <div id="p-nuevos" class="page container">
        <h2 style="font-weight: 300;">Modelos 2026</h2>
        <div id="lista-autos"></div>
    </div>

    <div id="p-citas" class="page container">
        <div class="white-card">
            <h2 style="margin-top:0">Agendar Cita</h2>
            <div class="input-group">
                <label>FECHA</label>
                <input type="date" onchange="renderHours()">
            </div>
            <div class="input-group">
                <label>HORARIOS DISPONIBLES</label>
                <div class="hours-grid" id="hours-container"></div>
            </div>
            <button class="btn-main" style="background: black; margin-top:30px;">CONFIRMAR CITA</button>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="nav('inicio')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>INICIO
        </div>
        <div class="tab-item" onclick="nav('nuevos')">
            <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>NUEVOS
        </div>
        <div class="tab-item" onclick="nav('citas')">
            <svg viewBox="0 0 24 24"><path d="M17 12h-5V7h5v5zm3.33-7H19V3h-2v2H7V3H5v2H3.67C2.75 5 2 5.75 2 6.67v12.66C2 20.25 2.75 21 3.67 21h16.66c.92 0 1.67-.75 1.67-1.67V6.67C22 5.75 21.25 5 20.33 5z"/></svg>CITAS
        </div>
        <div class="tab-item">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>INFO
        </div>
    </nav>

    <script>
        const API = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";

        function nav(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('p-' + page).classList.add('active-page');
            event.currentTarget.classList.add('active');
        }

        async function loadInventory() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const container = document.getElementById('lista-autos');
                container.innerHTML = "";
                data.forEach(car => {
                    container.innerHTML += `
                        <div class="car-item" onclick="showCarDetail('${car.modelo}')">
                            <img src="${car.imagen}">
                            <h3>${car.modelo}</h3>
                            <p class="price">Desde ${car.precio}</p>
                            <p style="font-size:0.7rem; color:#888">Toca para ver especificaciones técnica</p>
                        </div>
                    `;
                });
            } catch(e) { console.error("Error cargando inventario"); }
        }

        function renderHours() {
            const container = document.getElementById('hours-container');
            container.innerHTML = "";
            const hours = ["09:00", "10:00", "11:00", "12:00", "13:00", "16:00", "17:00", "18:00"];
            const booked = ["10:00", "17:00"]; // Esto simula horas ya ocupadas

            hours.forEach(h => {
                const isBooked = booked.includes(h);
                const div = document.createElement('div');
                div.className = `hour-btn ${isBooked ? 'booked' : ''}`;
                div.innerText = h;
                if(!isBooked) {
                    div.onclick = () => {
                        document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('selected'));
                        div.classList.add('selected');
                    }
                }
                container.appendChild(div);
            });
        }

        function showCarDetail(modelo) {
            nav('inicio');
            document.getElementById('unit-info').style.display = 'block';
            document.getElementById('unit-info').scrollIntoView();
        }

        window.onload = () => {
            loadInventory();
            renderHours();
        };
    </script>
</body>
</html>
