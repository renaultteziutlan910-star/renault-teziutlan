<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* --- Estilos Premium para Detalles de Cita --- */
        .stepper-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px; position: relative; margin-top: 20px; }
        .stepper-item { text-align: center; z-index: 2; flex: 1; }
        .step-circle { width: 30px; height: 30px; border-radius: 50%; background: #333; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #444; color: #fff; font-size: 0.8rem; font-weight: bold; }
        .stepper-item.active .step-circle { background: var(--gold-gradient); border-color: #f5d17a; color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.6); }
        .step-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #666; }
        .stepper-item.active .step-label { color: #d4af37; }
        .step-line { position: absolute; top: 15px; left: 10%; right: 10%; height: 2px; background: #333; z-index: 1; }

        .premium-card { background: linear-gradient(145deg, #1e1e1e 0%, #121212 100%); border: 1px solid rgba(212,175,55,0.3); border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .premium-card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .premium-card-img { width: 100px; border-radius: 12px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .premium-info-grid { display: grid; grid-template-columns: 1fr; gap: 8px; font-size: 0.85rem; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .info-label { color: var(--gray-text); font-weight: 600; }

        .btn-premium-action { display: flex; align-items: center; gap: 15px; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 18px; margin-bottom: 12px; text-align: left; width: 100%; color: #fff; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .btn-premium-action:active { transform: scale(0.98); background: #222; }
        .icon-circle { width: 40px; height: 40px; background: rgba(212,175,55,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #d4af37; font-size: 1.2rem; }

        /* Estilos Generales */
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }
        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-profile { background: var(--gold-gradient); border-radius: 35px; padding: 40px 20px; text-align: center; color: #000; box-shadow: 0 15px 35px rgba(212,175,55,0.3); }
        .car-hero { width: 100%; max-width: 280px; margin: 20px auto; display: block; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); aspect-ratio: 16/9; object-fit: contain; }
        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0d0d0d; display: flex; justify-content: space-around; padding: 15px 0 30px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; cursor: pointer; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }
        .btn-cancel-modern { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 12px; border-radius: 15px; width: 100%; margin-top: 20px; font-weight: bold; cursor: pointer; }
        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; aspect-ratio: 16/9; object-fit: cover; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
    <label class="form-label" style="color:#888;text-align:left">Selecciona tu Renault actual:</label>
    <select id="user-unit" class="login-input">
        <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
        <option value="Duster">Duster</option><option value="Stepway">Stepway</option>
        <option value="Oroch">Oroch</option><option value="Koleos">Koleos</option>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="card-profile">
        <h1 id="greet">¡HOLA!</h1>
        <img id="main-car" src="" class="car-hero" alt="Tu Renault">
        <div id="tag-car" style="font-weight:800;font-size:1.3rem">Tu Renault</div>
    </div>
    <div id="reminder-container"></div>
    <button class="btn-action btn-green" onclick="showPage('nuevos')">VER CATÁLOGO</button>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">GESTIÓN DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:8px">UNIDADES NUEVAS</div>
    <div id="cat-container"></div>
</div>

<div id="p-seminuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">INVENTARIO SEMINUEVOS</div>
    <div id="semi-container"></div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Seminuevos</button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbXXuhNApBkiAJbUwIqSd_DjzE39SglgR0a0UQrWDu6lvWipm2Vue3Hnn_FJ38P6ds8/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png";

function saveData() {
    const name = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit = document.getElementById('user-unit').value;
    if (!name || !phone) return alert("Completa tus datos");
    const userData = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(userData));
    renderUser(userData);
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
    const slug = d.unit.toLowerCase().replace(/\s+/g, '-');
    document.getElementById('main-car').src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
    document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) el.classList.add('active');
    if (id === 'citas') renderAppointmentPage();
}

function renderAppointmentPage() {
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    const u = JSON.parse(localStorage.getItem('renault_user') || '{}');

    if (data) {
        const a = JSON.parse(data);
        const slug = a.unidad.toLowerCase().trim().replace(/\s+/g, '-');
        const imgPath = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;

        cont.innerHTML = `
            <div class="stepper-container">
                <div class="step-line"></div>
                <div class="stepper-item active"><div class="step-circle">✓</div><div class="step-label">Agendado</div></div>
                <div class="stepper-item"><div class="step-circle">2</div><div class="step-label">Confirmado</div></div>
                <div class="stepper-item"><div class="step-circle">3</div><div class="step-label">En Servicio</div></div>
            </div>

            <div class="premium-card">
                <div class="premium-card-header">
                    <img src="${imgPath}" class="premium-card-img" onerror="this.src='${PLACEHOLDER}'">
                    <div>
                        <div style="color:#d4af37; font-weight:900; font-size:1.1rem">Tu ${a.unidad}</div>
                        <div style="font-size:0.7rem; color:#888">SERVICIO PROGRAMADO</div>
                    </div>
                </div>
                <div class="premium-info-grid">
                    <div class="info-row"><span class="info-label">Cliente:</span> <span>${a.nombre}</span></div>
                    <div class="info-row"><span class="info-label">Kilometraje:</span> <span>${a.kilometraje} km</span></div>
                    <div class="info-row"><span class="info-label">Próxima Cita:</span> <span>${a.fecha} | ${a.hora} hrs</span></div>
                    <div class="info-row"><span class="info-label">Falla:</span> <span>${a.detalles || 'Revisión General'}</span></div>
                </div>
            </div>

            <a class="btn-premium-action" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Cita+Servicio+Renault&dates=20260512T183400Z/20260512T193400Z" target="_blank">
                <div class="icon-circle">📅</div>
                <div><strong>Añadir al Calendario</strong><br><small style="color:#666">Sincroniza con tu agenda</small></div>
            </a>

            <a class="btn-premium-action" href="https://www.google.com/maps/search/?api=1&query=Renault+Teziutlan" target="_blank">
                <div class="icon-circle">📍</div>
                <div><strong>Cómo llegar</strong><br><small style="color:#666">Abrir ubicación del taller</small></div>
            </a>

            <a class="btn-premium-action" href="https://wa.me/522311234567" target="_blank">
                <div class="icon-circle">💬</div>
                <div><strong>Asesor Técnico</strong><br><small style="color:#666">Chat directo por WhatsApp</small></div>
            </a>

            <button class="btn-cancel-modern" onclick="cancelarCita()">Cancelar mi Cita</button>
        `;
    } else {
        const units = ["Kwid","Kardian","Duster","Stepway","Oroch","Koleos"];
        const opts = units.map(un => `<option value="${un}"${u.unit===un?' selected':''}>${un}</option>`).join('');
        cont.innerHTML = `<div class="card-white">
            <label class="form-label">Nombre</label><input type="text" id="c-name" class="form-control" value="${u.name||''}">
            <label class="form-label">Teléfono</label><input type="tel" id="c-phone" class="form-control" value="${u.phone||''}">
            <label class="form-label">Unidad a Revisar</label><select id="c-unit" class="form-control">${opts}</select>
            <label class="form-label">Kilometraje Actual</label><input type="text" id="c-km" class="form-control" placeholder="Ej: 15,000">
            <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
            <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
            <label class="form-label">¿Qué falla presenta su unidad?</label>
            <textarea id="c-details" class="form-control" placeholder="Ej: Ruido en suspensión, servicio de 10k..."></textarea>
            <button id="btn-cita" class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR CITA</button>
        </div>`;
    }
}

async function handleBooking() {
    const btn = document.getElementById('btn-cita');
    const app = {
        hoja: "citas",
        nombre: document.getElementById('c-name').value.trim(),
        telefono: document.getElementById('c-phone').value.trim(),
        unidad: document.getElementById('c-unit').value,
        kilometraje: document.getElementById('c-km').value.trim(),
        fecha: document.getElementById('c-date').value,
        hora: document.getElementById('c-time').value,
        detalles: document.getElementById('c-details').value.trim() 
    };
    if (!app.fecha || !app.hora) return alert("Por favor selecciona fecha y hora.");
    btn.innerText = "PROCESANDO...";
    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(app) });
        localStorage.setItem('renault_appointment', JSON.stringify(app));
        renderAppointmentPage();
    } catch(e) { alert("Error al conectar con la base de datos."); }
}

async function loadCat() {
    try {
        const res = await fetch(SCRIPT_URL + "?hoja=nuevos");
        const data = await res.json();
        document.getElementById('cat-container').innerHTML = data.map(c => `
            <div class="car-card">
                <img src="${c.imagen || PLACEHOLDER}">
                <h3 style="margin:15px 0 5px">${c.modelo}</h3>
                <div style="color:#d4af37;font-weight:bold;margin-bottom:15px">$${c.precio}</div>
                <button class="btn-action btn-yellow" onclick="alert('Solicitando informes...')">ME INTERESA</button>
            </div>
        `).join('');
    } catch(e) {}
}

async function loadSemi() {
    try {
        const res = await fetch(SCRIPT_URL + "?hoja=seminuevos");
        const data = await res.json();
        document.getElementById('semi-container').innerHTML = data.map(s => `
            <div class="car-card">
                <h3 style="margin:5px 0;color:var(--renault-yellow)">${s.unidad || s.modelo}</h3>
                <div style="color:#d4af37;font-weight:bold;margin:10px 0">$${s.precio}</div>
                <button class="btn-action btn-yellow">ME INTERESA</button>
            </div>
        `).join('');
    } catch(e) {}
}

function cancelarCita() {
    if(confirm("¿Seguro que deseas cancelar?")) {
        localStorage.removeItem('renault_appointment');
        renderAppointmentPage();
    }
}

async function initAppData() {
    loadCat();
    loadSemi();
}

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        const d = JSON.parse(raw);
        renderUser(d);
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};
</script>
</body>
</html>
