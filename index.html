        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; cursor: pointer; transition: transform 0.2s; background: #222; aspect-ratio: 16/9; object-fit: cover; display: block; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0d0d0d; display: flex; justify-content: space-around; padding: 15px 0 30px 0; border-top: 1px solid #222; z-index: 1000; }

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtsJSdVpy7L_XdwFdxoq99-FPyRN0SUljawFS3gARNkT_9jQgywIx5agL6k_mS4Zc/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/Renato-Tez/Assets/main/renault-placeholder.png";

    },
    "koleos": {

        tecnologia: "Sonido Bose Premium 8 bocinas, techo panorámico eléctrico y asientos con masaje.",
        tags: ["Sonido Bose", "Techo panorámico", "LED Pure Vision"]
    },
    "stepway": {
        info: "Estilo crossover con equipamiento completo y el sello Renault de calidad.",
        seguridad: "Control de estabilidad ESC, 4 airbags y frenos ABS de serie.",
        tecnologia: "Multimedia con conectividad inalámbrica, cámara de reversa y control de crucero.",
        tags: ["Crossover", "ESC", "Crucero", "Cámara reversa"]
    },
    "oroch": {
        info: "La pickup más versátil de Renault. Capacidad de carga real con comodidad de SUV.",
        seguridad: "Chasis reforzado, frenos ABS con EBD y airbags frontales.",
        tecnologia: "Pantalla multimedia conectada, cámara de reversa y llave inteligente.",
        tags: ["Pickup", "Doble cabina", "4x4 Opcional"]
    }
};

let currentVehicleSelected = "";
let cacheNuevos            = null;
let cacheSeminuevos        = null;

function getField(obj) {
    const keys = Array.from(arguments).slice(1);
    for (const k of keys) {
        const found = Object.keys(obj).find(
            ok => ok.toLowerCase().trim() === k.toLowerCase().trim()
        );
        if (found !== undefined && obj[found] !== null) {
            const val = String(obj[found]).trim();
            if (val && val !== "undefined" && val !== "null") return val;
        }
    }
    return "";
}

function getNombreSemi(s) {
    const porAlias = getField(s, 'versión','version','Versión','Version','VERSIÓN','modelo','Modelo','MODELO','unidad','Unidad','UNIDAD','nombre','Nombre','NOMBRE','marca','Marca','MARCA','auto','Auto','AUTO','vehiculo','Vehiculo','vehículo','Vehículo','descripcion','Descripcion','descripción','Descripción');
    if (porAlias) return porAlias;
    const ignorar = ['precio','price','km','kms','kilometraje','año','year','color','transmision','transmisión','imagen','foto','url','id','hoja','timestamp'];
    for (const key of Object.keys(s)) {
        if (ignorar.includes(key.toLowerCase().trim())) continue;
        const val = String(s[key]).trim();
        if (val && val !== "undefined" && val !== "null" && val.length > 1) return val;
    }
    return "Seminuevo Renault";
}

function formatPrice(price) {
    if (!price) return "Consultar precio";
    const num = price.toString().replace(/[^0-9]/g, '');
    if (!num) return String(price);
    return "$" + num.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function escQ(s) { return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function saveData() {
    const name  = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit  = document.getElementById('user-unit').value;
    if (!name || !phone) { alert("Por favor completa tus datos"); return; }
    const userData = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(userData));
    renderUser(userData);
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('greet').innerText   = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
    const slug = d.unit.toLowerCase().replace(/\s+/g, '-');
    document.getElementById('main-car').src       = `https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/${slug}.jpeg`;
    document.getElementById('tag-car').innerText  = `Tu ${d.unit}`;
    document.getElementById('q-name').value       = d.name;
    document.getElementById('q-phone').value      = d.phone;
}

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        renderUser(JSON.parse(raw));
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};

async function initAppData() {
    updateAppointmentUI();
    Promise.all([loadCat(), loadSemi()]).catch(() => {});
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) el.classList.add('active');
    window.scrollTo(0, 0);
    if (id === 'citas') renderAppointmentPage();
}

async function loadCat() {
    if (cacheNuevos) { document.getElementById('cat-container').innerHTML = cacheNuevos; return; }
    const container = document.getElementById('cat-container');
    try {
        const res  = await fetch(`${SCRIPT_URL}?sheet=nuevos`);
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#888;padding:30px">No hay unidades disponibles.</p>';
            return;
        }
        window._catalogoNuevos = data;
        cacheNuevos = data.map((c, i) => {
            const modelo  = getField(c, 'modelo','Modelo','MODELO','model','nombre','Nombre');
            const precio  = getField(c, 'precio','Precio','PRECIO','price');
            const imagen  = getField(c, 'imagen','Imagen','IMAGEN','img','image','foto','Foto','URL','url');
            const version = getField(c, 'version','Versión','Version','versión','VERSIÓN','variante','Variante');
            return `
            <div class="car-card">
                <img src="${imagen || PLACEHOLDER}" loading="lazy" alt="${modelo}"
                    onclick="openDesc(${i})"
                    onerror="this.onerror=null;this.src='${PLACEHOLDER}'">
                <h3 style="margin:15px 0 5px">${modelo || '—'}</h3>
                ${version ? `<p style="margin:0 0 8px;font-size:0.82rem;color:#888">${version}</p>` : ''}
                <div style="color:#d4af37;font-weight:bold;margin-bottom:15px">${formatPrice(precio)}</div>
                <button class="btn-action btn-yellow" onclick="openM('${escQ(modelo)}')">COTIZAR</button>
            </div>`;
        }).join('');
        container.innerHTML = cacheNuevos;
    } catch(e) {
        container.innerHTML = '<p style="text-align:center;color:#888;padding:30px">Reintentando conexión...</p>';
    }
}

async function loadSemi() {
    if (cacheSeminuevos) { document.getElementById('semi-container').innerHTML = cacheSeminuevos; return; }
    const container = document.getElementById('semi-container');
    try {
        const res  = await fetch(`${SCRIPT_URL}?sheet=seminuevos`);
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#888;padding:30px">Sin inventario disponible.</p>';
            return;
        }
        cacheSeminuevos = data.map(s => {
            const nombre = getNombreSemi(s);
            const km     = getField(s, 'km','KM','kilometraje','Kilometraje','kms','KMS');
            const anio   = getField(s, 'año','Año','anio','year','Year','AÑO');
            const trans  = getField(s, 'transmisión','transmision','Transmisión','Transmision','trans','Trans');
            const color  = getField(s, 'color','Color','COLOR');
            const precio = getField(s, 'precio','Precio','PRECIO','price');
            const kmFmt  = km ? parseInt(km).toLocaleString('es-MX') + ' km' : '';
            return `
            <div class="car-card">
                <h3 style="margin:5px 0;color:var(--renault-yellow)">${nombre}</h3>
                <div style="margin:8px 0 10px">
                    ${anio  ? `<span class="semi-badge">${anio}</span>`  : ''}
                    ${trans ? `<span class="semi-badge">${trans}</span>` : ''}
                    ${km    ? `<span class="semi-badge">${kmFmt}</span>` : ''}
                    ${color ? `<span class="semi-badge">${color}</span>` : ''}
                </div>
                <div style="color:#d4af37;font-weight:bold;margin:10px 0">${formatPrice(precio)}</div>
                <button class="btn-action btn-yellow" onclick="openM('${escQ(nombre)}')">ME INTERESA</button>
            </div>`;
        }).join('');
        container.innerHTML = cacheSeminuevos;
    } catch(e) {
        container.innerHTML = '<p style="text-align:center;color:#888;padding:30px">Actualizando inventario...</p>';
    }
}

function openDesc(index) {
    const data = window._catalogoNuevos || [];
    const c    = data[index];
    if (!c) return;
    const modelo = getField(c, 'modelo','Modelo','MODELO','model','nombre','Nombre');
    const imagen = getField(c, 'imagen','Imagen','IMAGEN','img','image','foto','Foto','URL','url');
    currentVehicleSelected = modelo;
    document.getElementById('desc-img').src            = imagen || PLACEHOLDER;
    document.getElementById('desc-title').innerText    = modelo;
    document.getElementById('btn-desc-quote').onclick  = () => { closeDesc(); openM(modelo); };
    switchTab('info');
    document.getElementById('modal-desc').style.display = 'flex';
}

function switchTab(tabType) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-tab-' + tabType).classList.add('active');
    const nombreMin = currentVehicleSelected.toLowerCase();
    const key = Object.keys(DESC_DATA).find(k => nombreMin.includes(k));
    const info = DESC_DATA[key] || {
        info:       `${currentVehicleSelected} disponible para entrega inmediata en Renault Teziutlán.`,
        seguridad:  "Sistemas de seguridad Renault: ABS, bolsas de aire y estructura reforzada.",
        tecnologia: "Conectividad total y confort premium en cada viaje.",
        tags:       ["Renault", "Calidad", "Garantía"]
    };
    document.getElementById('desc-text').innerText  = info[tabType] || '';
    document.getElementById('desc-tags').innerHTML   = tabType === 'info'
        ? (info.tags || []).map(t => `<span class="feature-tag">${t}</span>`).join('') : '';
}

function closeDesc() { document.getElementById('modal-desc').style.display = 'none'; }

function openM(nombreModelo) {
    document.getElementById('m-title').innerText       = nombreModelo || 'COTIZAR';
    document.getElementById('modal-quote').style.display = 'flex';
}
function closeM() { document.getElementById('modal-quote').style.display = 'none'; }

function toggleFinanzas() {
    document.getElementById('campo-finanzas').style.display =
        document.getElementById('q-metodo').value === 'Financiado' ? 'block' : 'none';
}

async function handleQuote() {
    const btn = document.getElementById('btn-quote');
    const u   = JSON.parse(localStorage.getItem('renault_user') || '{}');
    const quote = {
        hoja:        "cotizaciones",
        nombre:      document.getElementById('q-name').value  || u.name  || '',
        telefono:    document.getElementById('q-phone').value || u.phone || '',
        modelo:      document.getElementById('m-title').innerText,
        cp:          document.getElementById('q-cp').value,
        metodo_pago: document.getElementById('q-metodo').value,
        enganche:    document.getElementById('q-down').value  || "0",
        meses:       document.getElementById('q-meses').value || "0",
        fecha:       new Date().toLocaleDateString('es-MX')
    };
    if (!quote.nombre || !quote.telefono) { alert("Completa tu nombre y teléfono."); return; }
    btn.innerText = "ENVIANDO..."; btn.disabled = true;
    try {
        await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(quote) });
        alert(`¡Solicitud enviada para ${quote.modelo}!\nUn asesor te contactará pronto.`);
        closeM();
    } catch(e) { alert("Error al enviar. Intenta de nuevo."); }
    finally { btn.innerText = "SOLICITAR"; btn.disabled = false; }
}

function updateAppointmentUI() {
    const data = localStorage.getItem('renault_appointment');
    const el   = document.getElementById('reminder-container');
    if (data) {
        const a = JSON.parse(data);
        el.innerHTML = `<div id="appointment-reminder">
            <div style="color:#d4af37;font-weight:900;font-size:0.8rem">PRÓXIMA CITA</div>
            <div style="font-size:1.2rem;font-weight:bold">${a.fecha} | ${a.hora} hrs</div>
        </div>`;
    } else { el.innerHTML = ''; }
}

function renderAppointmentPage() {
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    const u    = JSON.parse(localStorage.getItem('renault_user') || '{}');

    if (data) {
        const a = JSON.parse(data);
        cont.innerHTML = `<div class="card-white" style="text-align:center">
            <div style="font-size:3.5rem">📅</div><h3>CITA AGENDADA</h3>
            <div style="background:#f7f7f7;padding:20px;border-radius:20px;text-align:left">
                <strong>Nombre:</strong> ${a.nombre}<br>
                <strong>Unidad:</strong> ${a.unidad}<br>
                <strong>Kilometraje:</strong> ${parseInt(a.kilometraje||0).toLocaleString('es-MX')} km<br>
                <strong>Fecha:</strong> ${a.fecha}<br>
                <strong>Hora:</strong> ${a.hora} hrs
                ${a.detalles ? `<br><strong>Detalles:</strong> ${a.detalles}` : ''}
            </div>
            <div class="waiting-msg">
                En un momento se comunican con usted por medio de WhatsApp para confirmar su cita.
            </div>
            <button class="btn-cancel-modern" onclick="cancelarCita()">Cancelar Cita</button>
        </div>`;
    } else {
        const units = ["Kwid","Kardian","Duster","Stepway","Oroch","Koleos","Master","Kangoo","Megane E-Tech","Clio","Sandero","Logan","Captur","Fluence","Safrane","Scala","Megane","Scenic"];
        const opts  = units.map(un => `<option value="${un}"${u.unit===un?' selected':''}>${un}</option>`).join('');
        cont.innerHTML = `<div class="card-white">
            <label class="form-label">Nombre</label>
            <input type="text"   id="c-name"    class="form-control" value="${u.name||''}">
            <label class="form-label">Teléfono</label>
            <input type="tel"    id="c-phone"   class="form-control" value="${u.phone||''}">
            <label class="form-label">Unidad a Revisar</label>
            <select              id="c-unit"    class="form-control">${opts}</select>
            <label class="form-label">Kilometraje Actual</label>
            <input type="number" id="c-km"      class="form-control" placeholder="Ej: 15000">
            <label class="form-label">Fecha</label>
            <input type="date"   id="c-date"    class="form-control">
            <label class="form-label">Hora</label>
            <input type="time"   id="c-time"    class="form-control">
            <label class="form-label">Detalles o Fallas (opcional)</label>
            <textarea id="c-details" class="form-control" placeholder="Describe si tu unidad tiene algún detalle o falla..." style="height:80px"></textarea>
            <button id="btn-cita" class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR CITA</button>
        </div>`;
    }
}

async function handleBooking() {
    const btn = document.getElementById('btn-cita');
    const app = {
        hoja:        "citas",
        nombre:      document.getElementById('c-name').value,
        telefono:    document.getElementById('c-phone').value,
        unidad:      document.getElementById('c-unit').value,
        kilometraje: document.getElementById('c-km').value,
        fecha:       document.getElementById('c-date').value,
        hora:        document.getElementById('c-time').value,
        detalles:    document.getElementById('c-details').value,
        timestamp:   new Date().toISOString()
    };
    if (!app.fecha || !app.hora)         { alert("Selecciona fecha y hora."); return; }
    if (!app.nombre || !app.telefono)    { alert("Completa nombre y teléfono."); return; }
    btn.innerText = "PROCESANDO..."; btn.disabled = true;
    try {
        await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(app) });
        localStorage.setItem('renault_appointment', JSON.stringify(app));
        alert("¡Cita agendada exitosamente!");
        updateAppointmentUI();
        showPage('inicio');
    } catch(e) { alert("Error de conexión. Intenta de nuevo."); }
    finally { btn.innerText = "AGENDAR CITA"; btn.disabled = false; }
}

async function cancelarCita() {
    const rawData = localStorage.getItem('renault_appointment');
    if (!rawData) return;
    
    if (confirm("¿Deseas cancelar tu cita de servicio? Los datos se guardarán para contactarte después.")) {
        const app = JSON.parse(rawData);
        const datosCancelacion = {
            hoja: "cancelada",
            nombre: app.nombre,
            telefono: app.telefono,
            unidad: app.unidad,
            kilometraje: app.kilometraje,
            fecha: app.fecha,
            hora: app.hora,
            detalles: app.detalles,
            timestamp: new Date().toISOString()
        };
        
        try {
            await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(datosCancelacion) });
            localStorage.removeItem('renault_appointment');
            renderAppointmentPage();
            updateAppointmentUI();
            alert("Cita cancelada. En breve nos comunicaremos para reprogramar.");
        } catch(e) {
            alert("Error al procesar la cancelación. Intenta de nuevo.");
        }
    }
}
</script>
</body>
</html>
