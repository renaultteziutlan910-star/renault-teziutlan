<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--dark-bg); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 35px; text-align: center; }
        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }
        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-profile { background: var(--gold-gradient); border-radius: 35px; padding: 40px 20px; text-align: center; color: #000; box-shadow: 0 15px 35px rgba(212,175,55,0.3); }
        .car-hero { width: 100%; max-width: 280px; margin: 20px auto; display: block; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); border-radius: 15px; aspect-ratio: 16/9; object-fit: cover; background: #c9a227; }
        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .login-input:focus, .form-control:focus { outline: none; border-color: #d4af37; }
        textarea.form-control { resize: vertical; min-height: 80px; font-family: inherit; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }
        .btn-whatsapp-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000; text-decoration: none; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .btn-whatsapp-float svg { width: 30px; height: 30px; fill: currentColor; }
        .tab-container { display: flex; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: 800; font-size: 0.7rem; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; cursor: pointer; transition: transform 0.2s; background: #222; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0d0d0d; display: flex; justify-content: space-around; padding: 15px 0 30px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; cursor: pointer; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; position: relative; }
        .desc-title { color: #d4af37; font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; text-transform: uppercase; }
        .desc-text { color: #444; line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px; min-height: 100px; text-align: justify; }
        .feature-tag { display: inline-block; background: #f0f0f0; padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; margin: 3px; color: #555; }
        
        .premium-card-service { background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%); border: 1px solid rgba(212,175,55,0.2); border-radius: 25px; padding: 25px; text-align: center; }
        .info-row-service { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 10px 0; }
        .info-label-service { color: var(--gray-text); }
        .info-value-service { font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-area" style="margin-bottom:30px"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
    <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
    <label class="form-label" style="color:#888;text-align:left">Selecciona tu Renault actual:</label>
    <select id="user-unit" class="login-input">
        <option value="Kwid">Kwid</option><option value="Kardian">Kardian</option>
        <option value="Duster">Duster</option><option value="Stepway">Stepway</option>
        <option value="Oroch">Oroch</option><option value="Koleos">Koleos</option>
        <option value="Master">Master</option><option value="Kangoo">Kangoo</option>
        <option value="Megane E-Tech">Megane E-Tech</option>
    </select>
    <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
</div>

<header>
    <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
</header>

<div id="p-inicio" class="page active">
    <div class="card-profile">
        <h1 id="greet">¡HOLA!</h1>
        <img id="main-car" src="" class="car-hero" onerror="this.src='https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png'">
        <div id="tag-car" style="font-weight:800;font-size:1.3rem">Tu Renault</div>
    </div>
    <div id="reminder-container"></div>
    <button class="btn-action btn-green" onclick="showPage('nuevos')">VER CATÁLOGO</button>
</div>

<div id="p-citas" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">GESTIÓN DE SERVICIO</div>
    <div id="appointment-content"></div>
</div>

<div id="p-nuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:8px">UNIDADES NUEVAS</div>
    <div id="cat-container"></div>
</div>

<div id="p-seminuevos" class="page">
    <div style="text-align:center;color:#d4af37;font-weight:800;margin-bottom:15px">INVENTARIO SEMINUEVOS</div>
    <div id="semi-container"></div>
</div>

<div id="modal-quote" class="modal">
    <div class="modal-content">
        <h3 id="m-title" style="color:#d4af37">COTIZAR</h3>
        <label class="form-label">Nombre</label><input type="text" id="q-name" class="form-control">
        <label class="form-label">Teléfono</label><input type="tel" id="q-phone" class="form-control">
        <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()">SOLICITAR</button>
        <button onclick="closeM()" style="width:100%;background:none;border:none;margin-top:10px">Cerrar</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showPage('inicio',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
    <button class="nav-item" onclick="showPage('nuevos',this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
    <button class="nav-item" onclick="showPage('citas',this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
    <button class="nav-item" onclick="showPage('seminuevos',this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Semis</button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpdy-7843_ZO4pIW3AKM4EIAEN1FnC1N4zFQeP3wU2pUs2VdVRVq1G0HGUp2m8Dw0/exec";
const PLACEHOLDER = "https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/kwid.png";

function saveData() {
    const name = document.getElementById('user-name').value.trim();
    const phone = document.getElementById('user-phone').value.trim();
    const unit = document.getElementById('user-unit').value;
    if (!name || !phone) return alert("Completa tus datos");
    const userData = { name, phone, unit };
    localStorage.setItem('renault_user', JSON.stringify(userData));
    renderUser(userData);
    document.getElementById('login-screen').style.display = 'none';
    initAppData();
}

function renderUser(d) {
    document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
    const slug = d.unit.toLowerCase().replace(/\s+/g, '-');
    document.getElementById('main-car').src = `https://raw.githubusercontent.com/renaultteziutlan910-star/renault-teziutlan/main/img/${slug}.png`;
    document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
}

window.onload = () => {
    const raw = localStorage.getItem('renault_user');
    if (raw) {
        renderUser(JSON.parse(raw));
        document.getElementById('login-screen').style.display = 'none';
        initAppData();
    }
};

async function initAppData() {
    updateAppointmentUI();
    loadCat();
    loadSemi();
}

async function loadCat() {
    const cont = document.getElementById('cat-container');
    cont.innerHTML = "Cargando...";
    try {
        const res = await fetch(`${SCRIPT_URL}?hoja=nuevos`);
        const data = await res.json();
        cont.innerHTML = data.map(c => `
            <div class="car-card">
                <img src="${c.imagen || PLACEHOLDER}">
                <h3>${c.modelo}</h3>
                <button class="btn-action btn-yellow" onclick="openM('${c.modelo}')">COTIZAR</button>
            </div>`).join('');
    } catch(e) { cont.innerHTML = "Error al cargar."; }
}

async function loadSemi() {
    const cont = document.getElementById('semi-container');
    try {
        const res = await fetch(`${SCRIPT_URL}?hoja=seminuevos`);
        const data = await res.json();
        cont.innerHTML = data.map(s => `
            <div class="car-card">
                <h3>${s.modelo || s.nombre || 'Seminuevo'}</h3>
                <p>${s.precio || ''}</p>
                <button class="btn-action btn-yellow" onclick="openM('${s.modelo || s.nombre}')">INFO</button>
            </div>`).join('');
    } catch(e) { }
}

function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    if (el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
    if (id === 'citas') renderAppointmentPage();
}

function openM(m) {
    document.getElementById('m-title').innerText = m;
    document.getElementById('modal-quote').style.display = 'flex';
}
function closeM() { document.getElementById('modal-quote').style.display = 'none'; }

async function handleQuote() {
    const data = {
        "hoja": "cotizaciones",
        "nombre": document.getElementById('q-name').value,
        "telefono": document.getElementById('q-phone').value,
        "unidad a revisar": document.getElementById('m-title').innerText,
        "fecha": new Date().toLocaleString()
    };
    await fetch(`${SCRIPT_URL}?${new URLSearchParams(data)}`, { method: 'POST', mode: 'no-cors' });
    alert("Enviado");
    closeM();
}

function renderAppointmentPage() {
    const data = localStorage.getItem('renault_appointment');
    const cont = document.getElementById('appointment-content');
    const u = JSON.parse(localStorage.getItem('renault_user') || '{}');

    if (data) {
        const a = JSON.parse(data);
        cont.innerHTML = `
            <div class="premium-card-service">
                <h3>Tu ${a["unidad a revisar"]}</h3>
                <div class="info-row-service"><span>Fecha:</span> <span>${a.fecha}</span></div>
                <div class="info-row-service"><span>Hora:</span> <span>${a.hora}</span></div>
                <button class="btn-cancel-modern" onclick="cancelarCita()">CANCELAR</button>
            </div>`;
    } else {
        cont.innerHTML = `
            <div class="card-white">
                <label class="form-label">Kilometraje</label><input type="text" id="c-km" class="form-control">
                <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
                <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
                <button class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR</button>
            </div>`;
    }
}

async function handleBooking() {
    const u = JSON.parse(localStorage.getItem('renault_user'));
    const app = {
        "hoja": "citas",
        "nombre": u.name,
        "telefono": u.phone,
        "unidad a revisar": u.unit,
        "kilometraje": document.getElementById('c-km').value,
        "fecha": document.getElementById('c-date').value,
        "hora": document.getElementById('c-time').value
    };
    await fetch(`${SCRIPT_URL}?${new URLSearchParams(app)}`, { method: 'POST', mode: 'no-cors' });
    localStorage.setItem('renault_appointment', JSON.stringify(app));
    renderAppointmentPage();
}

async function cancelarCita() {
    const a = JSON.parse(localStorage.getItem('renault_appointment'));
    const data = { ...a, "hoja": "cancelada" };
    await fetch(`${SCRIPT_URL}?${new URLSearchParams(data)}`, { method: 'POST', mode: 'no-cors' });
    localStorage.removeItem('renault_appointment');
    renderAppointmentPage();
}

function updateAppointmentUI() {}
</script>
</body>
</html>
