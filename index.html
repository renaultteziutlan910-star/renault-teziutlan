<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 35px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
        }
        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); border-radius: 15px; }

        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        
        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }

        .btn-whatsapp-float {
            position: fixed; bottom: 100px; right: 20px;
            background: #25d366; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000;
            text-decoration: none;
        }
        .btn-whatsapp-float svg { width: 30px; height: 30px; fill: currentColor; }

        .tab-container { display: flex; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: 800; font-size: 0.7rem; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }

        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; cursor: pointer; transition: transform 0.2s; }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .desc-title { color: #d4af37; font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; text-transform: uppercase; }
        .desc-text { color: #444; line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px; min-height: 100px; text-align: justify;}
        .feature-tag { display: inline-block; background: #f0f0f0; padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; margin: 3px; color: #555; }
        
        #appointment-reminder { background: rgba(255,255,255,0.1); border: 1px solid #d4af37; padding: 15px; border-radius: 20px; margin-top: 20px; text-align: center; }
        .btn-cancel-modern { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <a href="https://wa.me/522311234567?text=Hola,%20necesito%20asesoría%20personalizada." class="btn-whatsapp-float" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217s.231.001.332.005c.109.004.258-.041.404.308.159.386.542 1.32.588 1.412.046.091.076.197.015.317-.061.121-.092.197-.184.303-.092.106-.192.235-.274.316-.091.091-.186.189-.08.37.106.181.471.777.994 1.244.673.599 1.242.786 1.423.867.181.081.287.067.394-.055.106-.121.454-.528.575-.708.121-.181.242-.151.409-.091.166.061 1.057.498 1.239.588.181.091.302.136.346.212.046.075.046.439-.097.844z"/></svg>
    </a>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
        <label class="form-label" style="color:#888; text-align:left;">Selecciona tu Renault actual:</label>
        <select id="user-unit" class="login-input">
            <optgroup label="Modelos Actuales">
                <option value="Kwid">Kwid</option>
                <option value="Kardian">Kardian</option>
                <option value="Duster">Duster</option>
                <option value="Stepway">Stepway</option>
                <option value="Oroch">Oroch</option>
                <option value="Koleos">Koleos</option>
                <option value="Master">Master</option>
                <option value="Kangoo">Kangoo</option>
                <option value="Megane E-Tech">Megane E-Tech</option>
            </optgroup>
            <optgroup label="Modelos Anteriores">
                <option value="Clio">Clio</option>
                <option value="Sandero">Sandero</option>
                <option value="Logan">Logan</option>
                <option value="Captur">Captur</option>
                <option value="Fluence">Fluence</option>
                <option value="Safrane">Safrane</option>
                <option value="Scala">Scala</option>
                <option value="Megane">Megane (Gasolina)</option>
                <option value="Scenic">Scenic</option>
            </optgroup>
        </select>
        <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
    </div>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA!</h1>
            <div id="vehicle-inicio-container">
                <img id="main-car" src="" class="car-hero" onerror="this.src='https://raw.githubusercontent.com/Renato-Tez/Assets/main/renault-placeholder.png'">
            </div>
            <div id="tag-car" style="font-weight: 800; font-size: 1.3rem;">Tu Renault</div>
        </div>
        <div id="reminder-container"></div>
        <button class="btn-action btn-green" onclick="showPage('nuevos')">VER CATÁLOGO</button>
    </div>

    <div id="p-citas" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">GESTIÓN DE SERVICIO</div>
        <div id="appointment-content"></div>
    </div>

    <div id="p-nuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">UNIDADES NUEVAS</div>
        <p style="text-align: center; font-size: 0.8rem; color: #888;">Toca la imagen para ver detalles técnicos</p>
        <div id="cat-container">Cargando catálogo...</div>
    </div>

    <div id="p-seminuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">INVENTARIO SEMINUEVOS</div>
        <div id="semi-container">Cargando inventario...</div>
    </div>

    <div id="modal-desc" class="modal">
        <div class="modal-content">
            <button onclick="closeDesc()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem; z-index:10;">✕</button>
            <img id="desc-img" src="" style="width:100%; border-radius:20px; margin-bottom:15px;">
            <div id="desc-title" class="desc-title">MODELO</div>
            
            <div class="tab-container">
                <button id="btn-tab-info" class="tab-btn active" onclick="switchTab('info')">Info</button>
                <button id="btn-tab-seguridad" class="tab-btn" onclick="switchTab('seguridad')">Seguridad</button>
                <button id="btn-tab-tecnologia" class="tab-btn" onclick="switchTab('tecnologia')">Tecnología</button>
            </div>

            <div id="desc-text" class="desc-text">Selecciona una pestaña</div>
            <div id="desc-tags" style="margin-bottom:20px;"></div>
            
            <button class="btn-action btn-yellow" id="btn-desc-quote" onclick="">COTIZAR AHORA</button>
        </div>
    </div>

    <div id="modal-quote" class="modal">
        <div class="modal-content">
            <h3 id="m-title" style="color:#d4af37; margin-top:0;">COTIZAR</h3>
            <label class="form-label">Nombre del Cliente</label>
            <input type="text" id="q-name" class="form-control">
            <label class="form-label">Teléfono</label>
            <input type="tel" id="q-phone" class="form-control">
            <label class="form-label">Código Postal</label>
            <input type="number" id="q-cp" class="form-control" placeholder="Ej: 73800">
            <label class="form-label">Método de Pago</label>
            <select id="q-metodo" class="form-control" onchange="toggleFinanzas()">
                <option value="Contado">A Contado</option>
                <option value="Financiado">Financiado</option>
            </select>
            <div id="campo-finanzas" style="display:none;">
                <label class="form-label">Enganche ($)</label>
                <input type="number" id="q-down" class="form-control">
                <label class="form-label">Plazo (Meses)</label>
                <select id="q-meses" class="form-control">
                    <option value="12">12 Meses</option><option value="24">24 Meses</option><option value="36">36 Meses</option><option value="48">48 Meses</option><option value="60">60 Meses</option>
                </select>
            </div>
            <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()" style="margin-top:15px;">SOLICITAR</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#999; margin-top:15px; font-weight:bold;">Cerrar</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
        <button class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
        <button class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
        <button class="nav-item" onclick="showPage('seminuevos', this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Seminuevos</button>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtsJSdVpy7L_XdwFdxoq99-FPyRN0SUljawFS3gARNkT_9jQgywIx5agL6k_mS4Zc/exec";
        
        let currentVehicleSelected = "";

        const DESC_DATA = {
            "boreal": {
                info: "La nueva Boreal Iconic Hybrid 2026 introduce la avanzada tecnología E-Tech de Renault. Ahorro de combustible de hasta un 40% en ciudad.",
                seguridad: "Máxima protección con 6 bolsas de aire y frenado autónomo de emergencia (AEB).",
                tecnologia: "Tablero digital de 10'', pantalla vertical y múltiples modos de conducción.",
                tags: ["Híbrido E-Tech", "Tablero 10''", "Ahorro 40%"]
            },
            "kardian": {
                info: "Renault Kardian redefine el segmento con su nuevo motor turbo de 1.0L que entrega 115hp.",
                seguridad: "Cuenta con 6 bolsas de aire de serie y Frenado Autónomo de Emergencia.",
                tecnologia: "Pantalla táctil de 8'' compatible con Android Auto y Apple CarPlay inalámbrico.",
                tags: ["Turbo 115hp", "6 Airbags", "Pantalla 8'' Wireless"]
            },
            "kwid": {
                info: "El SUV de los compactos. Altura al piso líder en su clase (18.5 cm) y gran ahorro.",
                seguridad: "4 bolsas de aire, frenos ABS y asistente de arranque en pendientes (HSA).",
                tecnologia: "Media Evolution de 7'' y cámara de reversa integrada.",
                tags: ["Consumo 22km/L", "Altura SUV", "Dirección Eléctrica"]
            },
            "duster": {
                info: "Motor Turbo 1.3L de 154hp. Desempeño excepcional y gran espacio interior.",
                seguridad: "Estructura reforzada y cámara 360° (Multiview).",
                tecnologia: "Llave inteligente tipo tarjeta y encendido por botón.",
                tags: ["Motor Turbo 154hp", "Cajuela 475L", "Cámara 360°"]
            }
        };

        window.onload = () => {
            const user = localStorage.getItem('renault_user');
            if(user) {
                renderUser(JSON.parse(user));
                document.getElementById('login-screen').style.display = 'none';
                initAppData();
            }
        };

        function saveData() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const unit = document.getElementById('user-unit').value;
            if(!name || !phone) return alert("Por favor completa tus datos");
            const userData = { name, phone, unit };
            localStorage.setItem('renault_user', JSON.stringify(userData));
            renderUser(userData);
            document.getElementById('login-screen').style.display = 'none';
            initAppData();
        }

        function initAppData() { loadCat(); loadSemi(); updateAppointmentUI(); }

        function renderUser(d) {
            document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
            document.getElementById('main-car').src = `https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/${d.unit.toLowerCase().replace(' ', '-')}.jpeg`;
            document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
            document.getElementById('q-name').value = d.name;
            document.getElementById('q-phone').value = d.phone;
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
            window.scrollTo(0,0);
            if(id === 'citas') renderAppointmentPage();
        }

        function openDesc(modelo, img) {
            currentVehicleSelected = modelo;
            document.getElementById('desc-img').src = img;
            document.getElementById('desc-title').innerText = modelo;
            switchTab('info');
            document.getElementById('btn-desc-quote').onclick = () => { closeDesc(); openM(modelo); };
            document.getElementById('modal-desc').style.display = 'flex';
        }

        function switchTab(tabType) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-tab-' + tabType).classList.add('active');
            const slug = currentVehicleSelected.toLowerCase();
            // Lógica mejorada para encontrar el modelo en DESC_DATA
            const key = Object.keys(DESC_DATA).find(k => slug.includes(k));
            
            let info = DESC_DATA[key] || {
                info: `Unidad ${currentVehicleSelected} con calidad Renault garantizada.`,
                seguridad: "Sistemas de seguridad activos y pasivos.",
                tecnologia: "Conectividad multimedia avanzada.",
                tags: ["Renault", "Calidad"]
            };
            document.getElementById('desc-text').innerText = info[tabType];
            document.getElementById('desc-tags').innerHTML = tabType === 'info' ? 
                (info.tags || []).map(t => `<span class="feature-tag">${t}</span>`).join('') : "";
        }

        function closeDesc() { document.getElementById('modal-desc').style.display = 'none'; }

        async function loadCat() {
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=nuevos`);
                const data = await res.json();
                document.getElementById('cat-container').innerHTML = data.map(c => `
                    <div class="car-card">
                        <img src="${c.imagen}" onclick="openDesc('${c.modelo}', '${c.imagen}')" onerror="this.src='https://raw.githubusercontent.com/Renato-Tez/Assets/main/renault-placeholder.png'">
                        <h3 style="margin:15px 0 5px">${c.modelo}</h3>
                        <div style="color:#d4af37; font-weight:bold; margin-bottom:15px;">${c.precio}</div>
                        <button class="btn-action btn-yellow" onclick="openM('${c.modelo}')">COTIZAR</button>
                    </div>`).join('');
            } catch(e) { document.getElementById('cat-container').innerText = "Error al cargar catálogo."; }
        }

        async function loadSemi() {
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=seminuevos`);
                const data = await res.json();
                document.getElementById('semi-container').innerHTML = data.map(s => `
                    <div class="car-card">
                        <h3 style="margin:5px 0; color:var(--renault-yellow)">${s.modelo || s.Versión}</h3>
                        <p style="margin:0; font-size:0.8rem; color:#888;">${s.km || 0} KM</p>
                        <div style="color:#d4af37; font-weight:bold; margin:10px 0;">${s.precio}</div>
                        <button class="btn-action btn-yellow" onclick="openM('${s.modelo || s.Versión}')">ME INTERESA</button>
                    </div>`).join('');
            } catch(e) { document.getElementById('semi-container').innerText = "Error al cargar inventario."; }
        }

        function renderAppointmentPage() {
            const data = localStorage.getItem('renault_appointment');
            const container = document.getElementById('appointment-content');
            const user = JSON.parse(localStorage.getItem('renault_user') || '{}');
            
            if(data) {
                const app = JSON.parse(data);
                container.innerHTML = `<div class="card-white" style="text-align:center;">
                    <div style="font-size: 3.5rem;">📅</div><h3>CITA AGENDADA</h3>
                    <div style="background:#f7f7f7; padding:20px; border-radius:20px; text-align:left;">
                        <strong>Unidad:</strong> ${app.unidad}<br><strong>Fecha:</strong> ${app.fecha}<br><strong>Hora:</strong> ${app.hora} hrs
                    </div>
                    <button class="btn-action btn-yellow" style="margin-top:20px;" onclick="window.open('https://wa.me/522311234567?text=Confirmo mi cita')">WHATSAPP</button>
                    <button class="btn-cancel-modern" onclick="localStorage.removeItem('renault_appointment'); renderAppointmentPage();">Cancelar Cita</button>
                </div>`;
            } else {
                container.innerHTML = `<div class="card-white">
                    <label class="form-label">Nombre</label><input type="text" id="c-name" class="form-control" value="${user.name || ''}">
                    <label class="form-label">Teléfono</label><input type="tel" id="c-phone" class="form-control" value="${user.phone || ''}">
                    <label class="form-label">Unidad</label><input type="text" id="c-unit" class="form-control" value="${user.unit || ''}">
                    <label class="form-label">Kilometraje</label><input type="number" id="c-km" class="form-control" placeholder="Kilometraje actual">
                    <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
                    <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
                    <label class="form-label">Detalles de la Unidad</label>
                    <textarea id="c-details" class="form-control" placeholder="Describe aquí si tu unidad tiene algún detalle o falla..." style="height:80px;"></textarea>
                    <button id="btn-cita" class="btn-action btn-yellow" onclick="handleBooking()">AGENDAR CITA</button>
                </div>`;
            }
        }

        async function handleBooking() {
            const btn = document.getElementById('btn-cita');
            const app = {
                hoja: "citas",
                nombre: document.getElementById('c-name').value,
                telefono: document.getElementById('c-phone').value,
                unidad: document.getElementById('c-unit').value,
                kilometraje: document.getElementById('c-km').value,
                fecha: document.getElementById('c-date').value,
                hora: document.getElementById('c-time').value,
                detalles: document.getElementById('c-details').value
            };
            if(!app.fecha || !app.hora) return alert("Selecciona fecha y hora");
            btn.innerText = "PROCESANDO..."; btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(app)
                });
                localStorage.setItem('renault_appointment', JSON.stringify(app));
                alert("¡Cita agendada!");
                updateAppointmentUI();
                showPage('inicio');
            } catch(e) { alert("Error de conexión."); }
            finally { btn.innerText = "AGENDAR CITA"; btn.disabled = false; }
        }

        function openM(t) { document.getElementById('m-title').innerText = t; document.getElementById('modal-quote').style.display = 'flex'; }
        function closeM() { document.getElementById('modal-quote').style.display = 'none'; }
        function toggleFinanzas() { document.getElementById('campo-finanzas').style.display = document.getElementById('q-metodo').value === 'Financiado' ? 'block' : 'none'; }

        async function handleQuote() {
            const btn = document.getElementById('btn-quote');
            const quote = {
                hoja: "cotizaciones",
                nombre: document.getElementById('q-name').value,
                telefono: document.getElementById('q-phone').value,
                modelo: document.getElementById('m-title').innerText,
                cp: document.getElementById('q-cp').value,
                metodo_pago: document.getElementById('q-metodo').value,
                enganche: document.getElementById('q-down').value || "0",
                meses: document.getElementById('q-meses').value || "0"
            };
            btn.innerText = "ENVIANDO..."; btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(quote)
                });
                alert("Solicitud enviada.");
                closeM();
            } catch(e) { alert("Error al enviar."); }
            finally { btn.innerText = "SOLICITAR"; btn.disabled = false; }
        }

        function updateAppointmentUI() {
            const data = localStorage.getItem('renault_appointment');
            const container = document.getElementById('reminder-container');
            if(data) {
                const app = JSON.parse(data);
                container.innerHTML = `<div id="appointment-reminder">
                    <div style="color:#d4af37; font-weight:900; font-size:0.8rem;">PRÓXIMA CITA</div>
                    <div style="font-size:1.2rem; font-weight:bold;">${app.fecha} | ${app.hora} hrs</div>
                </div>`;
            } else container.innerHTML = '';
        }
    </script>
</body>
</html>
