<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán</title>
    <style>
        :root { --accent: #FFCC00; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --muted: #a1a1a6; --green: #4CAF50; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 120px; overflow-x: hidden; }
        
        header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilo de la Tarjeta de Inicio igual a tu imagen */
        .hero-card { 
            background: linear-gradient(180deg, #FFD700 0%, #b89400 100%); 
            border-radius: 30px; 
            padding: 30px 20px; 
            text-align: center; 
            color: #000; 
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        
        .car-avatar { width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; margin: 15px 0; }
        .car-3d { 
            width: 280px; 
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.3)); 
            animation: float 3s ease-in-out infinite; 
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Botón COTIZACIÓN idéntico a la imagen */
        .btn-cotizacion { 
            background: #5cb85c; 
            color: white; 
            font-size: 1.8rem; 
            font-weight: 900; 
            padding: 20px; 
            border-radius: 20px; 
            border: none; 
            width: 100%; 
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-asesor { 
            background: transparent; 
            color: #5cb85c; 
            border: 2px solid #5cb85c; 
            padding: 15px; 
            border-radius: 20px; 
            width: 100%; 
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Formulario de Citas */
        .card-form { background: #fff; color: #000; border-radius: 20px; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; 
            background: #f9f9f9; font-size: 1rem; box-sizing: border-box;
        }

        /* Barra de navegación igual a tu imagen */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 100px; 
            background: rgba(28, 28, 30, 0.98); border-top: 1px solid #333; 
            display: flex; justify-content: space-around; align-items: center; 
            padding-bottom: 20px; z-index: 2000;
        }
        .nav-item { text-align: center; color: #8e8e93; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; }
        .nav-item span { font-size: 2rem; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--accent); }

        /* Registro */
        #pantalla-registro { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 5000; display: flex; flex-direction: column; 
            justify-content: center; padding: 30px; box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <div id="pantalla-registro">
        <div class="logo" style="margin-bottom: 30px; text-align: center;">RENAULT | <span>TEZIUTLÁN</span></div>
        <input type="text" id="reg-nombre" placeholder="Tu nombre" style="margin-bottom:15px; background:#1c1c1e; border:none; color:#fff;">
        <select id="reg-modelo" style="margin-bottom:15px; background:#1c1c1e; border:none; color:#fff;">
            <option value="">Selecciona tu unidad</option>
            <option value="Kwid">Kwid</option>
            <option value="Duster">Duster</option>
            <option value="Kardian">Kardian</option>
            <option value="Oroch">Oroch</option>
        </select>
        <input type="text" id="reg-placa" placeholder="Placas" style="margin-bottom:15px; background:#1c1c1e; border:none; color:#fff;">
        <button onclick="registrar()" style="background:var(--accent); padding:15px; border-radius:15px; font-weight:bold; border:none;">ENTRAR</button>
    </div>

    <header><div class="logo">RENAULT | <span>TEZIUTLÁN</span></div></header>

    <div id="inicio" class="page active">
        <div class="hero-card">
            <h1 id="usr-name" style="margin:0; font-size: 2rem;">¡Hola!</h1>
            <div class="car-avatar" id="car-img"></div>
            <p id="usr-car" style="font-size: 1.1rem; font-weight: 700;"></p>
        </div>
        <button class="btn-cotizacion" onclick="nav('catalogo', 1)">COTIZACIÓN</button>
        <button class="btn-asesor" onclick="window.location.href='tel:2311234567'">📞 LLAMAR ASESOR</button>
    </div>

    <div id="catalogo" class="page">
        <h2>Nuevos</h2>
        <div id="items-nuevos"></div>
    </div>

    <div id="citas" class="page">
        <div class="card-form">
            <h2 style="color:#000; margin-top:0;">Agendar Servicio</h2>
            <div class="form-group"><label>Nombre</label><input type="text" id="f-nom"></div>
            <div class="form-group"><label>Teléfono</label><input type="tel" id="f-tel"></div>
            <div class="form-group"><label>Unidad</label><input type="text" id="f-uni"></div>
            <div class="form-group"><label>Placa</label><input type="text" id="f-pla"></div>
            <div class="form-group"><label>Kilometraje</label><input type="number" id="f-km"></div>
            <div class="form-group"><label>Fecha</label><input type="date" id="f-fec"></div>
            <div class="form-group"><label>Hora</label><input type="time" id="f-hor"></div>
            <button onclick="alert('Cita enviada')" style="background:#000; color:#fff; width:100%; padding:15px; border-radius:10px; border:none; font-weight:bold;">ENVIAR SOLICITUD</button>
        </div>
    </div>

    <div id="seminuevos" class="page">
        <h2>Seminuevos</h2>
        <p>Próximamente inventario disponible...</p>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('inicio', 0)"><span>🏠</span>INICIO</div>
        <div class="nav-item" onclick="nav('catalogo', 1)"><span>🚗</span>NUEVOS</div>
        <div class="nav-item" onclick="nav('citas', 2)"><span>🔧</span>CITAS</div>
        <div class="nav-item" onclick="nav('seminuevos', 3)"><span>🔑</span>SEMINUEVOS</div>
    </nav>

    <script>
        const imgs = {
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Oroch": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/oroch-hjd-ph2/oroch-card.png"
        };

        function registrar() {
            const n = document.getElementById('reg-nombre').value;
            const m = document.getElementById('reg-modelo').value;
            const p = document.getElementById('reg-placa').value;
            if(!n || !m) return alert("Llena los campos");
            
            localStorage.setItem('nom', n);
            localStorage.setItem('mod', m);
            localStorage.setItem('pla', p);
            location.reload();
        }

        window.onload = () => {
            const n = localStorage.getItem('nom');
            if(n) {
                document.getElementById('pantalla-registro').style.display = 'none';
                document.getElementById('usr-name').innerText = "¡Hola, " + n + "!";
                const mod = localStorage.getItem('mod');
                document.getElementById('usr-car').innerText = "Tu " + mod + " | " + localStorage.getItem('pla');
                document.getElementById('car-img').innerHTML = `<img src="${imgs[mod] || imgs['Duster']}" class="car-3d">`;
                
                // Prellenar citas
                document.getElementById('f-nom').value = n;
                document.getElementById('f-uni').value = mod;
                document.getElementById('f-pla').value = localStorage.getItem('pla');
            }
        }

        function nav(p, i) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-item')[i].classList.add('active');
        }
    </script>
</body>
</html>
