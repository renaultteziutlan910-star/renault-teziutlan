<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dental K</title>
<style>
  :root{
    --purple-dark:#4b3267;
    --purple-mid:#7d63a8;
    --purple-light:#cdbde8;
    --purple-bg:#e9e0f7;
    --purple-bg2:#d9cdf0;
    --green:#25D366;
    --text-dark:#2d2436;
    --white:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:#ddd;
    display:flex;
    justify-content:center;
    min-height:100vh;
    margin: 0;
  }
  .app{
    width:100%;
    max-width:420px;
    height: 100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg,var(--purple-bg) 0%, var(--purple-bg2) 100%);
  }
  /* Contenedor de pantallas con scroll y ajuste fluido */
  .screens-container {
    flex: 1;
    overflow-y: auto;
    width: 100%;
  }
  .screen{
    display:none;
    flex-direction:column;
    padding:20px 18px 20px 18px;
    animation:fade .25s ease;
  }
  .screen.active{display:flex;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* Header / logo - Ajuste responsivo */
  .logo-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:18px;
    width: 100%;
  }
  .logo-icon{
    width:18%; /* Ajuste relativo */
    max-width:60px;
    height: auto;
    color:var(--purple-mid);
  }
  .logo-name{
    font-size: clamp(18px, 5vw, 22px);
    font-weight:800;
    color:var(--purple-dark);
    letter-spacing:1px;
    margin-top:4px;
  }
  .logo-sub{
    font-size:10px;
    color:var(--purple-mid);
    letter-spacing:1px;
  }

  /* --- El resto del estilo se mantiene igual --- */
  h2.title{ font-size:20px; font-weight:800; color:var(--text-dark); margin-bottom:14px; }
  .card{ background:var(--white); border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 4px 12px rgba(0,0,0,.06); }
  .welcome-card{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .welcome-text{ font-size:18px; font-weight:700; color:var(--text-dark); line-height:1.3; }
  .avatar{ width:70px; height:70px; border-radius:50%; background:#f5c453; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
  .avatar svg{width:100%; height:100%;}
  .appt-card h3{ font-size:15px; font-weight:700; color:var(--text-dark); margin-bottom:6px; }
  .appt-card .appt-service{ font-weight:700; margin-bottom:8px; }
  .appt-card p{ font-size:14px; color:#555; margin-bottom:2px; }
  .btn{ width:100%; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; transition:opacity .15s; }
  .btn:active{opacity:.8;}
  .btn-primary{ background:var(--purple-dark); color:var(--white); }
  .btn-outline{ background:var(--white); color:var(--text-dark); border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:6px; }
  .promo-title{ font-size:15px; font-weight:700; color:var(--text-dark); margin-bottom:12px; }
  .promo-row{ display:flex; justify-content:space-between; gap:10px; }
  .promo-item{ display:flex; flex-direction:column; align-items:center; flex:1; text-align:center; cursor:pointer; }
  .promo-circle{ width:55px; height:55px; border-radius:50%; background:var(--purple-bg2); display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
  .promo-circle svg{width:26px; height:26px; color:var(--purple-dark);}
  .promo-item span{ font-size:11px; color:var(--text-dark); font-weight:600; }
  .treatments-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .treat-card{ background:var(--white); border-radius:14px; padding:14px 12px; text-align:center; display:flex; flex-direction:column; align-items:center; }
  .treat-card svg{ width:50px; height:50px; color:var(--purple-dark); margin-bottom:8px; }
  .treat-card h4{ font-size:14px; font-weight:700; color:var(--text-dark); margin-bottom:4px; }
  .treat-card p{ font-size:10.5px; color:#888; margin-bottom:10px; line-height:1.3; }
  .treat-card .quote-btn{ font-size:11px; font-weight:700; color:var(--purple-dark); background:none; border:none; cursor:pointer; text-decoration:underline; }
  .promo-card{ border:2px dashed var(--purple-mid); background:var(--purple-bg2); justify-content:center; }
  .promo-card svg{color:var(--purple-dark);}
  .doctor-card{ background:var(--white); border-radius:16px; overflow:hidden; margin-bottom:16px; box-shadow:0 4px 12px rgba(0,0,0,.06); }
  .doctor-img{ width:100%; height:140px; background:linear-gradient(135deg,#cdbde8,#a98fd2); display:flex; align-items:center; justify-content:center; }
  .doctor-img svg{width:90px; height:90px; color:var(--white); opacity:.85;}
  .doctor-info{padding:14px 16px;}
  .doctor-info h3{font-size:17px; font-weight:800; color:var(--text-dark);}
  .doctor-info .sub{font-size:13px; color:#888; margin-bottom:10px;}
  .info-row{ display:flex; justify-content:space-between; font-size:13px; color:#555; padding:6px 0; border-bottom:1px solid #f0f0f0; }
  .info-row span:last-child{font-weight:700; color:var(--text-dark);}
  .doctor-info .btn{margin-top:12px;}
  .history-card h4{ font-size:15px; font-weight:700; color:var(--text-dark); margin-bottom:10px; }
  .history-item{ display:flex; align-items:flex-start; gap:10px; padding-bottom:12px; position:relative; }
  .history-item:not(:last-child)::before{ content:''; position:absolute; left:5px; top:16px; bottom:0; width:1px; background:#ddd; }
  .dot{ width:11px; height:11px; border-radius:50%; background:var(--purple-mid); margin-top:4px; flex-shrink:0; }
  .history-text{font-size:13px; color:var(--text-dark);}
  .history-date{font-size:11px; color:#999; display:block;}
  .completed{color:#2e9e5b; font-weight:700;}
  .profile-header{ display:flex; flex-direction:column; align-items:center; margin-bottom:18px; }
  .profile-avatar{ width:80px; height:80px; border-radius:50%; background:#7d63a8; display:flex; align-items:center; justify-content:center; margin-bottom:10px; overflow:hidden; }
  .profile-avatar svg{width:100%; height:100%;}
  .profile-header h3{font-size:17px; font-weight:800; color:var(--text-dark);}
  .profile-header p{font-size:12px; color:#777;}
  .profile-list{ background:var(--white); border-radius:16px; overflow:hidden; margin-bottom:16px; box-shadow:0 4px 12px rgba(0,0,0,.06); }
  .profile-item{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #f0f0f0; cursor:pointer; font-size:14px; font-weight:600; color:var(--text-dark); }
  .profile-item:last-child{border-bottom:none;}
  .profile-item .left{display:flex; align-items:center; gap:10px;}
  .profile-item svg{width:20px; height:20px; color:var(--purple-mid);}
  .profile-item .edit-icon{width:16px; height:16px; color:#aaa;}
  .info-text{ text-align:center; font-size:13px; color:#777; line-height:1.5; margin-bottom:18px; }
  .bottom-nav{ background:var(--purple-bg2); display:flex; justify-content:space-around; padding:10px 0 6px 0; box-shadow:0 -2px 10px rgba(0,0,0,.05); flex-shrink:0; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:3px; color:#9c8cc0; background:none; border:none; cursor:pointer; font-size:10px; font-weight:600; padding:4px 10px; }
  .nav-item svg{width:22px; height:22px;}
  .nav-item.active{ color:var(--purple-dark); border-bottom:2px solid var(--purple-dark); }
  .whatsapp-btn{ position:fixed; bottom:80px; right:24px; width:50px; height:50px; background:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,.2); text-decoration:none; z-index:50; }
  .whatsapp-btn svg{width:28px; height:28px; fill:#fff;}
  @media (max-width:380px){ .welcome-text{font-size:16px;} }
</style>
</head>
<body>
<div class="app">
  <div class="screens-container">
    <div class="screen active" id="inicio">
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 8C24 8 16 12 16 22c0 8 3 14 5 20 1.5 4 3 10 6 10s3-6 5-12 2-8 5-8 3 2 5 8 2 12 5 12 4.5-6 6-10c2-6 5-12 5-20C53 12 40 8 32 8z" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <div class="logo-name">DENTAL K</div>
        <div class="logo-sub">Dra. Ana Karen Valeria </div>
      </div>
      <div class="card welcome-card">
        <div class="welcome-text">¡Bienvenida,<br>Nombre del<br>Paciente!</div>
        <div class="avatar">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="50" fill="#f5c453"/>
            <circle cx="50" cy="45" r="18" fill="#8d5524"/>
            <path d="M20 95 Q50 60 80 95 Z" fill="#4a90d9"/>
            <path d="M30 35 Q50 15 70 35 Q70 50 50 55 Q30 50 30 35 Z" fill="#5b3a29"/>
          </svg>
        </div>
      </div>
      <div class="card appt-card">
        <h3>Tu próxima cita:</h3>
        <div class="appt-service">Limpieza Profunda</div>
        <p>Fecha: <strong>15 de Junio, 2026</strong></p>
        <p>Hora: <strong>16:00 HRS</strong></p>
        <button class="btn btn-primary" onclick="confirmAttendance(this)">Confirmar Asistencia</button>
        <button class="btn btn-outline" onclick="alert('Dirección: Av. Principal 123, Col. Centro.\nEstacionamiento disponible.\nLlegar 10 min antes.')">
          📍 Indicaciones de Llegada
        </button>
      </div>
      <div class="card">
        <div class="promo-title">Promociones y Noticias</div>
        <div class="promo-row">
          <div class="promo-item" onclick="alert('Oferta del mes: 20% de descuento en blanqueamiento dental.')">
            <div class="promo-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg></div>
            <span>Oferta en Blanqueamiento</span>
          </div>
          <div class="promo-item" onclick="alert('Consejo: cepilla tus dientes al menos 2 veces al día.')">
            <div class="promo-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 L4 7v6c0 5 4 8 8 9 4-1 8-4 8-9V7z"/></svg></div>
            <span>Consejo Salud Bucal</span>
          </div>
          <div class="promo-item" onclick="alert('¡Ya estamos de vuelta!')">
            <div class="promo-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="9" width="18" height="11" rx="2"/><path d="M9 9V5a3 3 0 0 1 6 0v4"/></svg></div>
            <span>Reabrimos de Apertura</span>
          </div>
        </div>
      </div>
    </div>
    <div class="screen" id="servicios">
      <h2 class="title">Nuestros Tratamientos</h2>
      <div class="treatments-grid">
        <div class="treat-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 2 5 5 5 9c0 3 1 6 2 9 .6 1.8 1.3 4 2.5 4s1.5-2.5 2.5-5 1-3 2-3 1 1.5 2 4 1.5 4 2.5 4 1.9-2.2 2.5-4c1-3 2-6 2-9 0-4-3-7-7-7z"/></svg>
          <h4>Resinas</h4>
          <button class="quote-btn" onclick="openWhatsApp('Resinas')">Cotizar/Agendar</button>
        </div>
        </div>
    </div>
    <div class="screen" id="citas"><h2>Citas</h2></div>
    <div class="screen" id="perfil"><h2>Perfil</h2></div>
  </div>
  
  <div class="bottom-nav">
    <button class="nav-item active" onclick="showScreen('inicio', this)"><span>INICIO</span></button>
    <button class="nav-item" onclick="showScreen('servicios', this)"><span>SERVICIOS</span></button>
    <button class="nav-item" onclick="showScreen('citas', this)"><span>CITAS</span></button>
    <button class="nav-item" onclick="showScreen('perfil', this)"><span>PERFIL</span></button>
  </div>
</div>

<script>
  function showScreen(id, btn){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    btn.classList.add('active');
  }
  function confirmAttendance(btn){
    btn.textContent = '✓ Asistencia Confirmada';
    btn.style.background = '#2e9e5b';
    btn.disabled = true;
  }
  function openWhatsApp(servicio){
    const numero = '5210000000000';
    const mensaje = encodeURIComponent('Hola, me gustaría información sobre: ' + servicio);
    window.open('https://wa.me/' + numero + '?text=' + mensaje, '_blank');
  }
</script>
</body>
</html>
