<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #dc3545;
            --dark-bg: #000000;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 35px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; }
        .active { display: block !important; }

        /* --- TARJETAS --- */
        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
        }
        
        /* Estilo para el Recordatorio de Cita */
        .appointment-reminder {
            background: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); }

        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-cancel { background: none; border: 1px solid var(--danger-red); color: var(--danger-red); margin-top: 10px; font-size: 0.8rem; padding: 10px; }

        /* --- NAVBAR --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
        <select id="user-unit" class="login-input">
            <option value="Duster">Duster</option>
            <option value="Kwid">Kwid</option>
            <option value="Kardian">Kardian</option>
            <option value="Stepway">Stepway</option>
        </select>
        <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
    </div>

    <header><div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div></header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA!</h1>
            <img id="main-car" src="" class="car-hero">
            <div id="tag-car" style="font-weight: 800; font-size: 1.3rem;">Tu Renault</div>
        </div>

        <div id="appointment-container"></div>
    </div>

    <div id="p-citas" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">AGENDAR SERVICIO</div>
        <div class="card-white">
            <label class="form-label">Nombre</label><input type="text" id="c-name" class="form-control">
            <label class="form-label">Teléfono</label><input type="tel" id="c-phone" class="form-control">
            <label class="form-label">VIN</label><input type="text" id="c-vin" class="form-control">
            <label class="form-label">Kilometraje</label><input type="number" id="c-km" class="form-control">
            <label class="form-label">Falla o Servicio</label><textarea id="c-obs" class="form-control" rows="2"></textarea>
            <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
            <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
            <button class="btn-action btn-yellow" style="margin-top:15px;" onclick="bookAppointment()">AGENDAR CITA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</a>
    </nav>

    <script>
        const CARS = {
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Stepway": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/stepway-bja/stepway-card.png"
        };

        window.onload = () => {
            const user = localStorage.getItem('renault_user');
            if(user) {
                renderUser(JSON.parse(user));
                document.getElementById('login-screen').style.display = 'none';
                checkAppointment();
            }
        };

        function saveData() {
            const d = { name: document.getElementById('user-name').value, phone: document.getElementById('user-phone').value, unit: document.getElementById('user-unit').value };
            if(!d.name || !d.phone) return alert("Completa tus datos");
            localStorage.setItem('renault_user', JSON.stringify(d));
            renderUser(d);
            document.getElementById('login-screen').style.display = 'none';
        }

        function renderUser(d) {
            document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
            document.getElementById('main-car').src = CARS[d.unit];
            document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
            document.getElementById('c-name').value = d.name;
            document.getElementById('c-phone').value = d.phone;
        }

        // FUNCIÓN PARA AGENDAR Y GUARDAR RECORDATORIO
        function bookAppointment() {
            const appointment = {
                date: document.getElementById('c-date').value,
                time: document.getElementById('c-time').value,
                reason: document.getElementById('c-obs').value
            };

            if(!appointment.date || !appointment.time) return alert("Por favor selecciona fecha y hora");

            // Aquí se enviaría a Excel en el futuro
            localStorage.setItem('active_appointment', JSON.stringify(appointment));
            alert("¡Cita agendada con éxito!");
            checkAppointment();
            showPage('inicio');
        }

        // REVISAR SI HAY CITA PARA MOSTRAR RECORDATORIO
        function checkAppointment() {
            const app = localStorage.getItem('active_appointment');
            const container = document.getElementById('appointment-container');
            
            if(app) {
                const data = JSON.parse(app);
                container.innerHTML = `
                    <div class="appointment-reminder">
                        <div style="color:#d4af37; font-weight:bold; font-size:0.9rem; margin-bottom:5px;">PRÓXIMA CITA</div>
                        <div style="font-size:1.1rem; font-weight:bold;">${data.date} a las ${data.time} hrs</div>
                        <div style="color:#888; font-size:0.8rem; margin-top:5px;">Motivo: ${data.reason || 'Servicio General'}</div>
                        <button class="btn-action btn-cancel" onclick="cancelAppointment()">CANCELAR CITA</button>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        function cancelAppointment() {
            if(confirm("¿Estás seguro que deseas cancelar tu cita?")) {
                localStorage.removeItem('active_appointment');
                checkAppointment();
                alert("Cita cancelada.");
            }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
        }
    </script>
</body>
</html>
