<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 35px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
        }
        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); border-radius: 15px; }

        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        
        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }

        .btn-whatsapp-float {
            position: fixed; bottom: 100px; right: 20px;
            background: #25d366; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3000;
            text-decoration: none;
        }
        .btn-whatsapp-float svg { width: 30px; height: 30px; fill: currentColor; }

        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; cursor: pointer; transition: transform 0.2s; }
        .car-card img:active { transform: scale(0.98); }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 15px 0 30px 0;
            border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .desc-title { color: #d4af37; font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; text-transform: uppercase; }
        .desc-text { color: #444; line-height: 1.5; font-size: 0.95rem; margin-bottom: 20px; }
        .feature-tag { display: inline-block; background: #f0f0f0; padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; margin: 3px; color: #555; }
        
        .btn-cancel-modern { width:100%; background:none; border:none; color:#999; margin-top:15px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <a href="https://wa.me/522311234567?text=Hola,%20necesito%20asesoría%20personalizada." class="btn-whatsapp-float" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217s.231.001.332.005c.109.004.258-.041.404.308.159.386.542 1.32.588 1.412.046.091.076.197.015.317-.061.121-.092.197-.184.303-.092.106-.192.235-.274.316-.091.091-.186.189-.08.37.106.181.471.777.994 1.244.673.599 1.242.786 1.423.867.181.081.287.067.394-.055.106-.121.454-.528.575-.708.121-.181.242-.151.409-.091.166.061 1.057.498 1.239.588.181.091.302.136.346.212.046.075.046.439-.097.844z"/></svg>
    </a>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
        <label class="form-label" style="color:#888; text-align:left;">Selecciona tu Renault actual:</label>
        <select id="user-unit" class="login-input">
            <option value="Kwid">Kwid</option>
            <option value="Kardian">Kardian</option>
            <option value="Duster">Duster</option>
            <option value="Stepway">Stepway</option>
            <option value="Oroch">Oroch</option>
            <option value="Koleos">Koleos</option>
            <option value="Megane E-Tech">Megane E-Tech</option>
        </select>
        <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
    </div>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA!</h1>
            <div id="vehicle-inicio-container">
                <img id="main-car" src="" class="car-hero" onerror="this.src='https://raw.githubusercontent.com/Renato-Tez/Assets/main/renault-placeholder.png'">
            </div>
            <div id="tag-car" style="font-weight: 800; font-size: 1.3rem;">Tu Renault</div>
        </div>
        <div id="reminder-container"></div>
        <button class="btn-action btn-green" onclick="showPage('nuevos')">VER CATÁLOGO</button>
    </div>

    <div id="p-citas" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">GESTIÓN DE SERVICIO</div>
        <div id="appointment-content"></div>
    </div>

    <div id="p-nuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">UNIDADES NUEVAS</div>
        <p style="text-align: center; font-size: 0.8rem; color: #888;">Toca la imagen para ver detalles técnicos</p>
        <div id="cat-container">Cargando catálogo...</div>
    </div>

    <div id="p-seminuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">INVENTARIO SEMINUEVOS</div>
        <div id="semi-container">Cargando inventario...</div>
    </div>

    <div id="modal-desc" class="modal">
        <div class="modal-content">
            <button onclick="closeDesc()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem;">✕</button>
            <img id="desc-img" src="" style="width:100%; border-radius:20px; margin-bottom:15px;">
            <div id="desc-title" class="desc-title">MODELO</div>
            <div id="desc-text" class="desc-text">Cargando...</div>
            <div id="desc-tags"></div>
            <button class="btn-action btn-yellow" id="btn-desc-quote">COTIZAR AHORA</button>
        </div>
    </div>

    <div id="modal-quote" class="modal">
        <div class="modal-content">
            <h3 id="m-title" style="color:#d4af37; margin-top:0;">COTIZAR</h3>
            <label class="form-label">Nombre</label><input type="text" id="q-name" class="form-control">
            <label class="form-label">Teléfono</label><input type="tel" id="q-phone" class="form-control">
            <label class="form-label">Método de Pago</label>
            <select id="q-metodo" class="form-control" onchange="toggleFinanzas()">
                <option value="Contado">A Contado</option>
                <option value="Financiado">Financiado</option>
            </select>
            <div id="campo-finanzas" style="display:none;">
                <label class="form-label">Enganche ($)</label><input type="number" id="q-down" class="form-control">
            </div>
            <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()" style="margin-top:15px;">SOLICITAR</button>
            <button onclick="closeM()" class="btn-cancel-modern">Cerrar</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
        <button class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
        <button class="nav-item" onclick="showPage('citas', this)"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>Citas</button>
        <button class="nav-item" onclick="showPage('seminuevos', this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Seminuevos</button>
    </nav>

    <script>
        const API_BASE = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        
        // Corregido con %20 para los espacios
        const CARS = {
            "Kwid": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/kwid.jpeg",
            "Kardian": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/kardian.jpeg",
            "Duster": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/duster.jpeg",
            "Koleos": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/koleos.jpeg",
            "Oroch": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/oroch.jpeg",
            "Megane E-Tech": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/megane-tech.jpeg",
            "Stepway": "https://renaultteziutlan910-star.github.io/renault-teziutlan/renault%20app/img/stepway.jpeg"
        };

        window.onload = () => {
            const user = localStorage.getItem('renault_user');
            if(user) {
                renderUser(JSON.parse(user));
                document.getElementById('login-screen').style.display = 'none';
                initAppData();
            }
        };

        function saveData() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const unit = document.getElementById('user-unit').value;
            if(!name || !phone) return alert("Completa los datos");
            const userData = { name, phone, unit };
            localStorage.setItem('renault_user', JSON.stringify(userData));
            renderUser(userData);
            document.getElementById('login-screen').style.display = 'none';
            initAppData();
        }

        function renderUser(d) {
            document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
            document.getElementById('main-car').src = CARS[d.unit] || "";
            document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
            document.getElementById('q-name').value = d.name;
            document.getElementById('q-phone').value = d.phone;
        }

        function initAppData() { loadCat(); loadSemi(); updateAppointmentUI(); }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'citas') renderAppointmentPage();
        }

        async function loadCat() {
            try {
                const res = await fetch(`${API_BASE}?sheet=nuevos`);
                const data = await res.json();
                if(data.error) throw new Error();
                document.getElementById('cat-container').innerHTML = data.map(c => `
                    <div class="car-card">
                        <img src="${c.imagen}" onclick="openDesc('${c.modelo}', '${c.imagen}')">
                        <h3 style="margin:15px 0 5px">${c.modelo}</h3>
                        <div style="color:#d4af37; font-weight:bold;">${c.precio}</div>
                        <button class="btn-action btn-yellow" style="margin-top:10px" onclick="openM('${c.modelo}')">COTIZAR</button>
                    </div>`).join('');
            } catch(e) { document.getElementById('cat-container').innerHTML = "Error al conectar con el inventario."; }
        }

        async function loadSemi() {
            try {
                const res = await fetch(`${API_BASE}?sheet=seminuevos`);
                const data = await res.json();
                document.getElementById('semi-container').innerHTML = data.map(s => `
                    <div class="car-card">
                        <h3 style="color:var(--renault-yellow)">${s.modelo || s.Versión}</h3>
                        <p style="color:#888;">${s.Precio}</p>
                        <button class="btn-action btn-yellow" onclick="openM('${s.modelo || s.Versión}')">ME INTERESA</button>
                    </div>`).join('');
            } catch(e) { document.getElementById('semi-container').innerHTML = "Sin conexión."; }
        }

        function openDesc(modelo, img) {
            document.getElementById('desc-img').src = img;
            document.getElementById('desc-title').innerText = modelo;
            document.getElementById('btn-desc-quote').onclick = () => { closeDesc(); openM(modelo); };
            document.getElementById('modal-desc').style.display = 'flex';
        }
        function closeDesc() { document.getElementById('modal-desc').style.display = 'none'; }
        function openM(t) { document.getElementById('m-title').innerText = t; document.getElementById('modal-quote').style.display = 'flex'; }
        function closeM() { document.getElementById('modal-quote').style.display = 'none'; }
        function toggleFinanzas() { document.getElementById('campo-finanzas').style.display = document.getElementById('q-metodo').value === 'Financiado' ? 'block' : 'none'; }

        function renderAppointmentPage() {
            const data = localStorage.getItem('renault_appointment');
            const container = document.getElementById('appointment-content');
            const user = JSON.parse(localStorage.getItem('renault_user') || '{}');
            if(data) {
                const app = JSON.parse(data);
                container.innerHTML = `<div class="card-white" style="text-align:center;"><h3>CITA ACTIVA</h3><p>${app.fecha} | ${app.hora}</p><button class="btn-action btn-yellow" onclick="window.open('https://wa.me/522311234567')">WHATSAPP</button></div>`;
            } else {
                container.innerHTML = `<div class="card-white">
                    <label class="form-label">Unidad</label><input type="text" id="c-unit" class="form-control" value="${user.unit}">
                    <label class="form-label">Fecha</label><input type="date" id="c-date" class="form-control">
                    <label class="form-label">Hora</label><input type="time" id="c-time" class="form-control">
                    <button class="btn-action btn-yellow" style="margin-top:15px;" onclick="handleBooking()">AGENDAR</button>
                </div>`;
            }
        }

        async function handleBooking() {
            const user = JSON.parse(localStorage.getItem('renault_user'));
            const app = { nombre: user.name, telefono: user.phone, unidad: document.getElementById('c-unit').value, fecha: document.getElementById('c-date').value, hora: document.getElementById('c-time').value };
            await fetch(`${API_BASE}?sheet=citas`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: [app]}) });
            localStorage.setItem('renault_appointment', JSON.stringify(app));
            updateAppointmentUI();
            showPage('inicio');
        }

        function updateAppointmentUI() {
            const data = localStorage.getItem('renault_appointment');
            if(data) {
                const app = JSON.parse(data);
                document.getElementById('reminder-container').innerHTML = `<div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:20px; margin-top:20px; border:1px solid #d4af37; text-align:center;">PRÓXIMA CITA: ${app.fecha}</div>`;
            }
        }

        async function handleQuote() {
            const quote = { nombre: document.getElementById('q-name').value, modelo: document.getElementById('m-title').innerText };
            await fetch(`${API_BASE}?sheet=cotizaciones`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: [quote]}) });
            alert("Enviado");
            closeM();
        }
    </script>
</body>
</html>
