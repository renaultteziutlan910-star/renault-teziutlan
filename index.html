<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renault Teziutlán Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(145deg, #f5d17a 0%, #d4af37 50%, #b8860b 100%);
            --renault-yellow: #FFCC00;
            --success-green: #28a745;
            --danger-red: #ff4444;
            --dark-bg: #000000;
            --white: #ffffff;
            --gray-text: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--dark-bg);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; padding: 35px; text-align: center;
        }

        header { padding: 20px 0; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--dark-bg); z-index: 2000; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; letter-spacing: 2px; }
        .v-line { width: 1px; height: 20px; background: #d4af37; }
        .gold-text { color: #d4af37; }

        .page { display: none; padding: 20px 20px 140px 20px; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-profile {
            background: var(--gold-gradient);
            border-radius: 35px; padding: 40px 20px;
            text-align: center; color: #000;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
        }
        .car-hero { width: 100%; max-width: 280px; margin: 20px 0; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); border-radius: 15px; }

        .card-white { background: var(--white); color: #000; border-radius: 30px; padding: 25px; margin-top: 10px; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 800; color: #666; margin: 12px 0 5px 5px; text-transform: uppercase; }
        
        .form-control, .login-input {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px;
            background: #f9f9f9; box-sizing: border-box; font-size: 1rem; margin-bottom: 8px; color: #000;
        }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: #fff; }

        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); opacity: 0.8; }
        .btn-yellow { background: var(--renault-yellow); color: #000; }
        .btn-green { background: var(--success-green); color: #fff; margin-top: 25px; }

        .car-card { background: #1a1a1a; border-radius: 25px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        .car-card img { width: 100%; border-radius: 20px; background: #222; min-height: 180px; object-fit: cover; }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #0d0d0d;
            display: flex; justify-content: space-around; padding: 10px 0 30px 0;
            border-top: 1px solid #222; z-index: 4000;
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; background: none; border: none; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; display: block; margin: 0 auto; }
        .nav-item.active { color: #d4af37; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; color: #000; position: relative; }
        
        .loading { text-align: center; color: var(--renault-yellow); padding: 20px; font-weight: bold; }
        .error-msg { text-align: center; color: var(--danger-red); padding: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area" style="margin-bottom: 30px;"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre completo">
        <input type="tel" id="user-phone" class="login-input" placeholder="Número de teléfono">
        <label class="form-label" style="color:#888; text-align:left;">Tu Renault actual:</label>
        <select id="user-unit" class="login-input">
            <option value="kwid">Kwid</option>
            <option value="kardian">Kardian</option>
            <option value="duster">Duster</option>
            <option value="stepway">Stepway</option>
            <option value="oroch">Oroch</option>
            <option value="koleos">Koleos</option>
            <option value="kangoo">Kangoo</option>
        </select>
        <button class="btn-action btn-yellow" onclick="saveData()">INGRESAR</button>
    </div>

    <header>
        <div class="logo-area"><span>RENAULT</span><div class="v-line"></div><span class="gold-text">TEZIUTLÁN</span></div>
    </header>

    <div id="p-inicio" class="page active">
        <div class="card-profile">
            <h1 id="greet">¡HOLA!</h1>
            <img id="main-car" src="" class="car-hero" onerror="this.src='https://via.placeholder.com/300x200?text=Renault'">
            <div id="tag-car" style="font-weight: 800; font-size: 1.3rem; text-transform: uppercase;">Tu Renault</div>
        </div>
        <div id="reminder-container"></div>
        <button class="btn-action btn-green" onclick="showPage('nuevos')">VER CATÁLOGO</button>
    </div>

    <div id="p-nuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">UNIDADES NUEVAS</div>
        <div id="cat-container"></div>
    </div>

    <div id="p-seminuevos" class="page">
        <div style="text-align: center; color: #d4af37; font-weight: 800; margin-bottom: 15px;">INVENTARIO SEMINUEVOS</div>
        <div id="semi-container"></div>
    </div>

    <div id="modal-quote" class="modal" onclick="if(event.target == this) closeM()">
        <div class="modal-content">
            <h3 id="m-title" style="color:#d4af37; margin-top:0;">COTIZAR</h3>
            <input type="text" id="q-name" class="form-control" placeholder="Nombre">
            <input type="tel" id="q-phone" class="form-control" placeholder="Teléfono">
            <button id="btn-quote" class="btn-action btn-yellow" onclick="handleQuote()" style="margin-top:15px;">SOLICITAR INFO</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; margin-top:10px; color:#666;">Cerrar</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('inicio', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</button>
        <button class="nav-item" onclick="showPage('nuevos', this)"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>Nuevos</button>
        <button class="nav-item" onclick="showPage('seminuevos', this)"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65z"/></svg>Semis</button>
    </nav>

    <script>
        const API_BASE = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";
        const IMG_PLACEHOLDER = "https://via.placeholder.com/400x250?text=Renault+Teziutlan";

        window.onload = () => {
            const user = localStorage.getItem('renault_user');
            if(user) {
                renderUser(JSON.parse(user));
                document.getElementById('login-screen').style.display = 'none';
                initAppData();
            }
        };

        function saveData() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const unit = document.getElementById('user-unit').value;
            if(!name || !phone) return alert("Por favor completa tus datos");
            
            const userData = { name, phone, unit };
            localStorage.setItem('renault_user', JSON.stringify(userData));
            renderUser(userData);
            document.getElementById('login-screen').style.display = 'none';
            initAppData();
        }

        function renderUser(d) {
            document.getElementById('greet').innerText = `¡HOLA, ${d.name.split(' ')[0].toUpperCase()}!`;
            // Ruta absoluta corregida para GitHub Pages
            document.getElementById('main-car').src = `img/${d.unit.toLowerCase()}.jpeg`;
            document.getElementById('tag-car').innerText = `Tu ${d.unit}`;
        }

        function initAppData() { 
            loadInventory('nuevos', 'cat-container'); 
            loadInventory('seminuevos', 'semi-container'); 
        }

        async function loadInventory(sheet, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '<p class="loading">Actualizando inventario...</p>';
            
            try {
                const res = await fetch(`${API_BASE}?sheet=${sheet}`);
                if(!res.ok) throw new Error("Error en servidor");
                const data = await res.json();
                
                container.innerHTML = '';
                if(data.length === 0) {
                    container.innerHTML = '<p class="error-msg">No hay unidades disponibles.</p>';
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    const imgUrl = item.imagen || item.Imagen || item.foto || IMG_PLACEHOLDER;
                    const nombre = item.modelo || item.Modelo || item.Versión || "Renault";
                    const precio = item.precio || item.Precio || "Consultar";

                    card.innerHTML = `
                        <img src="${imgUrl}" onerror="this.src='${IMG_PLACEHOLDER}'">
                        <div style="padding:10px">
                            <h3 style="margin:5px 0">${nombre}</h3>
                            <p style="color:#d4af37; font-weight:bold; font-size:1.2rem;">${precio}</p>
                            <button class="btn-action btn-yellow" style="padding:12px; font-size:0.9rem" onclick="openM('${nombre}')">ME INTERESA</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch(e) { 
                container.innerHTML = '<p class="error-msg">Error al cargar datos. Revisa tu conexión.</p>';
            }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            if(el) el.classList.add('active');
        }

        function openM(t) { 
            document.getElementById('m-title').innerText = t; 
            document.getElementById('modal-quote').style.display = 'flex'; 
        }
        
        function closeM() { 
            document.getElementById('modal-quote').style.display = 'none'; 
        }

        async function handleQuote() {
            const btn = document.getElementById('btn-quote');
            const user = JSON.parse(localStorage.getItem('renault_user'));
            const quote = {
                nombre: user.name,
                telefono: user.phone,
                modelo: document.getElementById('m-title').innerText,
                fecha: new Date().toLocaleString()
            };

            btn.innerText = "Enviando..."; btn.disabled = true;
            try {
                await fetch(`${API_BASE}?sheet=cotizaciones`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: [quote]})
                });
                alert("¡Solicitud enviada! Un asesor te contactará pronto.");
                closeM();
            } catch(e) { 
                alert("Error al enviar. Intenta de nuevo."); 
            } finally { 
                btn.disabled = false; btn.innerText = "SOLICITAR INFO"; 
            }
        }
    </script>
</body>
</html>
