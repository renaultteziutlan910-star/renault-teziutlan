<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renault Teziutlán - Digital Experience</title>
    <style>
        :root { --accent: #FFCC00; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --muted: #a1a1a6; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 110px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        
        /* Animación 3D Avatar */
        .car-avatar { width: 100%; height: 180px; display: flex; justify-content: center; align-items: center; margin: 10px 0; perspective: 1000px; }
        .car-3d { width: 220px; filter: drop-shadow(0 10px 20px rgba(255,204,0,0.3)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotateY(-10deg); } 50% { transform: translateY(-15px) rotateY(10deg); } }

        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #2c2c2e; position: relative; overflow: hidden; }
        .hero-card { background: linear-gradient(145deg, #FFCC00, #b89400); color: black; border: none; text-align: center; }
        
        h2 { font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 16px; margin: 10px 0; border: 1px solid #333; border-radius: 14px; background: #121212; color: white; font-size: 16px; box-sizing: border-box; }
        
        button { background: var(--accent); border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1rem; color: black; margin-top: 10px; transition: 0.3s; }
        button:active { transform: scale(0.95); }

        /* Barra de Navegación más grande */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; padding-bottom: 10px; }
        .nav-item { text-align: center; font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .nav-item span { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .nav-item.active-nav { color: var(--accent); transform: translateY(-5px); }
        
        .img-car { width: 100%; border-radius: 15px; margin-bottom: 15px; background: #000; min-height: 140px; object-fit: contain; }
        .price-tag { color: var(--accent); font-weight: bold; font-size: 1.2rem; display: block; margin: 5px 0 15px 0; }

        #pantalla-registro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; justify-content: center; padding: 40px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="pantalla-registro">
        <div class="logo" style="margin-bottom: 30px; text-align: center;">RENAULT | <span>TEZIUTLÁN</span></div>
        <input type="text" id="reg-nombre" placeholder="Tu nombre">
        <select id="reg-modelo-u">
            <option value="Duster">¿Qué Renault manejas?</option>
            <option value="Kwid">Kwid</option>
            <option value="Duster">Duster</option>
            <option value="Kardian">Kardian</option>
            <option value="Stepway">Stepway</option>
            <option value="Oroch">Oroch</option>
        </select>
        <button onclick="guardarUsuario()">CONFIGURAR MI EXPERIENCIA</button>
    </div>

    <header><div class="logo">RENAULT | <span>TEZIUTLÁN</span></div></header>

    <div id="inicio" class="page active">
        <div class="card hero-card">
            <h2 id="txt-bienvenida" style="color: black; margin: 0;">¡Hola!</h2>
            <div class="car-avatar" id="car-container">
                </div>
            <p id="txt-info-auto" style="font-weight: bold; font-size: 0.9rem; opacity: 0.8;">Tu Renault siempre listo</p>
        </div>
        <div class="card">
            <h3>Atención Inmediata</h3>
            <button onclick="window.location.href='tel:2311234567'" style="background: #25D366; color: white;">📞 LLAMAR A ASESOR</button>
        </div>
    </div>

    <div id="catalogo" class="page">
        <h2>Catálogo de Nuevos</h2>
        <div id="contenedor-catalogo">
            </div>
    </div>

    <div id="cotizar-form" class="page">
        <h2>Cotizar Unidad</h2>
        <div class="card">
            <h3 id="modelo-a-cotizar" style="color: var(--accent);">Modelo Seleccionado</h3>
            <input type="number" id="cot-enganche" placeholder="¿Cuánto darías de enganche?">
            <select id="cot-plazo">
                <option>Plazo: 12 meses</option><option>24 meses</option><option>36 meses</option><option>48 meses</option><option>60 meses</option><option>72 meses</option>
            </select>
            <textarea id="cot-notas" placeholder="Dudas sobre el plan de financiamiento..."></textarea>
            <button onclick="enviarCotizacion()">SOLICITAR PLAN DE PAGOS</button>
            <button onclick="nav('catalogo', 1)" style="background:#333; color:white;">VOLVER AL CATÁLOGO</button>
        </div>
    </div>

    <div id="citas" class="page">
        <h2>Cita de Servicio</h2>
        <div class="card">
            <label>Selecciona tu horario (9am - 7pm):</label>
            <select id="cita-hora">
                <option>09:00 AM</option><option>11:00 AM</option><option>01:00 PM</option><option>03:00 PM</option><option>05:00 PM</option><option>07:00 PM</option>
            </select>
            <input type="date" id="cita-fecha">
            <textarea id="cita-fallas" placeholder="¿Qué servicio requiere tu unidad?"></textarea>
            <button onclick="alert('Cita enviada a la agencia de Teziutlán')">AGENDAR AHORA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active-nav" onclick="nav('inicio', 0)"><span>🏠</span>Inicio</div>
        <div class="nav-item" onclick="nav('catalogo', 1)"><span>🚗</span>Nuevos</div>
        <div class="nav-item" onclick="nav('citas', 3)"><span>🔧</span>Citas</div>
    </nav>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/eyx5rh2dow3oj";

        // Imágenes 3D estilo Pixar según el auto seleccionado
        const modelos3D = {
            "Kwid": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kwid-bwj-ph2/kwid-card.png",
            "Duster": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/duster-hjd/duster-lanzamiento/duster-card.png",
            "Kardian": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/kardian-hjf/kardian-card.png",
            "Stepway": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/stepway-b52-ph2/stepway-card.png",
            "Oroch": "https://www.renault.com.mx/content/dam/Renault/MX/master/vehiculos/oroch-hjd-ph2/oroch-card.png"
        };

        window.onload = function() {
            cargarCatalogo();
            if (localStorage.getItem('u_nombre')) {
                aplicarConfiguracion();
                document.getElementById('pantalla-registro').style.display = 'none';
            }
        };

        async function cargarCatalogo() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const cont = document.getElementById('contenedor-catalogo');
                cont.innerHTML = "";
                data.forEach(item => {
                    cont.innerHTML += `
                        <div class="card">
                            <img src="${item.imagen}" class="img-car">
                            <h3>${item.modelo}</h3>
                            <span class="price-tag">Desde ${item.precio}</span>
                            <button onclick="abrirCotizador('${item.modelo}')">COTIZAR UNIDAD</button>
                        </div>`;
                });
            } catch(e) { console.log("Error de conexión"); }
        }

        function guardarUsuario() {
            localStorage.setItem('u_nombre', document.getElementById('reg-nombre').value);
            localStorage.setItem('u_modelo', document.getElementById('reg-modelo-u').value);
            aplicarConfiguracion();
            document.getElementById('pantalla-registro').style.display = 'none';
        }

        function aplicarConfiguracion() {
            const nombre = localStorage.getItem('u_nombre');
            const modelo = localStorage.getItem('u_modelo');
            document.getElementById('txt-bienvenida').innerText = "¡Hola, " + nombre.split(' ')[0] + "!";
            document.getElementById('txt-info-auto').innerText = "Tu " + modelo + " está en buenas manos";
            
            // Cargar el "Avatar 3D"
            const imgUrl = modelos3D[modelo] || modelos3D["Duster"];
            document.getElementById('car-container').innerHTML = `<img src="${imgUrl}" class="car-3d">`;
        }

        function abrirCotizador(modelo) {
            document.getElementById('modelo-a-cotizar').innerText = modelo;
            nav('cotizar-form', -1);
        }

        function nav(p, i) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active-nav'));
            document.getElementById(p).classList.add('active');
            if(i>=0) document.querySelectorAll('.nav-item')[i].classList.add('active-nav');
            window.scrollTo(0,0);
        }

        function enviarCotizacion() {
            alert("Solicitud de cotización enviada. Un asesor de Renault Teziutlán te contactará para ver el tema del enganche.");
            nav('inicio', 0);
        }
    </script>
</body>
</html>
